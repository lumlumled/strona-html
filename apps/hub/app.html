<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LumLum — narzędzia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/topbar.css">
  <style>
    /* Ekran startowy narzędzi wewnętrznych: "Do zrobienia dziś" + kafelki
       paneli wg uprawnień. Paleta/typografia 1:1 z Backlogiem/CRM (lumlum.co:
       monochrom, Inter, mocno zaokrąglone rogi). */
    :root {
      color-scheme: light dark;
      --surface-1: #ffffff;
      --page: #f5f5f4;
      --text-primary: #111111;
      --text-secondary: #52514e;
      --text-muted: #8a8984;
      --border: rgba(17, 17, 17, 0.12);
      --accent: #111111;
      --accent-contrast: #ffffff;
      --accent-soft: #ececea;
      --bad: #b5433f;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-1: #161616;
        --page: #0a0a0a;
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --text-muted: #8a8984;
        --border: rgba(255, 255, 255, 0.14);
        --accent: #ffffff;
        --accent-contrast: #0a0a0a;
        --accent-soft: #262626;
        --bad: #e08585;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: 2.2rem 1.25rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
    }

    .greeting h1 {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.4px;
    }

    .greeting .date {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .section-label {
      font-size: 0.74rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.6rem;
    }

    /* ── Do zrobienia dziś ── */
    .today-card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.2rem 1.25rem 1.3rem;
    }

    .stat-chips { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-bottom: 1rem; }

    .stat-chip {
      display: inline-flex;
      align-items: baseline;
      gap: 0.35rem;
      background: var(--accent-soft);
      border-radius: 999px;
      padding: 0.3rem 0.85rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .stat-chip b { font-size: 0.92rem; color: var(--text-primary); font-variant-numeric: tabular-nums; }
    .stat-chip.warn b { color: var(--bad); }

    .today-group + .today-group { margin-top: 1.1rem; }

    .today-group h3 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.45rem;
    }

    .today-list { display: flex; flex-direction: column; }

    a.today-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.5rem 0.55rem;
      margin: 0 -0.55rem;
      border-radius: 10px;
      text-decoration: none;
      color: var(--text-primary);
    }

    a.today-item:hover { background: var(--accent-soft); }

    .today-item .who {
      flex: 0 0 auto;
      max-width: 11rem;
      font-size: 0.86rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .today-item .what {
      flex: 1 1 auto;
      min-width: 0;
      font-size: 0.84rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .today-item .when {
      flex: 0 0 auto;
      font-size: 0.76rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .today-item .when.overdue { color: var(--bad); font-weight: 600; }

    .today-item .go { flex: 0 0 auto; color: var(--text-muted); font-size: 0.95rem; }

    .today-empty { color: var(--text-muted); font-size: 0.88rem; font-style: italic; }

    .today-more {
      margin-top: 0.5rem;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* ── Kafelki paneli ── */
    .apps {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 0.8rem;
    }

    .app-card {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.05rem 1.15rem;
      text-decoration: none;
      color: var(--text-primary);
      transition: border-color 0.15s ease, transform 0.15s ease;
      position: relative;
    }

    .app-card:hover { border-color: var(--text-muted); transform: translateY(-1px); }

    .app-card .app-head { display: flex; align-items: center; gap: 0.5rem; }
    .app-card .app-name { font-size: 1rem; font-weight: 700; letter-spacing: -0.2px; }

    .app-card .badge {
      font-size: 0.66rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.12rem 0.5rem;
    }

    .app-card .badge.admin { color: var(--accent-contrast); background: var(--accent); border-color: var(--accent); }

    .app-card .app-desc { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.45; }

    .app-card .arrow {
      position: absolute;
      right: 1rem;
      top: 1rem;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .app-card.soon .app-name,
    .app-card.soon .app-desc { opacity: 0.6; }

    /* ── Modal zmiany hasła ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 120;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: 100%;
      max-width: 340px;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.5rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .modal h2 { font-size: 1.05rem; }

    .modal input {
      font: inherit;
      padding: 0.6rem 0.8rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--page);
      color: var(--text-primary);
    }

    .modal input:focus { outline: none; border-color: var(--accent); }

    .modal .modal-actions { display: flex; gap: 0.5rem; margin-top: 0.2rem; }

    .modal button {
      font: inherit;
      font-weight: 600;
      padding: 0.55rem 1.1rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
    }

    .modal .save { background: var(--accent); color: var(--accent-contrast); }
    .modal .cancel { background: transparent; color: var(--text-muted); }
    .modal .msg { font-size: 0.8rem; color: var(--text-muted); min-height: 1em; }
    .modal .msg.err { color: var(--bad); }
    .modal .msg.ok { color: var(--text-primary); font-weight: 600; }
  </style>
</head>
<body>
  <main>
    <div class="greeting">
      <h1 id="greeting-title">Cześć!</h1>
      <div class="date" id="greeting-date"></div>
    </div>

    <section>
      <div class="section-label">Do zrobienia dziś</div>
      <div class="today-card" id="today-card">
        <p class="today-empty">Wczytywanie…</p>
      </div>
    </section>

    <section>
      <div class="section-label">Panele</div>
      <div class="apps" id="apps"></div>
    </section>
  </main>

  <div class="modal-backdrop" id="pw-modal">
    <div class="modal">
      <h2>Zmień hasło</h2>
      <input type="password" id="pw-new" placeholder="Nowe hasło (min. 8 znaków)" autocomplete="new-password">
      <input type="password" id="pw-repeat" placeholder="Powtórz nowe hasło" autocomplete="new-password">
      <p class="msg" id="pw-msg"></p>
      <div class="modal-actions">
        <button type="button" class="save" id="pw-save">Zapisz</button>
        <button type="button" class="cancel" id="pw-cancel">Anuluj</button>
      </div>
    </div>
  </div>

  <script src="shared/topbar.js"></script>
  <script>
    const API_BASE = window.API_BASE || '';
    const USER = window.LUMLUM_USER || { name: '', panels: [], isAdmin: false };
    const LINKS = window.LUMLUM_LINKS || {};
    const PANELS = window.LUMLUM_PANELS || [];

    // ── Modal zmiany hasła ──
    const pwModal = document.getElementById('pw-modal');
    const pwMsg = document.getElementById('pw-msg');

    function openPwModal() {
      document.getElementById('pw-new').value = '';
      document.getElementById('pw-repeat').value = '';
      pwMsg.textContent = '';
      pwMsg.className = 'msg';
      pwModal.classList.add('open');
      document.getElementById('pw-new').focus();
    }

    document.getElementById('pw-cancel').addEventListener('click', () => pwModal.classList.remove('open'));
    pwModal.addEventListener('click', (e) => { if (e.target === pwModal) pwModal.classList.remove('open'); });

    document.getElementById('pw-save').addEventListener('click', async () => {
      const a = document.getElementById('pw-new').value;
      const b = document.getElementById('pw-repeat').value;
      pwMsg.className = 'msg';
      if (a.length < 8) { pwMsg.textContent = 'Hasło musi mieć min. 8 znaków'; pwMsg.classList.add('err'); return; }
      if (a !== b) { pwMsg.textContent = 'Hasła się różnią'; pwMsg.classList.add('err'); return; }
      try {
        const res = await fetch(`${API_BASE}/api/me/haslo`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ noweHaslo: a }),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.error || `Błąd ${res.status}`);
        pwMsg.textContent = 'Hasło zmienione ✓';
        pwMsg.classList.add('ok');
        setTimeout(() => pwModal.classList.remove('open'), 900);
      } catch (err) {
        pwMsg.textContent = err.message;
        pwMsg.classList.add('err');
      }
    });

    LumTopbar.mount({ active: 'hub', onChangePassword: openPwModal });

    // ── Powitanie ──
    const hour = new Date().getHours();
    const powitanie = hour < 5 ? 'Dobrej nocy' : hour < 12 ? 'Dzień dobry' : hour < 18 ? 'Cześć' : 'Dobry wieczór';
    document.getElementById('greeting-title').textContent = `${powitanie}, ${(USER.name || '').split(' ')[0]}!`;
    const dataPl = new Intl.DateTimeFormat('pl-PL', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
    }).format(new Date());
    document.getElementById('greeting-date').textContent = dataPl.charAt(0).toUpperCase() + dataPl.slice(1);

    // ── Kafelki paneli (wg uprawnień) ──
    function renderApps() {
      const wrap = document.getElementById('apps');
      wrap.innerHTML = '';
      PANELS.forEach((panel) => {
        if (panel.adminOnly && !USER.isAdmin) return;
        if (!panel.adminOnly && !USER.panels.includes(panel.key)) return;
        const card = document.createElement('a');
        card.className = 'app-card' + (panel.status === 'soon' ? ' soon' : '');
        card.href = LINKS[panel.key] || '#';
        const head = document.createElement('div');
        head.className = 'app-head';
        const name = document.createElement('span');
        name.className = 'app-name';
        name.textContent = panel.label;
        head.appendChild(name);
        if (panel.status === 'soon') {
          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = 'wkrótce';
          head.appendChild(badge);
        }
        if (panel.adminOnly) {
          const badge = document.createElement('span');
          badge.className = 'badge admin';
          badge.textContent = 'admin';
          head.appendChild(badge);
        }
        const desc = document.createElement('div');
        desc.className = 'app-desc';
        desc.textContent = panel.desc;
        const arrow = document.createElement('span');
        arrow.className = 'arrow';
        arrow.textContent = '→';
        card.append(head, desc, arrow);
        wrap.appendChild(card);
      });
      if (!wrap.children.length) {
        wrap.innerHTML = '<p class="today-empty">Twoje konto nie ma jeszcze przypisanych paneli — poproś administratora.</p>';
      }
    }

    // ── Do zrobienia dziś ──
    const canCrm = USER.panels.includes('crm');

    function crmLeadHref(id) {
      return canCrm && LINKS.crm ? `${LINKS.crm}?lead=${encodeURIComponent(id)}` : null;
    }

    function todayItem(entry, whatText, whenText, overdue) {
      const href = crmLeadHref(entry.id);
      const item = document.createElement(href ? 'a' : 'div');
      item.className = 'today-item';
      if (href) item.href = href;
      const who = document.createElement('span');
      who.className = 'who';
      who.textContent = entry.name;
      const what = document.createElement('span');
      what.className = 'what';
      what.textContent = whatText;
      const when = document.createElement('span');
      when.className = 'when' + (overdue ? ' overdue' : '');
      when.textContent = whenText;
      item.append(who, what, when);
      if (href) {
        const go = document.createElement('span');
        go.className = 'go';
        go.textContent = '→';
        item.appendChild(go);
      }
      return item;
    }

    async function loadToday() {
      const card = document.getElementById('today-card');
      try {
        const res = await fetch(`${API_BASE}/api/dzisiaj`);
        if (res.status === 401) { window.location.href = `${API_BASE}/login`; return; }
        const body = await res.json();
        if (!res.ok) throw new Error(body.error || `Błąd ${res.status}`);

        card.innerHTML = '';

        const chips = document.createElement('div');
        chips.className = 'stat-chips';
        const stats = body.stats || {};
        [
          ['Akcje do zrobienia', stats.akcje, stats.zalegleAkcje > 0],
          ['Zaległy feedback', stats.feedbacki, stats.feedbacki > 0],
          ['Nowe leady', stats.nowe, false],
          ['Kontakty dziś', stats.kontaktyDzis, false],
        ].forEach(([label, value, warn]) => {
          const chip = document.createElement('span');
          chip.className = 'stat-chip' + (warn ? ' warn' : '');
          chip.innerHTML = `<b></b> <span></span>`;
          chip.querySelector('b').textContent = value ?? 0;
          chip.querySelector('span').textContent = label;
          chips.appendChild(chip);
        });
        card.appendChild(chips);

        const akcje = body.akcje || [];
        const feedbacki = body.feedbacki || [];

        if (!akcje.length && !feedbacki.length) {
          const empty = document.createElement('p');
          empty.className = 'today-empty';
          empty.textContent = 'Nic pilnego — wszystkie akcje i feedbacki są ogarnięte. 🎉';
          card.appendChild(empty);
          return;
        }

        const LIMIT = 8;

        if (akcje.length) {
          const group = document.createElement('div');
          group.className = 'today-group';
          const h = document.createElement('h3');
          h.textContent = 'Najbliższe akcje';
          const list = document.createElement('div');
          list.className = 'today-list';
          akcje.slice(0, LIMIT).forEach((a) => {
            list.appendChild(todayItem(a, a.akcja, a.zalegle ? `zaległe · ${a.termin}` : (a.termin || 'dziś'), a.zalegle));
          });
          group.append(h, list);
          if (akcje.length > LIMIT) {
            const more = document.createElement('div');
            more.className = 'today-more';
            more.textContent = `…i ${akcje.length - LIMIT} kolejnych akcji — pełna lista w CRM.`;
            group.appendChild(more);
          }
          card.appendChild(group);
        }

        if (feedbacki.length) {
          const group = document.createElement('div');
          group.className = 'today-group';
          const h = document.createElement('h3');
          h.textContent = 'Feedback do zebrania';
          const list = document.createElement('div');
          list.className = 'today-list';
          feedbacki.slice(0, LIMIT).forEach((f) => {
            // "2026-05-14 00:00:00" / "14.05.2026" → zawsze DD.MM.YYYY
            const raw = String(f.feedback || '').split(' ')[0];
            const iso = /^(\d{4})-(\d{2})-(\d{2})/.exec(raw);
            const day = iso ? `${iso[3]}.${iso[2]}.${iso[1]}` : raw;
            list.appendChild(todayItem(f, `status: ${f.status || '—'}`, f.zalegle ? `zaległy · ${day}` : 'dziś', f.zalegle));
          });
          group.append(h, list);
          if (feedbacki.length > LIMIT) {
            const more = document.createElement('div');
            more.className = 'today-more';
            more.textContent = `…i ${feedbacki.length - LIMIT} kolejnych — pełna lista w CRM.`;
            group.appendChild(more);
          }
          card.appendChild(group);
        }
      } catch (err) {
        card.innerHTML = '';
        const p = document.createElement('p');
        p.className = 'today-empty';
        p.textContent = `Nie udało się wczytać zadań: ${err.message}`;
        card.appendChild(p);
      }
    }

    renderApps();
    loadToday();
  </script>
</body>
</html>
