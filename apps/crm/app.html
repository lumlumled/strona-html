<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="manifest" href="/assets/manifest.webmanifest">
  <meta name="theme-color" content="#000000">
  <title>CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/lead-card.css">
  <link rel="stylesheet" href="shared/wycena-card.css">
  <link rel="stylesheet" href="shared/topbar.css">
  <style>
    :root {
      color-scheme: light dark;
      --surface-1: #ffffff;
      --page: #f5f5f4;
      --text-primary: #111111;
      --text-secondary: #52514e;
      --text-muted: #8a8984;
      --border: rgba(17, 17, 17, 0.12);
      --accent: #111111;
      --accent-contrast: #ffffff;
      --accent-soft: #ececea;
      --good: #0ca30c;
      --bad: #b5433f;
      --feedback-overdue: #b5433f;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-1: #161616;
        --page: #0a0a0a;
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --text-muted: #8a8984;
        --border: rgba(255, 255, 255, 0.14);
        --accent: #ffffff;
        --accent-contrast: #0a0a0a;
        --accent-soft: #262626;
        --good: #16c116;
        --bad: #e08585;
        --feedback-overdue: #e08585;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--page);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* Sidebar zastąpiony wspólnym topbarem (apps/shared/topbar.*) — sekcje
       CRM ("arkusze") żyją teraz jako pigułki nad tytułem, spójnie z
       przełącznikiem dokumentów w Backlogu i lepiej na mobile. */
    .content {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      min-width: 0;
      padding: 1.6rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .nav-sections { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 0.75rem; }

    /* Sekcje (arkusze) przełączane atrybutem hidden — musi wygrywać z
       display:flex na .toolbar/.ai-bar/#list. */
    [data-sec][hidden] { display: none !important; }

    .nav-section {
      font: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.32rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--text-secondary);
      cursor: pointer;
    }

    .nav-section.active { background: var(--accent); border-color: var(--accent); color: var(--accent-contrast); }
    .nav-section.disabled { opacity: 0.5; cursor: default; }

    .content-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 0.9rem;
    }

    .view-badge {
      display: inline-block;
      vertical-align: 0.25rem;
      margin-left: 0.5rem;
      font-size: 0.64rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.14rem 0.55rem;
    }

    .toolbar { display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap; }

    .toolbar input[type="text"],
    .toolbar select {
      font: inherit;
      padding: 0.5rem 0.75rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--text-primary);
    }

    .toolbar input[type="text"] { min-width: 220px; }

    .toolbar button {
      font: inherit;
      font-weight: 600;
      padding: 0.5rem 0.9rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--text-primary);
      cursor: pointer;
    }

    .toolbar button:hover { background: var(--accent-soft); }

    .count-badge { font-size: 0.85rem; color: var(--text-secondary); margin-left: auto; }

    /* ── Pasek AI: pytanie tekstem lub głosem, filtruje listę + karta z
       odpowiedzią. Komponent celowo generyczny — kolejne sekcje CRM dostają
       go za darmo (endpoint i prompt są schema-driven po stronie serwera). */
    .ai-bar { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.6rem; flex-wrap: wrap; }

    .ai-input-wrap { position: relative; flex: 1; min-width: 260px; }

    .ai-input-wrap svg {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    #ai-input {
      width: 100%;
      font: inherit;
      font-size: 0.9rem;
      padding: 0.5rem 0.75rem 0.5rem 2.05rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--text-primary);
    }

    #ai-input:focus { outline: none; border-color: var(--accent); }
    #ai-input::placeholder { color: var(--text-muted); }

    .ai-bar > button {
      font: inherit;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 0.5rem 0.9rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--text-primary);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .ai-bar > button:hover:not(:disabled) { background: var(--accent-soft); }
    .ai-bar > button:disabled { opacity: 0.5; cursor: default; }
    /* display:inline-flex wyżej nadpisałoby atrybut hidden — przywracamy */
    .ai-bar > button[hidden] { display: none; }

    #ai-mic { padding: 0.5rem 0.65rem; }

    @keyframes mic-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #ai-mic.recording {
      border-color: var(--bad);
      color: var(--bad);
      animation: mic-pulse 1.2s ease-in-out infinite;
    }

    .ai-bar > .ai-chip {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--accent-contrast);
      font-size: 0.8rem;
      border-radius: 999px;
    }

    .ai-bar > .ai-chip:hover:not(:disabled) { background: var(--accent); opacity: 0.85; }

    #ai-status { font-size: 0.8rem; color: var(--text-muted); }
    #ai-status.error { color: var(--bad); }

    /* Karta z odpowiedzią AI — pływająca, nie blokuje listy: można czytać
       odpowiedź i równolegle przeglądać przefiltrowane leady. */
    .ai-card {
      position: fixed;
      right: 1.25rem;
      bottom: 1.25rem;
      width: min(460px, calc(100vw - 2rem));
      max-height: min(65vh, 560px);
      display: flex;
      flex-direction: column;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
      z-index: 80;
      overflow: hidden;
    }

    .ai-card[hidden] { display: none; }

    .ai-card-head {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.7rem 0.9rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.85rem;
    }

    .ai-card-close {
      margin-left: auto;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.95rem;
      cursor: pointer;
      padding: 0.1rem 0.35rem;
      border-radius: 6px;
    }

    .ai-card-close:hover { background: var(--accent-soft); color: var(--text-primary); }

    .ai-card-q {
      padding: 0.55rem 0.9rem 0;
      font-size: 0.78rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .ai-card-q:empty { display: none; }

    .ai-card-body {
      padding: 0.55rem 0.9rem 0.9rem;
      font-size: 0.88rem;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-y: auto;
    }

    #list { display: flex; flex-direction: column; gap: 0.4rem; }

    .lead {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.15s ease;
    }

    .lead[open] { border-color: var(--text-muted); }

    .lead.status-menu-open { overflow: visible; z-index: 30; }
    .lead.zamkniete-local { opacity: 0.5; }

    /* Zwinięty wiersz celowo niski (jak lista, nie karta) — na ekranie ma się
       mieścić dużo leadów naraz; pełna karta pojawia się dopiero po otwarciu. */
    .lead summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.5rem 0.9rem;
      min-height: 2.4rem;
    }

    .lead summary::-webkit-details-marker { display: none; }
    .lead summary:hover { background: var(--accent-soft); }

    .chevron {
      flex: 0 0 auto;
      width: 1.1rem;
      height: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chevron::before {
      content: '▸';
      display: inline-block;
      transition: transform 0.15s ease;
      color: var(--text-secondary);
    }

    .lead[open] summary .chevron::before { transform: rotate(90deg); }

    .lp {
      flex: 0 0 auto;
      font-size: 0.78rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      min-width: 1.4rem;
      text-align: right;
    }

    /* Lokalny, nietrwały odpowiednik "zamknięte" z Backlogu — czysto do
       osobistej segregacji w widoku, nic nie zapisuje do bazy, resetuje się
       po odświeżeniu. */
    .close-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 0.95rem;
      height: 0.95rem;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      background: var(--accent-soft);
      flex: 0 0 auto;
      position: relative;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .close-checkbox:hover { border-color: var(--text-muted); }
    .close-checkbox:checked { background: var(--text-muted); border-color: var(--text-muted); }

    .close-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 42%;
      width: 0.28rem;
      height: 0.52rem;
      border: solid var(--surface-1);
      border-width: 0 2px 2px 0;
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .summary-name {
      flex: 0 0 auto;
      max-width: 13rem;
      font-weight: 600;
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .summary-dash { color: var(--text-muted); flex: 0 0 auto; }

    .summary-phone {
      font-size: 0.82rem;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .copy-btn {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.3rem;
      height: 1.3rem;
      padding: 0;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
    }

    .copy-btn:hover { background: var(--accent-soft); color: var(--text-primary); }
    .copy-btn.copied { color: var(--good); }

    .right-anchor { margin-left: auto; display: flex; align-items: center; gap: 0.6rem; }

    .summary-feedback {
      font-size: 0.76rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .summary-feedback.is-overdue { color: var(--feedback-overdue); }

    .status-wrap { position: relative; flex: 0 0 auto; }

    .status-tag {
      position: relative;
      display: inline-block;
      padding: 0.2rem 1.25rem 0.2rem 0.65rem;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 600;
      background: var(--accent-soft);
      color: var(--text-primary);
      white-space: nowrap;
    }

    .status-tag::after {
      content: '';
      position: absolute;
      right: 0.6rem;
      top: 50%;
      width: 0.35rem;
      height: 0.35rem;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: translateY(-75%) rotate(45deg);
      opacity: 0.7;
      pointer-events: none;
    }

    .status-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 0.35rem;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      padding: 0.35rem;
      z-index: 40;
      min-width: 180px;
    }

    .status-menu.open { display: block; }

    /* Tryb podglądu: status to zwykła pigułka bez strzałki i menu. */
    .crm-readonly .status-tag { padding-right: 0.65rem; cursor: default; }
    .crm-readonly .status-tag::after { display: none; }

    .status-option {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.4rem 0.6rem;
      border-radius: 8px;
      border: none;
      background: transparent;
      font: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text-primary);
    }

    .status-option:hover { background: var(--accent-soft); }

    /* Style rozwiniętej karty leada żyją w apps/shared/lead-card.css
       (wspólne z Backlogiem — patrz <link> w <head>). */

    .empty-note { color: var(--text-muted); font-style: italic; font-size: 0.85rem; }

    @media (max-width: 720px) {
      .content { padding: 1.25rem 1rem 3rem; }
      /* Zwinięty wiersz na małym ekranie: bez myślnika i daty feedbacku,
         żeby imię + telefon + status mieściły się bez ucinania. */
      .summary-dash, .summary-feedback { display: none; }
      .summary-name { max-width: 9rem; }
    }
  </style>
</head>
<body>
  <header id="site-header"></header>
  <main class="content">
    <header class="content-header">
      <div class="nav-sections" id="nav-sections"></div>
      <h2 id="section-title">Leady B2C</h2>
        <div class="toolbar" data-sec="leady-b2c">
          <input type="text" id="search" placeholder="Szukaj po imieniu lub telefonie…">
          <select id="status-filter">
            <option value="">Wszystkie statusy</option>
          </select>
          <button id="refresh">Odśwież</button>
          <span class="count-badge" id="count"></span>
        </div>
        <div class="ai-bar" data-sec="leady-b2c">
          <div class="ai-input-wrap">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true"><path d="M12 2l1.8 5.6L19.5 9l-5.7 1.4L12 16l-1.8-5.6L4.5 9l5.7-1.4L12 2z"/><path d="M19 14l.9 2.6 2.6.9-2.6.9L19 21l-.9-2.6-2.6-.9 2.6-.9L19 14z"/></svg>
            <input type="text" id="ai-input" placeholder="Zapytaj AI o leady — np. „kto ma zaległy feedback?”, „do kogo najlepiej dziś zadzwonić?”">
          </div>
          <button id="ai-mic" type="button" title="Dyktuj pytanie (kliknij, mów, kliknij ponownie)">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
          </button>
          <button id="ai-ask" type="button">Zapytaj</button>
          <button id="ai-clear" class="ai-chip" type="button" hidden></button>
          <span id="ai-status"></span>
        </div>
        <!-- Zakładka Wyceny: własny toolbar (renderuje assets/wyceny-tab.js) -->
        <div id="wyceny-toolbar" data-sec="wyceny" hidden></div>
    </header>
    <div id="list" data-sec="leady-b2c"></div>
    <div id="wyceny-list" data-sec="wyceny" hidden></div>
  </main>

  <div class="ai-card" id="ai-card" hidden>
    <div class="ai-card-head">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M12 2l1.8 5.6L19.5 9l-5.7 1.4L12 16l-1.8-5.6L4.5 9l5.7-1.4L12 2z"/></svg>
      <span>Odpowiedź AI</span>
      <button class="ai-card-close" id="ai-card-close" type="button" title="Zamknij">✕</button>
    </div>
    <div class="ai-card-q" id="ai-card-q"></div>
    <div class="ai-card-body" id="ai-card-body"></div>
  </div>

  <script src="shared/topbar.js"></script>
  <script src="shared/lead-card.js"></script>
  <script src="shared/wycena-card.js"></script>
  <script src="assets/wyceny-tab.js"></script>
  <script>
    const API_BASE = window.API_BASE || '';

    LumTopbar.mount({ active: 'crm', into: document.getElementById('site-header') });

    // Uprawnienia per arkusz przyznaje panel Pozwolenia: 'edit' = pełna
    // edycja, 'view' = sam podgląd, brak wpisu = arkusz niewidoczny. Serwer
    // i tak egzekwuje to na endpointach — tu tylko chowamy UI.
    const CRM_SHEET_LEVELS = (window.LUMLUM_USER && window.LUMLUM_USER.crmSheets)
      || { 'leady-b2c': 'edit', wyceny: 'edit' }; // fallback: lokalny dev bez wstrzykniętego usera
    const SHEET_LEVEL = CRM_SHEET_LEVELS['leady-b2c'] || null;
    const READ_ONLY = SHEET_LEVEL !== 'edit';
    if (READ_ONLY) {
      document.body.classList.add('crm-readonly');
    }

    const NAV_SECTIONS = [
      { key: 'leady-b2c', label: 'Leady B2C' },
      { key: 'wyceny', label: 'Wyceny' },
      // Kolejne sekcje CRM (np. B2B) dochodzą tu jako kolejne wpisy.
    ].filter((s) => CRM_SHEET_LEVELS[s.key]);

    // ── Przełączanie sekcji (arkuszy) ────────────────────────────────────────
    let currentSection = NAV_SECTIONS.length ? NAV_SECTIONS[0].key : 'leady-b2c';

    function applySectionVisibility() {
      document.querySelectorAll('[data-sec]').forEach((elx) => {
        elx.hidden = elx.dataset.sec !== currentSection;
      });
      const section = NAV_SECTIONS.find((s) => s.key === currentSection);
      const title = document.getElementById('section-title');
      title.textContent = section ? section.label : '';
      if (CRM_SHEET_LEVELS[currentSection] !== 'edit') {
        const badge = document.createElement('span');
        badge.className = 'view-badge';
        badge.textContent = 'tylko podgląd';
        title.appendChild(badge);
      }
      document.querySelectorAll('.nav-section').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.navSec === currentSection);
      });
    }

    function setSection(key) {
      if (!NAV_SECTIONS.some((s) => s.key === key)) return;
      currentSection = key;
      applySectionVisibility();
      if (key === 'wyceny' && window.WycenyTab) WycenyTab.ensureLoaded();
    }

    const STATUS_OPTIONS = [
      'Błędne dane',
      'Lekko zainteresowany',
      'Nie odebrał',
      'Nowy',
      'Po pierwszym telefonie',
      'Przyszłościowy',
      'Sprzedane',
      'Stracony',
      'Wycena wysłana',
      'Zadzwonić jeszcze raz',
    ];

    const STATUS_COLORS = {
      'błędne dane': '#e4e3e0',
      'lekko zainteresowany': '#cfceca',
      'nie odebrał': '#1a56db',
      'nowy': '#a8c8f0',
      'po pierwszym tel': '#f5b995',
      'po pierwszym telefonie': '#f5b995',
      'przyszłościowy': '#f0b23d',
      'sprzedane': '#a9d9a0',
      'stracony': '#7a1220',
      'wycena wysłana': '#b13fc0',
      'zadzwonić jeszcze raz': '#f0993d',
    };

    // Rozwinięta karta leada (pola Kontakt/Transakcja, historia, wycena,
    // notatka, najbliższa akcja) żyje w apps/shared/lead-card.js — wspólna
    // z Backlogiem, żeby oba widoki nigdy się nie rozjechały.
    const { formatDateOnly, isOverdue, buildCopyButton } = LeadKarta.utils;
    const saveField = (lead, field, value) => LeadKarta.saveField(API_BASE, lead, field, value);

    function contrastTextColor(hex) {
      const c = hex.replace('#', '');
      const r = parseInt(c.substring(0, 2), 16);
      const g = parseInt(c.substring(2, 4), 16);
      const b = parseInt(c.substring(4, 6), 16);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.6 ? '#111111' : '#ffffff';
    }

    function applyStatusColor(el, status) {
      const key = String(status || '').trim().toLowerCase();
      const matchKey = STATUS_COLORS[key] ? key : Object.keys(STATUS_COLORS).find((k) => key.startsWith(k));
      const bg = matchKey && STATUS_COLORS[matchKey];
      if (!bg) {
        el.style.background = '';
        el.style.color = '';
        return;
      }
      el.style.background = bg;
      el.style.color = contrastTextColor(bg);
    }

    let allLeady = [];

    // Aktywny filtr z AI: Set stringów "ID Leada" albo null (brak filtra).
    // Nakłada się NA istniejące filtry (szukajka + status), patrz matchesFilters.
    let aiFilterIds = null;

    // Sortowanie po "ID Leada" malejąco, NIE po kolumnie "Date" — "Date" ma
    // niespójne formaty (ISO / DD.MM.YYYY / co najmniej jeden surowy numer
    // seryjny Excela, np. lead 271 ma Date="46166"), więc porządek po niej
    // nie trzyma kolejności zgłoszeń. "ID Leada" to licznik nadawany przy
    // utworzeniu — zawsze ściśle rosnący, czyli malejąco = najnowsze na górze.
    function byIdLeadaDesc(a, b) {
      return (Number(b['ID Leada']) || 0) - (Number(a['ID Leada']) || 0);
    }

    function renderNav() {
      const wrap = document.getElementById('nav-sections');
      wrap.innerHTML = '';
      NAV_SECTIONS.forEach((section) => {
        const btn = document.createElement('button');
        btn.className = 'nav-section' + (section.key === currentSection ? ' active' : '');
        // celowo NIE data-sec — ten atrybut steruje chowaniem treści sekcji
        btn.dataset.navSec = section.key;
        btn.textContent = section.label;
        btn.addEventListener('click', () => setSection(section.key));
        wrap.appendChild(btn);
      });
    }

    function renderStatusFilterOptions() {
      const select = document.getElementById('status-filter');
      STATUS_OPTIONS.forEach((status) => {
        const opt = document.createElement('option');
        opt.value = status;
        opt.textContent = status;
        select.appendChild(opt);
      });
    }

    function buildStatusPill(lead) {
      const wrap = document.createElement('div');
      wrap.className = 'status-wrap';
      const tag = document.createElement('span');
      tag.className = 'status-tag';
      tag.textContent = lead['Deal stage'] || '—';
      applyStatusColor(tag, lead['Deal stage']);

      const menu = document.createElement('div');
      menu.className = 'status-menu';
      STATUS_OPTIONS.forEach((status) => {
        const option = document.createElement('button');
        option.type = 'button';
        option.className = 'status-option';
        option.textContent = status;
        option.addEventListener('click', async (e) => {
          e.stopPropagation();
          menu.classList.remove('open');
          wrap.closest('.lead').classList.remove('status-menu-open');
          const prev = tag.textContent;
          tag.textContent = status;
          applyStatusColor(tag, status);
          try {
            await saveField(lead, 'Deal stage', status);
          } catch (err) {
            tag.textContent = prev;
            applyStatusColor(tag, prev);
            alert(`Błąd zapisu statusu: ${err.message}`);
          }
        });
        menu.appendChild(option);
      });

      tag.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (READ_ONLY) return; // podgląd: status bez menu zmiany
        const isOpen = menu.classList.toggle('open');
        wrap.closest('.lead').classList.toggle('status-menu-open', isOpen);
      });

      wrap.append(tag, menu);
      return wrap;
    }

    function leadKey(lead) {
      return String(lead['ID Leada']);
    }

    function leadRow(lead) {
      const details = document.createElement('details');
      details.className = 'lead';
      // Klucz do chirurgicznych podmian wierszy przy pollingu (patrz
      // applyRemoteUpdate) — bez pełnego re-renderu listy.
      details.dataset.leadId = leadKey(lead);

      const summary = document.createElement('summary');
      const chevron = document.createElement('span');
      chevron.className = 'chevron';

      // Numer to "ID Leada" (stały, unikalny, nadany raz przy utworzeniu
      // leada), NIE pozycja w liście — pozycja przesuwałaby się przy każdym
      // nowym leadzie/filtrowaniu, psując numerację, na którą ktoś mógłby się
      // powołać ("case 47"). Lista jest sortowana najnowsze-na-górze, więc
      // te numery i tak naturalnie maleją od góry do dołu.
      const lp = document.createElement('span');
      lp.className = 'lp';
      lp.textContent = lead['ID Leada'];

      const closeCheckbox = document.createElement('input');
      closeCheckbox.type = 'checkbox';
      closeCheckbox.className = 'close-checkbox';
      closeCheckbox.title = 'Oznacz jako zaopiekowane (lokalnie, nie zapisuje się)';
      closeCheckbox.addEventListener('click', (e) => e.stopPropagation());
      closeCheckbox.addEventListener('change', () => {
        details.classList.toggle('zamkniete-local', closeCheckbox.checked);
      });

      const name = document.createElement('span');
      name.className = 'summary-name';
      name.textContent = lead['Name'] || '(bez imienia)';

      const dash = document.createElement('span');
      dash.className = 'summary-dash';
      dash.textContent = '—';

      const phone = document.createElement('span');
      phone.className = 'summary-phone';
      phone.textContent = lead._telefon_formatted || '—';

      const phoneCopy = buildCopyButton(() => lead._telefon_formatted);

      const rightAnchor = document.createElement('div');
      rightAnchor.className = 'right-anchor';

      const feedback = document.createElement('span');
      feedback.className = 'summary-feedback' + (isOverdue(lead['Data Feedbacku']) ? ' is-overdue' : '');
      feedback.textContent = lead['Data Feedbacku']
        ? `Data feedbacku: ${formatDateOnly(lead['Data Feedbacku'])}${lead['Godzina Feedbacku'] ? ` ${lead['Godzina Feedbacku']}` : ''}`
        : '';

      const statusPill = buildStatusPill(lead);
      rightAnchor.append(feedback, statusPill);

      summary.append(chevron, lp, closeCheckbox, name, dash, phone, phoneCopy, rightAnchor);

      // Rozwinięta karta (akcja z ptaszkiem, Podsumowanie AI, notatka,
      // historia, siatki pól, wycena) — wspólny moduł z Backlogiem.
      const { el: body } = LeadKarta.buildBody(lead, {
        apiBase: API_BASE,
        hostDetails: details,
        readOnly: READ_ONLY,
        onFeedbackDate: (stored) => {
          feedback.textContent = stored ? `Data feedbacku: ${formatDateOnly(stored)}` : '';
          feedback.classList.toggle('is-overdue', isOverdue(stored));
        },
      });

      details.append(summary, body);
      return details;
    }

    function matchesFilters(lead, query, statusFilter) {
      if (aiFilterIds && !aiFilterIds.has(leadKey(lead))) return false;
      if (statusFilter && lead['Deal stage'] !== statusFilter) return false;
      if (!query) return true;
      const haystack = `${lead['Name'] || ''} ${lead._telefon_formatted || ''}`.toLowerCase();
      return haystack.includes(query);
    }

    function matchesCurrentFilters(lead) {
      const query = document.getElementById('search').value.trim().toLowerCase();
      const statusFilter = document.getElementById('status-filter').value;
      return matchesFilters(lead, query, statusFilter);
    }

    function updateCount() {
      const filteredCount = allLeady.filter(matchesCurrentFilters).length;
      document.getElementById('count').textContent = `${filteredCount} / ${allLeady.length} leadów`;
    }

    function renderList() {
      const filtered = allLeady.filter(matchesCurrentFilters);
      const list = document.getElementById('list');
      list.innerHTML = '';
      filtered.forEach((lead) => list.appendChild(leadRow(lead)));
      updateCount();
    }

    async function loadLeady() {
      const list = document.getElementById('list');
      list.innerHTML = '<p class="empty-note">Wczytywanie…</p>';
      try {
        const res = await fetch(`${API_BASE}/api/leady`);
        if (res.status === 401) {
          window.location.href = `${API_BASE}/login`;
          return;
        }
        const body = await res.json();
        if (!res.ok) throw new Error(body.error || 'Błąd wczytywania');
        allLeady = (body.data || []).sort(byIdLeadaDesc);
        renderList();
        openLeadFromUrl();
      } catch (err) {
        list.innerHTML = `<p class="empty-note">Błąd wczytywania: ${err.message}</p>`;
      }
    }

    // Deep-link z ekranu głównego (lumlum.dev/crm/?lead=123): po pierwszym
    // załadowaniu listy otwiera wskazanego leada i zjeżdża do niego.
    let deepLinkDone = false;
    function openLeadFromUrl() {
      if (deepLinkDone) return;
      deepLinkDone = true;
      const id = new URLSearchParams(window.location.search).get('lead');
      if (!id) return;
      const el = document.querySelector(`.lead[data-lead-id="${CSS.escape(id)}"]`);
      if (!el) return;
      el.open = true;
      el.scrollIntoView({ block: 'center' });
    }

    document.addEventListener('click', () => {
      document.querySelectorAll('.status-menu.open').forEach((menu) => {
        menu.classList.remove('open');
        menu.closest('.lead').classList.remove('status-menu-open');
      });
    });

    document.getElementById('search').addEventListener('input', renderList);
    document.getElementById('status-filter').addEventListener('change', renderList);
    document.getElementById('refresh').addEventListener('click', loadLeady);

    // ── AI: pytanie → filtr listy + karta z odpowiedzią ─────────────────────
    const aiInput = document.getElementById('ai-input');
    const aiAskBtn = document.getElementById('ai-ask');
    const aiMicBtn = document.getElementById('ai-mic');
    const aiStatus = document.getElementById('ai-status');
    const aiClearBtn = document.getElementById('ai-clear');
    const aiCard = document.getElementById('ai-card');

    function setAiStatus(text, isError) {
      aiStatus.textContent = text || '';
      aiStatus.classList.toggle('error', Boolean(isError));
    }

    function setAiBusy(busy) {
      [aiInput, aiAskBtn, aiMicBtn].forEach((el) => { el.disabled = busy; });
    }

    function clearAiFilter() {
      aiFilterIds = null;
      aiClearBtn.hidden = true;
      renderList();
    }

    async function runAiQuery(question) {
      const q = String(question || '').trim();
      if (!q) return;
      setAiBusy(true);
      setAiStatus('AI analizuje leady…');
      try {
        const res = await fetch(`${API_BASE}/api/ai/query`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ section: 'leady-b2c', question: q }),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.error || `Błąd ${res.status}`);

        if (Array.isArray(body.ids) && body.ids.length) {
          aiFilterIds = new Set(body.ids.map(String));
          aiClearBtn.textContent = `✕ Filtr AI: ${aiFilterIds.size}`;
          aiClearBtn.title = 'Wyczyść filtr AI (pokaż wszystkie leady)';
          aiClearBtn.hidden = false;
        } else {
          // pytanie ogólne/statystyczne — AI świadomie nie filtruje widoku
          aiFilterIds = null;
          aiClearBtn.hidden = true;
        }
        renderList();

        if (body.answer) {
          document.getElementById('ai-card-q').textContent = q;
          document.getElementById('ai-card-body').textContent = body.answer;
          aiCard.hidden = false;
        }
        setAiStatus('');
      } catch (err) {
        setAiStatus(err.message, true);
      } finally {
        setAiBusy(false);
      }
    }

    aiAskBtn.addEventListener('click', () => runAiQuery(aiInput.value));
    aiInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') runAiQuery(aiInput.value); });
    aiClearBtn.addEventListener('click', clearAiFilter);
    document.getElementById('ai-card-close').addEventListener('click', () => { aiCard.hidden = true; });

    // ── Dyktowanie pytania: MediaRecorder → POST /api/transcribe (OpenAI) ──
    // Ten sam sprawdzony wzorzec co composer w Backlogu; nagranie nigdzie nie
    // jest przechowywane. Po transkrypcji pytanie od razu leci do AI.
    let mediaRecorder = null;
    let audioChunks = [];

    aiMicBtn.addEventListener('click', async () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : '';
        mediaRecorder = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined);
        audioChunks = [];
        mediaRecorder.addEventListener('dataavailable', (e) => {
          if (e.data.size) audioChunks.push(e.data);
        });
        mediaRecorder.addEventListener('stop', async () => {
          stream.getTracks().forEach((t) => t.stop());
          aiMicBtn.classList.remove('recording');
          const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
          if (!blob.size) return;
          setAiStatus('Transkrybuję…');
          try {
            const res = await fetch(`${API_BASE}/api/transcribe`, {
              method: 'POST',
              headers: { 'Content-Type': blob.type || 'audio/webm' },
              body: blob,
            });
            const body = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(body.error || `Błąd ${res.status}`);
            if (body.text) {
              aiInput.value = body.text;
              setAiStatus('');
              runAiQuery(body.text);
            } else {
              setAiStatus('');
            }
          } catch (err) {
            setAiStatus(err.message, true);
          }
        });
        mediaRecorder.start();
        aiMicBtn.classList.add('recording');
        setAiStatus('Nagrywam — kliknij mikrofon ponownie, żeby zakończyć.');
      } catch (err) {
        setAiStatus(`Brak dostępu do mikrofonu: ${err.message}`, true);
      }
    });

    // ── Synchronizacja Supabase → widok (polling) ───────────────────────────
    // Druga połowa dwukierunkowej synchronizacji (edycje z tego widoku i tak
    // idą od razu do bazy przez PUT). Co POLL_INTERVAL_MS dociągamy świeże
    // dane i CHIRURGICZNIE podmieniamy tylko zmienione wiersze — nigdy pełny
    // re-render, żeby nie zamykać rozwiniętych kart i nie wyrzucać kursora
    // z edytowanego pola. Wiersz rozwinięty albo z fokusem pomijamy — jego
    // zmiany dojadą w kolejnym cyklu, gdy użytkownik skończy.
    const POLL_INTERVAL_MS = 30000;

    function isRowBusy(el) {
      return Boolean(el && (el.open || el.contains(document.activeElement)));
    }

    function insertRowSorted(listEl, lead) {
      const newEl = leadRow(lead);
      const id = Number(lead['ID Leada']) || 0;
      const rows = [...listEl.querySelectorAll(':scope > .lead')];
      const before = rows.find((el) => (Number(el.dataset.leadId) || 0) < id);
      if (before) listEl.insertBefore(newEl, before);
      else listEl.appendChild(newEl);
    }

    function applyRemoteUpdate(freshRows) {
      const listEl = document.getElementById('list');
      const oldById = new Map(allLeady.map((l) => [leadKey(l), l]));
      const freshById = new Map(freshRows.map((l) => [leadKey(l), l]));
      const rowEl = (id) => listEl.querySelector(`.lead[data-lead-id="${CSS.escape(id)}"]`);

      const merged = [];

      // Leady usunięte z bazy znikają z listy — chyba że ktoś ma je właśnie
      // otwarte (wtedy zostają do następnego cyklu).
      allLeady.forEach((lead) => {
        const id = leadKey(lead);
        if (freshById.has(id)) return;
        const el = rowEl(id);
        if (isRowBusy(el)) { merged.push(lead); return; }
        if (el) el.remove();
      });

      freshRows.forEach((freshLead) => {
        const id = leadKey(freshLead);
        const oldLead = oldById.get(id);
        if (!oldLead) {
          merged.push(freshLead);
          if (matchesCurrentFilters(freshLead)) insertRowSorted(listEl, freshLead);
          return;
        }
        if (JSON.stringify(oldLead) === JSON.stringify(freshLead)) {
          merged.push(oldLead);
          return;
        }
        const el = rowEl(id);
        if (isRowBusy(el)) { merged.push(oldLead); return; }
        merged.push(freshLead);
        if (el) {
          // zachowaj lokalny "ptaszek zaopiekowania" przy podmianie wiersza
          const wasChecked = el.querySelector('.close-checkbox')?.checked;
          const newEl = leadRow(freshLead);
          if (wasChecked) {
            newEl.classList.add('zamkniete-local');
            newEl.querySelector('.close-checkbox').checked = true;
          }
          el.replaceWith(newEl);
        }
      });

      merged.sort(byIdLeadaDesc);
      allLeady = merged;
      updateCount();
    }

    async function pollRemote() {
      if (document.hidden) return;
      try {
        const res = await fetch(`${API_BASE}/api/leady`);
        if (!res.ok) return;
        const body = await res.json();
        applyRemoteUpdate((body.data || []).sort(byIdLeadaDesc));
      } catch {
        /* cichy błąd sieci — kolejna próba za POLL_INTERVAL_MS */
      }
    }

    setInterval(pollRemote, POLL_INTERVAL_MS);

    renderNav();
    renderStatusFilterOptions();
    loadLeady();

    // Zakładka Wyceny (assets/wyceny-tab.js) + deep-link ?arkusz=wyceny
    // (m.in. przekierowanie z kafelka Wyceny na ekranie głównym).
    if (window.WycenyTab && NAV_SECTIONS.some((s) => s.key === 'wyceny')) {
      WycenyTab.init({
        apiBase: API_BASE,
        toolbarEl: document.getElementById('wyceny-toolbar'),
        listEl: document.getElementById('wyceny-list'),
        readOnly: CRM_SHEET_LEVELS.wyceny !== 'edit',
      });
    }
    const wantedSection = new URLSearchParams(window.location.search).get('arkusz');
    if (wantedSection) setSection(wantedSection);
    else applySectionVisibility();
  </script>
</body>
