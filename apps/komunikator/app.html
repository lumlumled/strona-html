<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="manifest" href="/assets/manifest.webmanifest">
  <meta name="theme-color" content="#000000">
  <title>Wiadomości</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/topbar.css">
  <link rel="stylesheet" href="shared/wycena-card.css">
  <style>
    :root {
      color-scheme: light dark;
      --surface-1: #ffffff;
      --page: #f5f5f4;
      --text-primary: #111111;
      --text-secondary: #52514e;
      --text-muted: #8a8984;
      --border: rgba(17, 17, 17, 0.12);
      --accent: #111111;
      --accent-contrast: #ffffff;
      --accent-soft: #ececea;
      --good: #0ca30c;
      --bad: #b5433f;
      --warn: #b07a1f;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --surface-1: #161616;
        --page: #0a0a0a;
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --text-muted: #8a8984;
        --border: rgba(255, 255, 255, 0.14);
        --accent: #ffffff;
        --accent-contrast: #0a0a0a;
        --accent-soft: #262626;
        --good: #16c116;
        --bad: #e08585;
        --warn: #e0b165;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--page);
      color: var(--text-primary);
      min-height: 100vh;
    }
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 1rem;
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
      align-items: start;
    }
    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
      .layout.thread-open .sidebar { display: none; }
      .layout:not(.thread-open) .main { display: none; }
    }

    /* ── Lista wątków ── */
    .sidebar { background: var(--surface-1); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .sidebar-head { padding: .9rem 1rem .6rem; display: flex; align-items: center; justify-content: space-between; gap: .5rem; }
    .sidebar-head h1 { font-size: 1.05rem; }
    .tabs { display: flex; gap: .35rem; padding: 0 1rem .7rem; flex-wrap: wrap; }
    .tab {
      border: 1px solid var(--border); background: transparent; color: var(--text-secondary);
      font: inherit; font-size: .78rem; font-weight: 600; padding: .3rem .7rem; border-radius: 999px; cursor: pointer;
    }
    .tab.active { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }
    .thread-list { list-style: none; max-height: calc(100vh - 220px); overflow-y: auto; }
    .thread-item { padding: .7rem 1rem; border-top: 1px solid var(--border); cursor: pointer; display: grid; gap: .15rem; }
    .thread-item:hover { background: var(--accent-soft); }
    .thread-item.selected { background: var(--accent-soft); }
    .thread-top { display: flex; align-items: center; gap: .45rem; }
    .thread-name { font-weight: 600; font-size: .9rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .thread-preview { font-size: .8rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .thread-preview .out { color: var(--text-secondary); }
    .badge {
      font-size: .65rem; font-weight: 700; padding: .1rem .45rem; border-radius: 999px;
      border: 1px solid var(--border); color: var(--text-secondary); white-space: nowrap;
    }
    .badge.attention { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }
    .badge.merge { color: var(--warn); border-color: var(--warn); }
    .empty { padding: 1.2rem 1rem; color: var(--text-muted); font-size: .85rem; }

    /* ── Karty „Do odpisania" ── */
    .layout.cards-mode { grid-template-columns: 1fr; max-width: 720px; }
    .layout.cards-mode .thread-list { display: none; }
    .layout.cards-mode .main { display: none; }
    .layout.cards-mode .sidebar { background: transparent; border: none; border-radius: 0; }
    .cards { display: grid; gap: .9rem; align-content: start; }
    .card {
      background: var(--surface-1); border: 1px solid var(--border); border-radius: 16px;
      padding: 1rem 1.1rem; display: grid; gap: .6rem;
    }
    .card-head { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
    .card-name { font-weight: 700; font-size: .95rem; }
    .card-time { margin-left: auto; font-size: .72rem; color: var(--text-muted); }
    .card-msg {
      justify-self: start; max-width: 100%; background: var(--accent-soft); border-radius: 12px;
      border-bottom-left-radius: 4px; padding: .55rem .8rem; font-size: .9rem; line-height: 1.45;
      white-space: pre-wrap; word-break: break-word;
    }
    .card textarea {
      width: 100%; min-height: 60px; resize: vertical; font: inherit; font-size: .9rem;
      background: var(--page); color: inherit; border: 1px solid var(--border); border-radius: 12px;
      padding: .6rem .75rem; overflow: hidden;
    }
    .card-note { font-size: .74rem; color: var(--text-muted); }
    .card-actions { display: flex; gap: .5rem; flex-wrap: wrap; justify-content: flex-end; }
    .card-actions .btn.left { margin-right: auto; }
    .card-empty { text-align: center; padding: 2.2rem 1rem; color: var(--text-muted); font-size: .95rem; }

    /* ── Rozmowa ── */
    .main { background: var(--surface-1); border: 1px solid var(--border); border-radius: 16px; display: flex; flex-direction: column; min-height: 60vh; }
    /* display:flex wygrywa z atrybutem hidden (reguła UA) — bez tego #placeholder
       „Wybierz wątek…" renderował się POD otwartą rozmową na telefonie. */
    .main[hidden] { display: none; }
    .conv-head { padding: .9rem 1.1rem; border-bottom: 1px solid var(--border); display: grid; gap: .35rem; }
    .conv-title-row { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }
    .back-btn { display: none; border: 1px solid var(--border); background: transparent; color: inherit; border-radius: 999px; font: inherit; font-size: .8rem; padding: .25rem .7rem; cursor: pointer; }
    @media (max-width: 800px) { .back-btn { display: inline-block; } }
    .conv-title { font-size: 1rem; font-weight: 700; }
    .chips { display: flex; gap: .35rem; flex-wrap: wrap; }
    .chip { font-size: .72rem; color: var(--text-secondary); border: 1px solid var(--border); border-radius: 999px; padding: .12rem .55rem; }
    .conv-actions { display: flex; gap: .4rem; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--border); background: transparent; color: inherit; border-radius: 999px;
      font: inherit; font-size: .8rem; font-weight: 600; padding: .35rem .85rem; cursor: pointer;
    }
    .btn.primary { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    .merge-banner {
      margin: .8rem 1.1rem 0; border: 1px solid var(--warn); border-radius: 12px; padding: .7rem .9rem;
      font-size: .85rem; display: grid; gap: .5rem;
    }
    .merge-banner b { color: var(--warn); }
    .merge-actions { display: flex; gap: .4rem; }

    /* Panel wyceny pod przyciskami wątku: kompaktowy wiersz (ID · kwota · data),
       klik rozwija pełną kartę ze zdjęciami (WycenaKarta) + edycję. */
    .conv-wycena { display: grid; gap: .35rem; margin-top: .2rem; }
    .cw-item { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .cw-row { display: flex; align-items: center; gap: .5rem; width: 100%; padding: .45rem .65rem; background: transparent; border: 0; color: inherit; font: inherit; cursor: pointer; text-align: left; }
    .cw-row:hover { background: var(--accent-soft); }
    .cw-id { font-weight: 600; font-size: .85rem; }
    .cw-amount { font-weight: 600; font-size: .85rem; }
    .cw-sep { color: var(--text-muted); }
    .cw-date { font-size: .8rem; color: var(--text-secondary); }
    .cw-chevron { margin-left: auto; color: var(--text-muted); transition: transform .15s ease; font-size: .8rem; }
    .cw-item.open .cw-chevron { transform: rotate(90deg); }
    .cw-card { padding: .2rem .55rem .55rem; border-top: 1px solid var(--border); }
    .cw-new { justify-self: start; font-size: .8rem; color: var(--text-secondary); background: transparent; border: 1px dashed var(--border); border-radius: 999px; padding: .3rem .8rem; cursor: pointer; }
    .cw-new:hover { color: var(--text-primary); border-color: var(--text-secondary); }
    .conv-wycena .lk-empty-note { font-size: .82rem; color: var(--text-secondary); }

    .messages { flex: 1; overflow-y: auto; padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: .5rem; }
    .msg { max-width: 72%; padding: .55rem .8rem; border-radius: 14px; font-size: .9rem; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
    .msg.in { align-self: flex-start; background: var(--accent-soft); border-bottom-left-radius: 4px; }
    .msg.out { align-self: flex-end; background: var(--accent); color: var(--accent-contrast); border-bottom-right-radius: 4px; }
    .msg.internal { align-self: center; max-width: 88%; background: transparent; border: 1px dashed var(--border); color: var(--text-secondary); font-size: .82rem; }
    .msg-time { display: block; font-size: .65rem; opacity: .6; margin-top: .2rem; }

    /* ── Załączniki w dymku ── */
    .msg-att { margin-top: .4rem; }
    .att-img { display: block; max-width: min(260px, 100%); max-height: 300px; border-radius: 10px; cursor: zoom-in; }
    .att-video { display: block; max-width: min(300px, 100%); border-radius: 10px; }
    .att-audio { display: block; max-width: min(280px, 100%); }
    .att-file { display: inline-block; font-size: .82rem; text-decoration: underline; color: inherit; word-break: break-all; }
    .att-chip { display: inline-block; font-size: .72rem; opacity: .75; }
    .att-ai {
      margin-top: .3rem; font-size: .74rem; line-height: 1.4; white-space: pre-wrap;
      background: rgba(127, 127, 127, .16); border-radius: 8px; padding: .35rem .5rem;
    }
    .att-ai summary { cursor: pointer; opacity: .8; user-select: none; }
    .att-ai[open] summary { opacity: 1; margin-bottom: .25rem; }
    .att-ai-body { display: grid; gap: .2rem; justify-items: start; }
    .att-ai button { background: transparent; border: none; cursor: pointer; font-size: .74rem; opacity: .7; padding: 0 .2rem; }
    .att-ai button:hover { opacity: 1; }
    .att-ai textarea {
      width: 100%; min-height: 80px; font: inherit; font-size: .74rem; resize: vertical;
      background: var(--page); color: var(--text-primary); border: 1px solid var(--border); border-radius: 8px; padding: .3rem .4rem;
    }
    .att-ai .att-ai-save { border: 1px solid var(--border); border-radius: 999px; padding: .15rem .6rem; margin-top: .25rem; opacity: .9; }

    .window-note { padding: .4rem 1.1rem; font-size: .78rem; color: var(--text-muted); }
    .window-note.closed { color: var(--bad); font-weight: 600; }

    .composer { border-top: 1px solid var(--border); padding: .8rem 1.1rem; display: grid; gap: .5rem; }
    .composer textarea {
      width: 100%; min-height: 70px; resize: vertical; font: inherit; font-size: .9rem;
      background: var(--page); color: inherit; border: 1px solid var(--border); border-radius: 12px; padding: .6rem .75rem;
      overflow: hidden; /* wysokość dopasowuje autoGrowReply — bez wewnętrznego scrolla */
    }
    .composer-row { display: flex; gap: .5rem; justify-content: flex-end; flex-wrap: wrap; }

    /* ── Notatka ── */
    dialog {
      border: 1px solid var(--border); border-radius: 16px; background: var(--surface-1); color: inherit;
      padding: 1.2rem; max-width: 420px; width: calc(100vw - 2rem);
    }
    dialog::backdrop { background: rgba(0,0,0,.45); }
    dialog h2 { font-size: 1rem; margin-bottom: .8rem; }
    dialog input, dialog textarea {
      width: 100%; font: inherit; font-size: .9rem; background: var(--page); color: inherit;
      border: 1px solid var(--border); border-radius: 10px; padding: .55rem .7rem; margin-bottom: .6rem;
    }
    dialog textarea { min-height: 110px; resize: vertical; }
    .toast {
      position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: var(--accent-contrast); padding: .55rem 1rem; border-radius: 999px;
      font-size: .85rem; font-weight: 600; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 50;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="layout" id="layout">
    <section class="sidebar">
      <div class="sidebar-head">
        <h1>Wiadomości</h1>
        <button class="btn" id="note-btn" title="Notatka z rozmowy telefonicznej">+ Notatka</button>
      </div>
      <div class="tabs" id="tabs">
        <button class="tab active" data-status="reply" id="tab-reply">Do odpisania</button>
        <button class="tab" data-status="main">Rozmowy</button>
        <button class="tab" data-status="notifications">Powiadomienia</button>
        <button class="tab" data-status="closed">Zamknięte</button>
        <button class="tab" data-status="all">Wszystkie</button>
      </div>
      <ul class="thread-list" id="thread-list">
        <li class="empty">Ładowanie…</li>
      </ul>
    </section>

    <section class="main" id="main" hidden>
      <div class="conv-head">
        <div class="conv-title-row">
          <button class="back-btn" id="back-btn">← Lista</button>
          <span class="conv-title" id="conv-title"></span>
          <span class="badge" id="conv-channel"></span>
          <span class="chip" id="conv-llid"></span>
        </div>
        <div class="chips" id="conv-identities"></div>
        <div class="conv-actions">
          <button class="btn" id="btn-waiting">Ignoruj (czeka)</button>
          <button class="btn" id="btn-close">Zamknij wątek</button>
          <button class="btn" id="btn-mute" hidden title="Wycisza nadawcę i uczy filtr na tej treści">Nie chcę widzieć podobnych</button>
          <button class="btn" id="btn-restore" hidden>Pokaż w głównym</button>
          <a class="btn" id="btn-livechat" target="_blank" rel="noopener" hidden>Otwórz w Zernio ↗</a>
        </div>
        <div class="conv-wycena" id="conv-wycena" hidden></div>
      </div>
      <div id="merge-banners"></div>
      <div class="messages" id="messages"></div>
      <div class="window-note" id="window-note" hidden></div>
      <div class="composer">
        <div class="window-note" id="suggestion-note" hidden></div>
        <textarea id="reply-text" placeholder="Napisz odpowiedź…"></textarea>
        <div class="composer-row">
          <button class="btn" id="btn-copy" hidden>Kopiuj treść</button>
          <button class="btn" id="btn-manual" hidden>Wysłane ręcznie</button>
          <button class="btn primary" id="btn-send">Wyślij</button>
        </div>
      </div>
    </section>

    <section class="main" id="placeholder">
      <div class="empty" style="padding:2rem;">Wybierz wątek z listy.</div>
    </section>

    <!-- Karty „Do odpisania": tylko wątki czekające na reakcję, z propozycją
         AI i akcjami na miejscu. Domyślny widok panelu. -->
    <section class="cards" id="cards" hidden></section>
  </div>

  <dialog id="note-dialog">
    <h2>Notatka z rozmowy telefonicznej</h2>
    <form method="dialog" id="note-form">
      <input id="note-phone" type="tel" placeholder="Numer telefonu klienta (np. 604 650 590)" required>
      <textarea id="note-text" placeholder="Treść notatki (Wispr Flow / dyktowanie)…" required></textarea>
      <div class="composer-row">
        <button class="btn" value="cancel">Anuluj</button>
        <button class="btn primary" id="note-save" value="save">Zapisz</button>
      </div>
    </form>
  </dialog>

  <div class="toast" id="toast"></div>

  <script src="shared/topbar.js"></script>
  <script src="shared/wycena-card.js"></script>
  <script src="shared/wycena-editor.js"></script>
  <script>
    'use strict';
    LumTopbar.mount({ active: 'wiadomosci' });

    const API = (window.API_BASE || '') + '/api';
    const CHANNEL_LABELS = {
      messenger: 'Messenger', instagram: 'Instagram', whatsapp: 'WhatsApp',
      tiktok: 'TikTok', phone: 'Telefon', email: 'E-mail', note: 'Notatki',
    };

    const state = {
      statusFilter: 'reply', threads: [], selectedId: null, detail: null,
      suggestion: null, // { id, forThread } — sugestia AI załadowana do composera
    };

    const $ = (id) => document.getElementById(id);

    function toast(msg) {
      const el = $('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2600);
    }

    async function api(path, options = {}) {
      const res = await fetch(API + path, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw Object.assign(new Error(body.error || `Błąd ${res.status}`), { body });
      return body;
    }

    function fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const today = new Date();
      const sameDay = d.toDateString() === today.toDateString();
      return sameDay
        ? d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' })
        : d.toLocaleDateString('pl-PL', { day: 'numeric', month: 'short' }) + ' ' +
          d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
    }

    // ── Lista wątków ──
    async function loadThreads() {
      setMode();
      try {
        const { data } = await api(`/threads?view=${state.statusFilter}`);
        state.threads = data;
        if (state.statusFilter === 'reply') renderCardsDiff();
        else renderThreads();
      } catch (err) {
        if (state.statusFilter === 'reply') toast(`Błąd wczytywania: ${err.message}`);
        else $('thread-list').innerHTML = `<li class="empty">Błąd: ${err.message}</li>`;
      }
    }

    // Widok kart vs klasyczna lista+rozmowa. Karty = domyślny ekran:
    // pokazuje WYŁĄCZNIE to, co czeka na odpowiedź.
    function setMode() {
      const cardsMode = state.statusFilter === 'reply';
      $('layout').classList.toggle('cards-mode', cardsMode);
      $('cards').hidden = !cardsMode;
      if (cardsMode) {
        $('main').hidden = true;
        $('placeholder').hidden = true;
        $('layout').classList.remove('thread-open');
        state.selectedId = null;
      } else if ($('main').hidden) {
        $('placeholder').hidden = false;
      }
    }

    function selectTab(status) {
      state.statusFilter = status;
      document.querySelectorAll('.tab').forEach((t) => t.classList.toggle('active', t.dataset.status === status));
    }

    function renderThreads() {
      const list = $('thread-list');
      if (!state.threads.length) {
        list.innerHTML = '<li class="empty">Pusto — nic do ogarnięcia 🎉</li>';
        return;
      }
      list.innerHTML = '';
      state.threads.forEach((t) => {
        const li = document.createElement('li');
        li.className = 'thread-item' + (t.id === state.selectedId ? ' selected' : '');
        const name = t.customer.display_name || t.customer.public_id || '(bez nazwy)';
        const badges = [];
        if (t.status === 'attention' && t.triage === 'inbox') badges.push('<span class="badge attention">nowe</span>');
        if (t.triage === 'archive') badges.push(`<span class="badge" title="${escapeHtml(t.triage_reason || '')}">odfiltrowane</span>`);
        if (t.triage === 'notification') badges.push(`<span class="badge" title="${escapeHtml(t.triage_reason || '')}">powiadomienie</span>`);
        if (t.has_pending_merge) badges.push('<span class="badge merge">scalenie?</span>');
        const preview = t.last_message
          ? (t.last_message.direction === 'out' ? '<span class="out">Ty: </span>' : '') + escapeHtml(t.last_message.body)
          : '';
        li.innerHTML = `
          <div class="thread-top">
            <span class="thread-name">${escapeHtml(name)}</span>
            ${badges.join('')}
            <span class="badge">${CHANNEL_LABELS[t.channel] || t.channel}</span>
          </div>
          <div class="thread-preview">${preview}</div>`;
        li.addEventListener('click', () => openThread(t.id));
        list.appendChild(li);
      });
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    // ── Karty „Do odpisania" ──
    // Jedna karta = jeden wątek czekający na reakcję (status attention, triage
    // inbox): ostatnia wiadomość klienta + załączniki + propozycja AI + akcje.
    const cardSuggestions = new Map(); // threadId → suggestion_id (pętla uczenia korekt)

    function growTa(ta, min = 60) {
      ta.style.height = 'auto';
      ta.style.height = Math.max(min, ta.scrollHeight + 2) + 'px';
    }

    function updateReplyTabCount(n) {
      $('tab-reply').textContent = n ? `Do odpisania (${n})` : 'Do odpisania';
    }

    function buildCard(t) {
      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.card = t.id;
      el.dataset.inbound = t.last_inbound?.id || '';

      const head = document.createElement('div');
      head.className = 'card-head';
      const name = document.createElement('span');
      name.className = 'card-name';
      name.textContent = t.customer.display_name || t.customer.public_id || '(bez nazwy)';
      const chan = document.createElement('span');
      chan.className = 'badge';
      chan.textContent = CHANNEL_LABELS[t.channel] || t.channel;
      head.append(name, chan);
      if (t.last_inbound?.kind === 'comment') {
        const c = document.createElement('span');
        c.className = 'badge';
        c.textContent = 'komentarz pod postem';
        head.append(c);
      }
      const time = document.createElement('span');
      time.className = 'card-time';
      time.textContent = fmtTime(t.last_inbound?.created_at || t.last_message_at);
      head.append(time);
      el.append(head);

      const msg = document.createElement('div');
      msg.className = 'card-msg';
      msg.textContent = t.last_inbound?.body || '(brak treści)';
      (t.last_inbound?.attachments || []).forEach((a) => msg.appendChild(renderAttachment(a)));
      el.append(msg);

      const ta = document.createElement('textarea');
      ta.placeholder = 'Odpowiedź…';
      ta.addEventListener('input', () => growTa(ta));
      el.append(ta);

      const note = document.createElement('div');
      note.className = 'card-note';
      el.append(note);

      const actions = document.createElement('div');
      actions.className = 'card-actions';

      const openBtn = document.createElement('button');
      openBtn.type = 'button'; openBtn.className = 'btn left'; openBtn.textContent = 'Otwórz rozmowę';
      openBtn.addEventListener('click', () => {
        selectTab('main');
        loadThreads();
        openThread(t.id);
      });

      const skipBtn = document.createElement('button');
      skipBtn.type = 'button'; skipBtn.className = 'btn'; skipBtn.textContent = 'Pomiń';
      skipBtn.title = 'Nie wymaga odpowiedzi - karta znika, wróci gdy klient znów napisze';
      skipBtn.addEventListener('click', async () => {
        skipBtn.disabled = true;
        try {
          await api(`/threads/${t.id}/status`, { method: 'POST', body: JSON.stringify({ status: 'waiting' }) });
          el.remove();
          refreshEmptyCard();
          toast('Pominięte - wróci, jeśli klient znów napisze');
        } catch (err) { toast(err.message); skipBtn.disabled = false; }
      });

      const sendBtn = document.createElement('button');
      sendBtn.type = 'button'; sendBtn.className = 'btn primary'; sendBtn.textContent = 'Wyślij';
      sendBtn.addEventListener('click', async () => {
        const text = ta.value.trim();
        if (!text) return toast('Wpisz odpowiedź');
        sendBtn.disabled = true; skipBtn.disabled = true;
        try {
          const result = await api(`/threads/${t.id}/messages`, {
            method: 'POST',
            body: JSON.stringify({ body: text, suggestion_id: cardSuggestions.get(t.id) || null }),
          });
          el.remove();
          refreshEmptyCard();
          toast(result.saved === false
            ? 'Wysłano do klienta, ale zapis w historii się nie udał - NIE wysyłaj ponownie'
            : 'Wysłano');
        } catch (err) {
          sendBtn.disabled = false; skipBtn.disabled = false;
          if (err.body?.window_closed) note.textContent = `⚠️ ${err.message} Kliknij „Otwórz rozmowę”, tam jest tryb ręczny.`;
          else toast(err.message);
        }
      });

      actions.append(openBtn, skipBtn, sendBtn);
      el.append(actions);
      return el;
    }

    function refreshEmptyCard() {
      const wrap = $('cards');
      const n = wrap.querySelectorAll('[data-card]').length;
      updateReplyTabCount(n);
      let empty = wrap.querySelector('.card-empty');
      if (!n) {
        if (!empty) {
          empty = document.createElement('div');
          empty.className = 'card card-empty';
          empty.textContent = '🎉 Nic do odpisania. Nowe karty pojawią się tu same.';
          wrap.append(empty);
        }
      } else if (empty) {
        empty.remove();
      }
    }

    // Odświeżanie bez kasowania pracy: nowe wątki dochodzą na górę; znikają
    // (albo przebudowują się po nowej wiadomości klienta) tylko karty
    // NIETKNIĘTE — auto-refresh nie może zjeść pisanej odpowiedzi.
    function cardPristine(node) {
      const ta = node.querySelector('textarea');
      return !ta || !ta.value.trim() || ta.value === node.dataset.suggestion;
    }

    function renderCardsDiff() {
      const wrap = $('cards');
      const have = new Map([...wrap.querySelectorAll('[data-card]')].map((n) => [n.dataset.card, n]));
      const ids = new Set(state.threads.map((t) => String(t.id)));

      have.forEach((node, id) => {
        if (!ids.has(id) && cardPristine(node)) node.remove();
      });

      const fresh = [];
      state.threads.forEach((t) => {
        const node = have.get(String(t.id));
        if (!node) return;
        const inboundId = t.last_inbound?.id || '';
        if (node.dataset.inbound !== inboundId && cardPristine(node)) {
          const rebuilt = buildCard(t);
          node.replaceWith(rebuilt);
          fresh.push(t);
        }
      });

      state.threads.slice().reverse().forEach((t) => {
        if (have.has(String(t.id))) return;
        wrap.prepend(buildCard(t));
        fresh.unshift(t);
      });

      refreshEmptyCard();
      if (fresh.length) loadCardSuggestions(fresh);
    }

    // Propozycje AI po kolei, nie równolegle — każda to wywołanie modelu,
    // a przy załącznikach endpoint sugestii najpierw dociąga ich analizę.
    const suggestQueue = [];
    let suggestQueueRunning = false;
    function loadCardSuggestions(items) {
      suggestQueue.push(...items);
      if (suggestQueueRunning) return;
      suggestQueueRunning = true;
      (async () => {
        while (suggestQueue.length) {
          const t = suggestQueue.shift();
          const node = document.querySelector(`[data-card="${t.id}"]`);
          if (!node) continue;
          const ta = node.querySelector('textarea');
          const note = node.querySelector('.card-note');
          if (ta.value.trim()) continue;
          note.textContent = '✨ AI pisze propozycję…';
          try {
            const s = await api(`/threads/${t.id}/suggestion`, { method: 'POST' });
            if (!node.isConnected) continue;
            cardSuggestions.set(t.id, s.id);
            node.dataset.suggestion = s.text;
            if (!ta.value.trim()) { ta.value = s.text; growTa(ta); }
            note.textContent = '✨ Propozycja AI - popraw śmiało, każda poprawka uczy system.';
          } catch (err) {
            if (node.isConnected) note.textContent = `Sugestia niedostępna: ${err.message}`;
          }
        }
        suggestQueueRunning = false;
      })();
    }

    // ── Rozmowa ──
    // Pole odpowiedzi rośnie do wysokości treści (sugestia AI ma być widoczna
    // w całości, bez scrollowania wewnątrz wąskiego pola).
    function autoGrowReply() {
      const ta = $('reply-text');
      ta.style.height = 'auto';
      ta.style.height = Math.max(70, ta.scrollHeight + 2) + 'px';
    }

    async function openThread(id) {
      const switched = state.selectedId !== id;
      state.selectedId = id;
      renderThreads();
      if (switched) {
        state.suggestion = null;
        $('reply-text').value = '';
        autoGrowReply();
        $('suggestion-note').hidden = true;
      }
      try {
        state.detail = await api(`/threads/${id}`);
        renderDetail();
        if (switched) maybeLoadSuggestion();
      } catch (err) {
        toast(err.message);
      }
    }

    // Sugestia AI ładuje się lazy: gdy ostatnia wiadomość jest OD klienta
    // (DM albo komentarz — Zernio daje pełną treść, jest na co odpowiadać).
    // Przy zamkniętym oknie też: wtedy sugestię kopiuje się i wysyła ręcznie.
    async function maybeLoadSuggestion() {
      const d = state.detail;
      if (!d) return;
      const last = d.messages[d.messages.length - 1];
      if (d.send?.mode === 'none' || !last || last.direction !== 'in') return;

      const note = $('suggestion-note');
      note.hidden = false;
      note.textContent = '✨ AI pisze propozycję odpowiedzi…';
      const threadId = d.thread.id;
      try {
        const s = await api(`/threads/${threadId}/suggestion`, { method: 'POST' });
        if (state.selectedId !== threadId) return; // użytkownik zdążył zmienić wątek
        state.suggestion = { id: s.id, forThread: threadId };
        if (!$('reply-text').value.trim()) { $('reply-text').value = s.text; autoGrowReply(); }
        note.textContent = '✨ Propozycja AI — popraw śmiało przed wysłaniem (każda poprawka uczy system).';
      } catch (err) {
        if (state.selectedId === threadId) note.textContent = `Sugestia AI niedostępna: ${err.message}`;
      }
    }

    function renderDetail() {
      const d = state.detail;
      $('placeholder').hidden = true;
      $('main').hidden = false;
      $('layout').classList.add('thread-open');

      $('conv-title').textContent = d.customer.display_name || d.customer.public_id;
      $('conv-llid').textContent = d.customer.public_id;
      $('conv-channel').textContent = CHANNEL_LABELS[d.thread.channel] || d.thread.channel;

      // Fallback ręczny: manual_only → prosto do miejsca odpowiedzi (film
      // TikTok / wątek w Gmailu); rozmowy z Zernio → ich inbox.
      const liveChat = $('btn-livechat');
      if ((d.send?.mode === 'manual_only' || d.send?.mode === 'gmail') && d.send.reply_url) {
        liveChat.hidden = false;
        liveChat.href = d.send.reply_url;
        liveChat.textContent = d.send.reply_label || 'Otwórz źródło ↗';
      } else if (d.thread.meta?.zernio) {
        liveChat.hidden = false;
        liveChat.href = 'https://zernio.com/dashboard/inbox';
        liveChat.textContent = 'Otwórz w Zernio ↗';
      } else {
        liveChat.hidden = true;
      }

      const idLabels = { fb: 'FB', ig: 'IG', wa: 'WA', tt: 'TikTok', phone: 'tel', email: 'email' };
      const triageChip = d.thread.triage && d.thread.triage !== 'inbox'
        ? `<span class="chip" title="${escapeHtml(d.thread.triage_reason || '')}">🔻 ${d.thread.triage === 'archive' ? 'odfiltrowane' : 'powiadomienie'}${d.thread.triage_reason ? ': ' + escapeHtml(d.thread.triage_reason) : ''}</span>`
        : '';
      $('conv-identities').innerHTML = triageChip + d.customer.identities
        .map((i) => `<span class="chip">${idLabels[i.type] || i.type}: ${escapeHtml(['fb', 'ig', 'tt'].includes(i.type) ? '✓ połączono' : i.value)}${i.confirmed ? '' : ' (?)'}</span>`)
        .join('');

      loadWycenaSection(d.customer);

      // Wyciszanie / przywracanie: mute na widocznych, restore na odfiltrowanych.
      // "Nie chcę widzieć podobnych" dostępne wszędzie (także w Powiadomieniach
      // i Wszystkich — tam najczęściej wycisza się automaty typu Make/InPost).
      $('btn-mute').hidden = false;
      $('btn-restore').hidden = d.thread.triage === 'inbox';

      // Propozycje scaleń
      const banners = $('merge-banners');
      banners.innerHTML = '';
      (d.merge_proposals || []).forEach((p) => {
        const div = document.createElement('div');
        div.className = 'merge-banner';
        const who = p.candidate ? `${escapeHtml(p.candidate.display_name || '')} (${p.candidate.public_id})` : 'inny klient';
        div.innerHTML = `
          <div><b>Wykryto prawdopodobne dopasowanie:</b> ten wątek może należeć do ${who}.
          ${p.evidence?.type ? `Wspólny identyfikator: ${escapeHtml(p.evidence.type)} ${escapeHtml(p.evidence.value || '')}.` : ''}
          Potwierdzasz scalenie?</div>
          <div class="merge-actions">
            <button class="btn primary" data-act="confirm">Tak, to ten sam klient</button>
            <button class="btn" data-act="reject">Nie, osobni</button>
          </div>`;
        div.querySelector('[data-act="confirm"]').addEventListener('click', async () => {
          try { await api(`/merge-proposals/${p.id}/confirm`, { method: 'POST' }); toast('Scalono'); openThread(d.thread.id); loadThreads(); }
          catch (err) { toast(err.message); }
        });
        div.querySelector('[data-act="reject"]').addEventListener('click', async () => {
          try { await api(`/merge-proposals/${p.id}/reject`, { method: 'POST' }); toast('Odrzucono'); openThread(d.thread.id); loadThreads(); }
          catch (err) { toast(err.message); }
        });
        banners.appendChild(div);
      });

      // Wiadomości (+ załączniki z kom_attachments pod dymkiem)
      const wrap = $('messages');
      wrap.innerHTML = '';
      const attByMsg = new Map();
      (d.attachments || []).forEach((a) => {
        if (!attByMsg.has(a.message_id)) attByMsg.set(a.message_id, []);
        attByMsg.get(a.message_id).push(a);
      });
      d.messages.forEach((m) => {
        const div = document.createElement('div');
        div.className = `msg ${m.direction}`;
        const label = m.direction === 'internal' ? '📝 ' : (m.meta?.kind === 'comment' ? '💬 [komentarz pod postem] ' : '');
        const marks = [
          m.meta?.manual_business_suite ? 'ręcznie' : '',
          m.meta?.human_agent ? 'human agent' : '',
          m.meta?.private_reply_to ? 'private reply' : '',
        ].filter(Boolean).map((x) => ` · ${x}`).join('');
        const atts = attByMsg.get(m.id) || [];
        // Sam placeholder "[zdjęcie]" nie wnosi nic, gdy niżej renderuje się
        // prawdziwy załącznik (albo czytelny chip o jego stanie).
        const placeholderOnly = atts.length
          && /^(\[[^\]]+\])( \[[^\]]+\])*$/.test((m.body || '').trim());
        div.innerHTML = `${label}${placeholderOnly ? '' : escapeHtml(m.body)}`;
        atts.forEach((a) => div.appendChild(renderAttachment(a)));
        const time = document.createElement('span');
        time.className = 'msg-time';
        time.textContent = `${fmtTime(m.created_at)}${marks}`;
        div.appendChild(time);
        wrap.appendChild(div);
      });
      wrap.scrollTop = wrap.scrollHeight;

      // Tryb wysyłki — liczony na serwerze (computeSendState), UI tylko
      // dobiera komunikat: open → zwykły DM; human_agent → tag HUMAN_AGENT
      // (FB/IG do 7 dni); private_reply → DM do autora komentarza (1 na
      // komentarz, 7 dni); closed → fallback ręczny przez inbox Zernio.
      const note = $('window-note');
      const sendBtn = $('btn-send');
      const manualBtn = $('btn-manual');
      const copyBtn = $('btn-copy');
      const send = d.send || { mode: 'none' };
      const hoursLeft = (iso) => Math.max(0, (new Date(iso) - new Date()) / 36e5);
      const daysLeft = (iso) => Math.max(0, hoursLeft(iso) / 24);
      note.hidden = false;
      note.className = 'window-note';
      sendBtn.disabled = false;
      manualBtn.hidden = true;
      copyBtn.hidden = true;

      if (send.mode === 'none') {
        note.textContent = 'Kanał bez wysyłania z panelu — odpowiedz telefonicznie albo zapisz notatkę.';
        sendBtn.disabled = true;
      } else if (send.mode === 'manual_only') {
        note.textContent = send.note || 'Skopiuj treść, odpowiedz u źródła i kliknij „Wysłane ręcznie”.';
        sendBtn.disabled = true;
        manualBtn.hidden = false;
        copyBtn.hidden = false;
      } else if (send.mode === 'gmail') {
        const skrzynka = send.email?.mailbox ? ` ze skrzynki ${send.email.mailbox}` : '';
        note.textContent = `Odpowiedź pójdzie mailem do ${send.email?.to || 'klienta'}${skrzynka}, w tym samym wątku Gmaila.`;
      } else if (send.mode === 'open') {
        note.textContent = `Okno odpowiedzi Meta zamyka się za ${hoursLeft(send.window_expires_at).toFixed(1)} h.`;
      } else if (send.mode === 'human_agent') {
        note.textContent = `Okno 24 h minęło — wyślemy z tagiem HUMAN_AGENT (odpowiedź człowieka, zostało ${daysLeft(send.human_agent_expires_at).toFixed(1)} dnia).`;
      } else if (send.mode === 'private_reply') {
        note.textContent = `Komentarz pod postem — odpowiedź pójdzie jako prywatna wiadomość do autora (1 na komentarz, zostało ${daysLeft(send.comment_reply_expires_at).toFixed(1)} dnia).`;
      } else {
        note.className = 'window-note closed';
        note.textContent = send.reason === 'already_replied'
          ? 'Private reply do tego komentarza już poszedł — Meta pozwala na jeden. Czekamy, aż klient odpisze w DM.'
          : send.reason === 'no_inbound'
            ? 'Klient nie napisał jeszcze DM — nie da się zacząć rozmowy z panelu.'
            : 'Okno Meta zamknięte (7 dni minęło) — skopiuj treść, kliknij „Otwórz w Zernio”, odpowiedz tam ręcznie i wróć kliknąć „Wysłane ręcznie”.';
        sendBtn.disabled = true;
        manualBtn.hidden = false;
        copyBtn.hidden = false;
      }
    }

    // ── Wycena klienta ──
    // Ten sam widok ze zdjęciami co panel Wyceny i karta leada. Dopasowanie po
    // telefonie/e-mailu z tożsamości wątku → GET /api/wyceny/dla-leada (sam
    // obcina 48). Edycja/utworzenie zapisuje do bazy = cross-ref z panelem Wyceny.
    // apiBase = window.API_BASE ('/wiadomosci' na prod), bo WycenaKarta/Editor
    // budują ścieżki jako `${apiBase}/api/wyceny/...`.
    const WYCENA_API_BASE = window.API_BASE || '';

    // Kwota wyceny: sprzedaż (jeśli już złożone zamówienie) albo proponowana.
    function wycenaKwota(w) {
      const v = w._cena_finalna ?? w.kwota_sprzedazy_brutto ?? w.kwota_proponowana_brutto;
      if (v === null || v === undefined || v === '') return '';
      const n = Number(v);
      if (!Number.isFinite(n)) return '';
      return n.toLocaleString('pl-PL', { maximumFractionDigits: 2 }) + ' zł';
    }

    // "Data wysłania" = created_at (moment powstania/wysłania wyceny; osobnej
    // kolumny "wysłano" w bazie nie ma).
    function wycenaData(w) {
      if (!w.created_at) return '';
      const d = new Date(w.created_at);
      if (isNaN(d)) return '';
      return d.toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    async function loadWycenaSection(customer) {
      const box = $('conv-wycena');
      const phone = customer.phone || '';
      const email = customer.email || '';

      // Bez telefonu i e-maila nie ma jak dopasować wyceny (kanały społecznościowe
      // bez potwierdzonego kontaktu) — chowamy panel zamiast pokazywać pustkę.
      if (!phone && !email) { box.hidden = true; box.innerHTML = ''; return; }
      box.hidden = false;
      box.innerHTML = '<p class="lk-empty-note">Wczytywanie wyceny…</p>';

      if (!window.WycenaKarta) {
        box.innerHTML = '<p class="lk-empty-note">Widok wyceny się nie wczytał — odśwież stronę.</p>';
        return;
      }

      const reload = () => loadWycenaSection(customer);
      const prefill = () => ({
        imie_nazwisko: customer.display_name || '',
        telefon_e164: phone,
        email,
      });

      function addNewButton(label) {
        if (!window.WycenaEditor) return;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'cw-new';
        btn.textContent = label;
        btn.addEventListener('click', () => window.WycenaEditor.openNew({ apiBase: WYCENA_API_BASE, prefill: prefill(), onSaved: reload }));
        box.appendChild(btn);
      }

      // Kompaktowy wiersz: #ID · kwota · data. Klik rozwija pełną kartę (leniwie).
      function addWycenaItem(wycena) {
        const item = document.createElement('div');
        item.className = 'cw-item';

        const row = document.createElement('button');
        row.type = 'button';
        row.className = 'cw-row';
        const kwota = wycenaKwota(wycena);
        const data = wycenaData(wycena);
        row.innerHTML = `<span class="cw-id">Wycena #${escapeHtml(String(wycena.id))}</span>`
          + (kwota ? `<span class="cw-sep">·</span><span class="cw-amount">${escapeHtml(kwota)}</span>` : '')
          + (data ? `<span class="cw-sep">·</span><span class="cw-date">${escapeHtml(data)}</span>` : '')
          + `<span class="cw-chevron">▶</span>`;

        const card = document.createElement('div');
        card.className = 'cw-card';
        card.hidden = true;
        let built = false;

        row.addEventListener('click', () => {
          const open = card.hidden;
          card.hidden = !open;
          item.classList.toggle('open', open);
          if (open && !built) {
            built = true;
            const { el: cardEl } = window.WycenaKarta.buildBody(wycena, {
              apiBase: WYCENA_API_BASE,
              mode: 'crm',
              onChanged: reload,
              onEdit: window.WycenaEditor
                ? (w) => window.WycenaEditor.openEdit(w, { apiBase: WYCENA_API_BASE, onSaved: reload })
                : null,
            });
            card.appendChild(cardEl);
          }
        });

        item.append(row, card);
        box.appendChild(item);
      }

      try {
        const params = new URLSearchParams();
        if (phone) params.set('telefon', phone);
        if (email) params.set('email', email);
        const res = await fetch(`${WYCENA_API_BASE}/api/wyceny/dla-leada?${params.toString()}`);
        if (res.status === 401 || res.status === 403) {
          box.innerHTML = '<p class="lk-empty-note">Wyceny widoczne w panelu Wyceny (brak dostępu z tego widoku).</p>';
          return;
        }
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `Błąd ${res.status}`);
        const list = Array.isArray(data.data) ? data.data : [];

        box.innerHTML = '';
        if (!list.length) {
          box.appendChild(Object.assign(document.createElement('p'), {
            className: 'lk-empty-note', textContent: 'Brak wyceny dla tego kontaktu.',
          }));
          addNewButton('+ Utwórz wycenę');
          return;
        }

        list.forEach(addWycenaItem);
        addNewButton('+ Nowa wycena');
      } catch (err) {
        box.innerHTML = `<p class="lk-empty-note">Błąd wczytywania: ${escapeHtml(err.message)}</p>`;
      }
    }

    // ── Załączniki: render + edycja opisu AI ──
    // Opis AI przy załączniku to kontekst dla sugestii — poprawka Antoniego
    // (✏️) nadpisuje analizę i od razu wchodzi do promptu (PATCH /attachments).
    function renderAttachment(a) {
      const box = document.createElement('div');
      box.className = 'msg-att';
      const fileUrl = `${API}/attachments/${a.id}/file`;
      if (a.status === 'stored' && a.type === 'image') {
        const link = document.createElement('a');
        link.href = fileUrl; link.target = '_blank'; link.rel = 'noopener';
        const img = document.createElement('img');
        img.className = 'att-img'; img.loading = 'lazy'; img.src = fileUrl; img.alt = a.filename || 'zdjęcie';
        link.appendChild(img);
        box.appendChild(link);
      } else if (a.status === 'stored' && a.type === 'video') {
        const v = document.createElement('video');
        v.className = 'att-video'; v.controls = true; v.preload = 'metadata'; v.src = fileUrl;
        box.appendChild(v);
      } else if (a.status === 'stored' && a.type === 'audio') {
        const au = document.createElement('audio');
        au.className = 'att-audio'; au.controls = true; au.preload = 'metadata'; au.src = fileUrl;
        box.appendChild(au);
      } else if (a.status === 'stored') {
        const link = document.createElement('a');
        link.className = 'att-file'; link.href = fileUrl; link.target = '_blank'; link.rel = 'noopener';
        link.textContent = `📎 ${a.filename || 'plik'}`;
        box.appendChild(link);
      } else if (a.status === 'skipped' && a.original_url) {
        // Share (reel/post/link) — nie plik; zostaje link z tytułem.
        const link = document.createElement('a');
        link.className = 'att-file'; link.href = a.original_url; link.target = '_blank'; link.rel = 'noopener';
        link.textContent = `🔗 ${a.title || 'udostępniona treść'}`;
        box.appendChild(link);
      } else if (a.status === 'pending' || a.status === 'fetching') {
        const chip = document.createElement('span');
        chip.className = 'att-chip';
        chip.textContent = '⏳ pobieram załącznik…';
        box.appendChild(chip);
      } else {
        const chip = document.createElement('span');
        chip.className = 'att-chip';
        chip.textContent = '⚠️ załącznik niedostępny (link Mety wygasł, zanim zdążyliśmy go pobrać)';
        box.appendChild(chip);
      }

      // Opis AI domyślnie ZWINIĘTY (zdjęcie mówi samo za siebie) — rozwijany
      // na życzenie; w środku edycja ✏️ (poprawka = lepszy kontekst sugestii).
      if (a.ai_summary) {
        const det = document.createElement('details');
        det.className = 'att-ai';
        const sum = document.createElement('summary');
        sum.textContent = `🤖 opis AI${a.ai_corrected ? ' ✔' : ''}`;
        det.appendChild(sum);
        const body = document.createElement('div');
        body.className = 'att-ai-body';
        const txt = document.createElement('span');
        txt.textContent = `${a.ai_summary}${a.ai_corrected ? '\n✔ poprawione ręcznie' : ''}`;
        const btn = document.createElement('button');
        btn.type = 'button'; btn.textContent = '✏️';
        btn.title = 'Popraw opis - AI użyje poprawki jako kontekstu odpowiedzi';
        btn.addEventListener('click', () => editAiSummary(body, a));
        body.appendChild(txt);
        body.appendChild(btn);
        det.appendChild(body);
        box.appendChild(det);
      } else if (a.ai_status === 'pending' || a.ai_status === 'running') {
        const chip = document.createElement('span');
        chip.className = 'att-chip';
        chip.textContent = '🤖 analiza w toku…';
        box.appendChild(chip);
      }
      return box;
    }

    function editAiSummary(container, a) {
      container.innerHTML = '';
      const ta = document.createElement('textarea');
      ta.value = a.ai_summary || '';
      const save = document.createElement('button');
      save.type = 'button'; save.className = 'att-ai-save'; save.textContent = 'Zapisz opis';
      save.addEventListener('click', async () => {
        const val = ta.value.trim();
        if (!val) return toast('Opis nie może być pusty');
        save.disabled = true;
        try {
          await api(`/attachments/${a.id}`, { method: 'PATCH', body: JSON.stringify({ ai_summary: val }) });
          toast('Opis zapisany - AI dostanie go w kontekście');
          if (state.detail) openThread(state.detail.thread.id);
        } catch (err) {
          toast(err.message);
          save.disabled = false;
        }
      });
      container.appendChild(ta);
      container.appendChild(save);
      ta.focus();
    }

    // ── Akcje ──
    $('btn-send').addEventListener('click', async () => {
      const text = $('reply-text').value.trim();
      if (!text || !state.detail) return;
      $('btn-send').disabled = true;
      try {
        const suggestionId = state.suggestion?.forThread === state.detail.thread.id ? state.suggestion.id : null;
        const result = await api(`/threads/${state.detail.thread.id}/messages`, {
          method: 'POST',
          body: JSON.stringify({ body: text, suggestion_id: suggestionId }),
        });
        state.suggestion = null;
        $('suggestion-note').hidden = true;
        $('reply-text').value = '';
        autoGrowReply();
        // saved:false = wiadomość POSZŁA do klienta, tylko zapis historii padł —
        // absolutnie nie klikać "Wyślij" drugi raz.
        toast(result.saved === false
          ? 'Wysłano do klienta, ale zapis w historii się nie udał - NIE wysyłaj ponownie'
          : 'Wysłano');
        openThread(state.detail.thread.id);
        loadThreads();
      } catch (err) {
        if (err.body?.window_closed) { toast(err.message); renderDetail(); }
        else toast(err.message);
      } finally {
        $('btn-send').disabled = false;
      }
    });

    $('btn-copy').addEventListener('click', async () => {
      const text = $('reply-text').value.trim();
      if (!text) return toast('Brak treści do skopiowania');
      try {
        await navigator.clipboard.writeText(text);
        toast('Skopiowano — wklej w inboxie Zernio');
      } catch {
        $('reply-text').select();
        document.execCommand('copy');
        toast('Skopiowano');
      }
    });

    $('btn-manual').addEventListener('click', async () => {
      const text = $('reply-text').value.trim();
      if (!text || !state.detail) return toast('Wpisz treść, którą wysłałeś ręcznie');
      try {
        // suggestion_id jak przy wysyłce z panelu — ręczna wysyłka (mail,
        // TikTok) też rozlicza sugestię i uczy korpus, gdy treść się różni.
        const suggestionId = state.suggestion?.forThread === state.detail.thread.id ? state.suggestion.id : null;
        await api(`/threads/${state.detail.thread.id}/manual-sent`, {
          method: 'POST',
          body: JSON.stringify({ body: text, suggestion_id: suggestionId }),
        });
        state.suggestion = null;
        $('suggestion-note').hidden = true;
        $('reply-text').value = '';
        autoGrowReply();
        toast('Dopisano do historii');
        openThread(state.detail.thread.id);
        loadThreads();
      } catch (err) { toast(err.message); }
    });

    $('reply-text').addEventListener('input', autoGrowReply);

    $('btn-waiting').addEventListener('click', () => setThreadStatus('waiting', 'Wątek czeka'));
    $('btn-close').addEventListener('click', () => setThreadStatus('closed', 'Zamknięto wątek'));

    $('btn-mute').addEventListener('click', async () => {
      if (!state.detail) return;
      try {
        await api(`/threads/${state.detail.thread.id}/mute`, { method: 'POST' });
        toast('Wyciszono — podobne nie będą się pokazywać');
        loadThreads();
        $('main').hidden = true;
        $('placeholder').hidden = false;
        $('layout').classList.remove('thread-open');
        state.selectedId = null;
      } catch (err) { toast(err.message); }
    });

    $('btn-restore').addEventListener('click', async () => {
      if (!state.detail) return;
      try {
        await api(`/threads/${state.detail.thread.id}/triage`, { method: 'POST', body: JSON.stringify({ triage: 'inbox' }) });
        toast('Przywrócono do głównego widoku');
        openThread(state.detail.thread.id);
        loadThreads();
      } catch (err) { toast(err.message); }
    });

    async function setThreadStatus(status, msg) {
      if (!state.detail) return;
      try {
        await api(`/threads/${state.detail.thread.id}/status`, { method: 'POST', body: JSON.stringify({ status }) });
        toast(msg);
        loadThreads();
        $('main').hidden = true;
        $('placeholder').hidden = false;
        $('layout').classList.remove('thread-open');
        state.selectedId = null;
      } catch (err) { toast(err.message); }
    }

    $('back-btn').addEventListener('click', () => {
      $('layout').classList.remove('thread-open');
      $('main').hidden = true;
      $('placeholder').hidden = false;
      state.selectedId = null;
      renderThreads();
    });

    // ── Notatka ──
    $('note-btn').addEventListener('click', () => $('note-dialog').showModal());
    $('note-form').addEventListener('submit', async (e) => {
      if (e.submitter?.value !== 'save') return;
      e.preventDefault();
      try {
        const result = await api('/notes', {
          method: 'POST',
          body: JSON.stringify({ phone: $('note-phone').value, text: $('note-text').value }),
        });
        $('note-dialog').close();
        $('note-phone').value = '';
        $('note-text').value = '';
        toast(`Notatka zapisana (${result.customer})`);
        loadThreads();
      } catch (err) { toast(err.message); }
    });

    // ── Zakładki ──
    $('tabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.tab');
      if (!btn) return;
      selectTab(btn.dataset.status);
      loadThreads();
    });

    // Deep-link z hubu/alertu watchdoga: /wiadomosci/?klient=LL-00042 (albo
    // ?watek=<id>). Otwiera wątek tego klienta — przełączamy na widok
    // „Wszystkie", żeby wątek na pewno był na liście (też zamknięty/odfiltrowany).
    async function openFromUrl() {
      let klient = null, watek = null;
      try {
        const p = new URLSearchParams(window.location.search);
        klient = p.get('klient');
        watek = p.get('watek');
      } catch (_) { /* brak URL API — zwykłe wczytanie */ }

      if ((klient || (watek && /^\d+$/.test(watek)))) {
        selectTab('all');
        await loadThreads();
        if (watek && /^\d+$/.test(watek)) { openThread(Number(watek)); return; }
        const t = state.threads.find((x) => x.customer && x.customer.public_id === klient);
        if (t) { openThread(t.id); return; }
      }
      loadThreads();
    }

    openFromUrl();
    setInterval(loadThreads, 30000); // odśwież listę co 30 s
  </script>
</body>
</html>
