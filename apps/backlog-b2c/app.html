      lead.className = 'lead' + (c.zamkniete ? ' zamkniete' : '');
      lead.dataset.order = orderIndex || 0;

      const summary = document.createElement('summary');

      const chevron = document.createElement('span');
      chevron.className = 'chevron';
      summary.appendChild(chevron);

      if (c.lp !== undefined) {
        const lp = document.createElement('span');
        lp.className = 'lp';
        lp.textContent = c.lp;
        summary.appendChild(lp);
      }

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'close-checkbox';
      checkbox.checked = Boolean(c.zamkniete);
      checkbox.title = 'Zamknięte (tylko lokalnie, nie zapisuje się do Supabase)';
      checkbox.addEventListener('click', (e) => e.stopPropagation());
      checkbox.addEventListener('change', () => {
        setLeadClosed(c.lp, checkbox.checked);
      });
      summary.appendChild(checkbox);

      if (c.lp !== undefined) {
        if (!leadInstancesByLp.has(c.lp)) leadInstancesByLp.set(c.lp, []);
        leadInstancesByLp.get(c.lp).push({ lead, checkbox });
      }

      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = c.imie || '(brak nazwiska)';
      summary.appendChild(name);

      const contactRow = document.createElement('span');
      contactRow.className = 'contact-row';

      if (c.telefon) {
        const sep = document.createElement('span');
        sep.className = 'phone-sep';
        sep.textContent = '–';
        contactRow.appendChild(sep);

        const phone = document.createElement('a');
        phone.className = 'phone';
        phone.href = `tel:${c.telefon.replace(/\s+/g, '')}`;
        phone.textContent = c.telefon;
        phone.addEventListener('click', (e) => e.stopPropagation());
        contactRow.appendChild(phone);

        if (c.na_jutro) {
          const naJutroDot = document.createElement('span');
          naJutroDot.className = 'na-jutro-dot';
          naJutroDot.title = 'Z wczoraj — nie zamknięte';
          contactRow.appendChild(naJutroDot);
        }

        contactRow.appendChild(makeCopyButton(c.telefon));

        // Kręcące się kółko "rozmowa w analizie" — widoczne między odłożeniem
        // słuchawki a końcem analizy GPT (patrz pollRozmowyWToku). Stan
        // startowy z rozmowyWTokuActive, potem żywo z rejestru.
        const rozmowaSpinner = document.createElement('span');
        rozmowaSpinner.className = 'rozmowa-spinner';
        rozmowaSpinner.title = 'Rozmowa w analizie…';
        rozmowaSpinner.style.display = 'none';
        contactRow.appendChild(rozmowaSpinner);
        const spinnerPhoneKey = normalizePhone(c.telefon);
        if (spinnerPhoneKey) {
          const setSpinner = (on) => { rozmowaSpinner.style.display = on ? '' : 'none'; };
          if (!spinnerUpdatersByPhone.has(spinnerPhoneKey)) spinnerUpdatersByPhone.set(spinnerPhoneKey, []);
          spinnerUpdatersByPhone.get(spinnerPhoneKey).push(setSpinner);
          setSpinner(rozmowyWTokuActive.has(spinnerPhoneKey));
        }

        // Najbliższa akcja — pigułka "co dalej z tym leadem" widoczna na
        // zwiniętym case'ie. Żywa w ciągu dnia (patrz refreshAkcje), klik =
        // ręczna edycja, × w edytorze = skasowanie.
        const akcjaBtn = document.createElement('button');
        akcjaBtn.type = 'button';
        akcjaBtn.className = 'akcja-pill';
        akcjaBtn.style.display = 'none';
        const akcjaArrow = document.createElement('span');
        akcjaArrow.className = 'akcja-strzalka';
        akcjaArrow.textContent = '→';
        const akcjaText = document.createElement('span');
        akcjaText.className = 'akcja-tekst';
        // Ptaszek "zrobione dziś" — pojawia się po najechaniu na pigułkę,
        // klik odhacza akcję bez otwierania edytora (serwer czyści pole,
        // loguje wykonanie i dopisuje "[Akcja] Zrobione: ..." do Historii).
        const akcjaDone = document.createElement('span');
        akcjaDone.className = 'akcja-done';
        akcjaDone.textContent = '✓';
        akcjaDone.title = 'Zrobione dziś — odhacz akcję';
        akcjaDone.addEventListener('click', async (ev) => {
          ev.stopPropagation();
          ev.preventDefault();
          akcjaBtn.disabled = true;
          try {
            const res = await fetch(`${API_BASE}/api/leady/akcja`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ telefon: c.telefon, akcja: '', wykonane: true }),
            });
            const resBody = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(resBody.error || `Błąd ${res.status}`);
            applyAkcjaToPhone(normalizePhone(c.telefon), null);
          } catch (err) {
            alert(`Nie odhaczono akcji: ${err.message}`);
          } finally {
            akcjaBtn.disabled = false;
          }
        });
        akcjaBtn.append(akcjaArrow, akcjaText, akcjaDone);
        contactRow.appendChild(akcjaBtn);

        let biezacaAkcja = null;
        const applyAkcja = (a) => {
          biezacaAkcja = a && a.akcja ? a : null;
          if (!biezacaAkcja) {
            akcjaBtn.style.display = 'none';
            return;
          }
          akcjaBtn.style.display = '';
          akcjaText.textContent = biezacaAkcja.akcja;
          akcjaBtn.title = ['Najbliższa akcja', biezacaAkcja.termin, biezacaAkcja.owner].filter(Boolean).join(' · ') + ' — kliknij, żeby edytować';
          akcjaBtn.classList.toggle('is-overdue', isOverdueTermin(biezacaAkcja.termin));
        };

        akcjaBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          e.preventDefault();
          if (contactRow.querySelector('.akcja-edit')) return;
          const editWrap = document.createElement('span');
          editWrap.className = 'akcja-edit';
          editWrap.addEventListener('click', (ev) => {
            ev.stopPropagation();
            ev.preventDefault();
          });
          const input = document.createElement('input');
          input.type = 'text';
          input.value = biezacaAkcja ? biezacaAkcja.akcja : '';
          input.placeholder = 'Najbliższa akcja…';
          const saveBtn = document.createElement('button');
          saveBtn.type = 'button';
          saveBtn.className = 'akcja-edit-btn';
          saveBtn.textContent = '✓';
          saveBtn.title = 'Zapisz';
          const delBtn = document.createElement('button');
          delBtn.type = 'button';
          delBtn.className = 'akcja-edit-btn';
          delBtn.textContent = '×';
          delBtn.title = 'Usuń akcję';
          const close = () => {
            editWrap.remove();
            akcjaBtn.style.display = biezacaAkcja ? '' : 'none';
          };
          const zapisz = async (text) => {
            const trimmed = String(text || '').trim();
            input.disabled = saveBtn.disabled = delBtn.disabled = true;
            try {
              const res = await fetch(`${API_BASE}/api/leady/akcja`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // Termin zostaje z dotychczasowej akcji — ręczna edycja
                // zmienia zwykle samą treść ("zadzwonić 15:00" → "wysłać
                // wycenę"); kto chce podać termin, wpisuje go w treści.
                body: JSON.stringify({
                  telefon: c.telefon,
                  akcja: trimmed,
                  termin: trimmed && biezacaAkcja ? (biezacaAkcja.termin || '') : '',
                }),
              });
              const body = await res.json().catch(() => ({}));
              if (!res.ok) throw new Error(body.error || `Błąd ${res.status}`);
              applyAkcjaToPhone(
                normalizePhone(c.telefon),
                trimmed ? { akcja: body.akcja, termin: body.termin || '', owner: body.owner || '' } : null
              );
              close();
            } catch (err) {
              alert(`Nie zapisano akcji: ${err.message}`);
              input.disabled = saveBtn.disabled = delBtn.disabled = false;
            }
          };
          saveBtn.addEventListener('click', (ev) => {
            ev.stopPropagation();
            zapisz(input.value);
          });
          delBtn.addEventListener('click', (ev) => {
            ev.stopPropagation();
            zapisz('');
          });
          input.addEventListener('click', (ev) => ev.stopPropagation());
          input.addEventListener('keydown', (ev) => {
            ev.stopPropagation();
            if (ev.key === 'Enter') {
              ev.preventDefault();
              zapisz(input.value);
            } else if (ev.key === 'Escape') {
              ev.preventDefault();
              close();
            }
          });
          editWrap.append(input, saveBtn, delBtn);
          akcjaBtn.style.display = 'none';
          akcjaBtn.after(editWrap);
          input.focus();
          input.select();
        });

        const akcjaPhoneKey = normalizePhone(c.telefon);
        if (akcjaPhoneKey) {
          if (!akcjaUpdatersByPhone.has(akcjaPhoneKey)) akcjaUpdatersByPhone.set(akcjaPhoneKey, []);
          akcjaUpdatersByPhone.get(akcjaPhoneKey).push(applyAkcja);
        }
        applyAkcja(akcjeByPhone
          ? (akcjeByPhone.get(akcjaPhoneKey) || null)
          : (c.najblizsza_akcja
            ? { akcja: c.najblizsza_akcja, termin: c.najblizsza_akcja_termin || '', owner: c.najblizsza_akcja_owner || '' }
            : null));
      }

      let feedbackDate = null;
      if (c.data_feedbacku) {
        feedbackDate = document.createElement('span');
        feedbackDate.className = 'feedback-date' + (isOverdueDate(c.data_feedbacku) ? ' is-overdue' : '');
        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = 'Data feedbacku: ';
        feedbackDate.appendChild(label);

        if (c.lp !== undefined) {
          const dateInput = document.createElement('input');
          dateInput.type = 'date';
          dateInput.className = 'feedback-date-input';
          dateInput.value = toIsoDate(c.data_feedbacku);
          dateInput.addEventListener('click', (e) => e.stopPropagation());
          dateInput.addEventListener('change', async () => {
            if (!dateInput.value) return;
            const plDate = fromIsoDate(dateInput.value);
            const previous = c.data_feedbacku;
            try {
              await saveLeadField(c.lp, 'data_feedbacku', plDate);
              c.data_feedbacku = plDate;
              feedbackDate.classList.toggle('is-overdue', isOverdueDate(plDate));
            } catch (err) {
              dateInput.value = toIsoDate(previous);
              alert(`Nie zapisano daty feedbacku: ${err.message}`);
            }
          });
          feedbackDate.appendChild(dateInput);
        } else {
          // Żywy lead spoza wygenerowanej Umowy (bez lp) — nie ma jak
          // zapisać zmiany przez /api/lead-field, więc tylko podgląd.
          feedbackDate.appendChild(document.createTextNode(c.data_feedbacku));
        }
        // Umówiona godzina feedbacku (jeśli padła) — sam podgląd, edycja
        // godziny żyje na karcie leada (pole "Godzina feedbacku").
        if (c.godzina_feedbacku) {
          feedbackDate.appendChild(document.createTextNode(` ${c.godzina_feedbacku}`));
        }
        contactRow.appendChild(feedbackDate);
      }

      if (contactRow.children.length) summary.appendChild(contactRow);

      let statusEl = null;
      if (c.status && c.lp === undefined) {
        // Żywy lead spoza wygenerowanej Umowy — pigułka statusu bez
        // rozwijanego menu (nie ma jak zapisać zmiany przez /api/lead-field).
        const statusTag = document.createElement('span');
        statusTag.className = 'status-tag';
        statusTag.textContent = c.status;
        applyStatusColor(statusTag, c.status, statusColors);
        summary.appendChild(statusTag);
        statusEl = statusTag;
      } else if (c.status) {
        const statusWrap = document.createElement('span');
        statusWrap.className = 'status-wrap';

        const trigger = document.createElement('button');
        trigger.type = 'button';
        trigger.className = 'status-tag';
        trigger.textContent = c.status;
        applyStatusColor(trigger, c.status, statusColors);

        const menu = document.createElement('div');
        menu.className = 'status-menu';

        const options = statusOptionsList.includes(c.status) ? statusOptionsList : [...statusOptionsList, c.status];
        options.forEach((opt) => {
          const optionBtn = document.createElement('button');
          optionBtn.type = 'button';
          optionBtn.className = 'status-option' + (opt === c.status ? ' is-selected' : '');
          optionBtn.textContent = opt;
          applyStatusColor(optionBtn, opt, statusColors);
          optionBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            closeAllStatusMenus();
            if (opt === c.status) return;
            const previous = c.status;
            trigger.textContent = opt;
            applyStatusColor(trigger, opt, statusColors);
            menu.querySelectorAll('.status-option').forEach((el) => {
              el.classList.toggle('is-selected', el === optionBtn);
            });
            try {
              await saveLeadField(c.lp, 'status', opt);
              c.status = opt;
            } catch (err) {
              c.status = previous;
              trigger.textContent = previous;
              applyStatusColor(trigger, previous, statusColors);
              menu.querySelectorAll('.status-option').forEach((el) => {
                el.classList.toggle('is-selected', el.textContent === previous);
              });
              alert(`Nie zapisano statusu: ${err.message}`);
            }
          });
          menu.appendChild(optionBtn);
        });

        trigger.addEventListener('click', (e) => {
          e.stopPropagation();
          const willOpen = !menu.classList.contains('open');
          closeAllStatusMenus();
          if (willOpen) {
            menu.classList.add('open');
            lead.classList.add('status-menu-open');
          }
        });

        statusWrap.appendChild(trigger);
        statusWrap.appendChild(menu);
        summary.appendChild(statusWrap);
        statusEl = statusWrap;
      }

      const formLink = document.createElement(c.link_formularz ? 'a' : 'span');
      formLink.className = 'form-link' + (c.link_formularz ? '' : ' form-link--empty');
      if (c.link_formularz) {
        formLink.href = cleanFormularzLink(c.link_formularz);
        formLink.target = '_blank';
        formLink.rel = 'noopener';
        formLink.textContent = '↗';
        formLink.title = 'Otwórz formularz';
        // Nie chcemy, żeby kliknięcie w link jednocześnie zwijało/rozwijało wiersz.
        formLink.addEventListener('click', (e) => e.stopPropagation());
      } else {
        formLink.textContent = '×';
        formLink.title = 'Brak formularza';
      }
      summary.appendChild(formLink);

      // Kotwica prawej grupy (data feedbacku / status / link do formularza):
      // dokładnie JEDEN z nich — ten najwcześniejszy z obecnych — dostaje
      // margin-left:auto, żeby cała grupa trzymała się prawej krawędzi.
      // Zrobione w JS, nie w czystym CSS: margin-left:auto na kilku
      // elementach z rzędu w tym samym flexboksie NIE działa tak, że tylko
      // pierwszy się aktywuje — przeglądarka dzieli wolną przestrzeń między
      // WSZYSTKIMI naraz, co rozjeżdża wiersz, gdy któregoś pola brakuje.
      (feedbackDate || statusEl || formLink).classList.add('right-anchor');

      // Żywy status + link do formularza — ta sama zasada co pigułka akcji
      // (refreshAkcje): dokument Umowy to migawka z rana, a status leada
      // zmienia się w ciągu dnia (rozmowa przez webhook Zadarmy, ręczna
      // edycja w CRM, nowa wycena). Nakładamy aktualny stan z Leady B2C na
      // wyrenderowany case bez przeładowania strony. Wyceny historyczne
      // pominięte — ich pigułka pokazuje status WYCENY, nie leada.
      // Klucz telefonu liczony lokalnie — akcjaPhoneKey z sekcji akcji żyje w
      // węższym bloku i nie jest tu widoczny.
      const liveLeadPhoneKey = normalizePhone(c.telefon);
      if (liveLeadPhoneKey && !isWycenaHistoryczna) {
        let formLinkEl = formLink;
        const applyLiveLead = (a) => {
          if (!a) return;
          if (a.status && statusEl && a.status !== c.status) {
            c.status = a.status;
            const pill = statusEl.querySelector('.status-tag') || statusEl;
            pill.textContent = a.status;
            applyStatusColor(pill, a.status, statusColors);
            statusEl.querySelectorAll('.status-option').forEach((el) => {
              el.classList.toggle('is-selected', el.textContent === a.status);
            });
          }
          if (a.link_formularz && !c.link_formularz) {
            c.link_formularz = a.link_formularz;
            const anchor = document.createElement('a');
            anchor.className = formLinkEl.className.replace(' form-link--empty', '');
            anchor.href = cleanFormularzLink(a.link_formularz);
            anchor.target = '_blank';
            anchor.rel = 'noopener';
            anchor.textContent = '↗';
            anchor.title = 'Otwórz formularz';
            anchor.addEventListener('click', (e) => e.stopPropagation());
            formLinkEl.replaceWith(anchor);
            formLinkEl = anchor;
          }
        };
        if (!akcjaUpdatersByPhone.has(liveLeadPhoneKey)) akcjaUpdatersByPhone.set(liveLeadPhoneKey, []);
        akcjaUpdatersByPhone.get(liveLeadPhoneKey).push(applyLiveLead);
        if (akcjeByPhone) applyLiveLead(akcjeByPhone.get(liveLeadPhoneKey) || null);
      }

      lead.addEventListener('toggle', closeAllStatusMenus);

      lead.appendChild(summary);

      // Rozwinięty case = wspólna karta leada (apps/shared/lead-card.js) —
      // dokładnie ten sam widok i dane co lead w CRM (notatka z plusikiem,
      // Najbliższa akcja z ptaszkiem "zrobione dziś", Podsumowanie AI,
      // Historia rozmów, siatki Kontakt/Transakcja, Wycena). Pełny wiersz
      // Leady B2C dociągany leniwie przy pierwszym otwarciu — dokument Umowy
      // to tylko migawka z rana. Case bez telefonu (nie da się dopasować
      // leada) zostaje na starym prostym widoku z migawki.
      const body = document.createElement('div');
      body.className = 'lead-body';

      if (c.telefon) {
        body.innerHTML = '<p class="lk-empty-note">Wczytywanie…</p>';
        let kartaZaladowana = false;
        const zaladujKarte = async () => {
          try {
            const res = await fetch(`${API_BASE}/api/leady/pelny?telefon=${encodeURIComponent(c.telefon)}`);
            const resBody = await res.json().catch(() => ({}));
            if (!res.ok || !resBody.data) throw new Error(resBody.error || `Błąd ${res.status}`);
            const karta = LeadKarta.buildBody(resBody.data, {
              apiBase: API_BASE,
              hostDetails: lead,
              // Edycja/odhaczenie akcji w karcie → odśwież pigułki tego
              // telefonu na wszystkich zwiniętych case'ach.
              onAkcjaChange: (digits, a) => applyAkcjaToPhone(digits, a),
              onFeedbackDate: (stored) => {
                c.data_feedbacku = stored;
                const input = lead.querySelector('summary .feedback-date-input');
                if (input) input.value = toIsoDate(stored);
              },
            });
            // Karta ma własny border-top/padding (.lk-lead-body) — wrapper
            // przestaje być .lead-body, żeby nie dublować ramki.
            body.className = '';
            body.innerHTML = '';
            body.appendChild(karta.el);
            // Odwrotny kierunek: edycja akcji z pigułki → odśwież kartę.
            const phoneKey = normalizePhone(c.telefon);
            if (phoneKey) {
              if (!akcjaUpdatersByPhone.has(phoneKey)) akcjaUpdatersByPhone.set(phoneKey, []);
              akcjaUpdatersByPhone.get(phoneKey).push(karta.setAkcja);
            }
          } catch (err) {
            body.innerHTML = `<p class="lk-empty-note">Nie udało się wczytać leada: ${err.message}</p>`;
          }
        };
        lead.addEventListener('toggle', () => {
          if (lead.open && !kartaZaladowana) {
            kartaZaladowana = true;
            zaladujKarte();
          }
        });
      } else {
        if (c.opis || c.komentarz) {
          const opisWrap = document.createElement('div');
          opisWrap.className = 'opis-wrap';
          const opisLabel = document.createElement('div');
          opisLabel.className = 'opis-label';
          opisLabel.textContent = 'Opis';
          opisWrap.appendChild(opisLabel);
          const opis = document.createElement('div');
          opis.className = 'opis-text';
          opis.textContent = c.opis || c.komentarz;
          opisWrap.appendChild(opis);
          body.appendChild(opisWrap);
        }

        function fieldGrid(fields) {
          const grid = document.createElement('div');
          grid.className = 'field-grid';
          fields.forEach((spec) => {
            const raw = c[spec.key];
            if (spec.hideWhenEmpty && fieldIsEmpty(spec, raw)) return;
            const field = document.createElement('div');
            field.className = 'field' + (spec.wide ? ' wide' : '');
            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = typeof spec.label === 'function' ? spec.label(c) : spec.label;
            const value = document.createElement('div');
            value.className = 'value' + (spec.nowrap ? ' nowrap' : '') + (spec.copy && raw ? ' with-copy' : '');
            value.appendChild(spec.render ? spec.render(raw, c) : fieldValueNode(spec, raw));
            field.appendChild(label);
            field.appendChild(value);
            grid.appendChild(field);
          });
          return grid;
        }

        body.appendChild(fieldGrid(CONTACT_FIELDS));
        body.appendChild(fieldGrid(DEAL_FIELDS));
      }

      lead.appendChild(body);

      return lead;
    }

    function renderPriorytet(list) {
      if (!list || !list.length) return;
      document.getElementById('priorytet-section').style.display = 'block';
      const container = document.getElementById('priorytet-list');
      container.innerHTML = '';
      list.forEach((c, i) => container.appendChild(leadItem(c, i)));
      resortContainer(container);
    }

    function renderKategorie(kategorie) {
      if (!kategorie) return;
      // Najpierw znana kolejność, potem wszystko, czego w niej nie ma (np.
      // kategorie utworzone przez AI) — nic nie znika z widoku.
      const orderedKeys = KATEGORIA_ORDER.concat(
        Object.keys(kategorie).filter((key) => !KATEGORIA_ORDER.includes(key))
      );
      const entries = orderedKeys
        .filter((key) => Array.isArray(kategorie[key]) && kategorie[key].length)
        .map((key) => [key, kategorie[key]]);
      if (!entries.length) return;
      document.getElementById('kategorie-section').style.display = 'block';
      const wrap = document.getElementById('kategorie-wrap');
      wrap.innerHTML = '';
      entries.forEach(([key, arr]) => {
        const details = document.createElement('details');
        details.className = 'kategoria';
        details.dataset.key = key;
        const summary = document.createElement('summary');
        const chevron = document.createElement('span');
        chevron.className = 'kategoria-chevron';
        chevron.textContent = '▸';
        summary.appendChild(chevron);
        summary.appendChild(document.createTextNode(`${KATEGORIA_LABELS[key] || key} (${arr.length})`));
        details.appendChild(summary);
        const list = document.createElement('div');
        list.className = 'cases';
        arr.forEach((c, i) => list.appendChild(leadItem(c, i, key)));
        resortContainer(list);
        details.appendChild(list);

        // Zwinięcie kategorii porządkuje wszystko w niej: każdy case i jego
        // Historia rozmów wracają do stanu zwiniętego, żeby ponowne
        // rozwinięcie kategorii zawsze zaczynało od czystego widoku.
        details.addEventListener('toggle', () => {
          if (!details.open) list.querySelectorAll('details').forEach((d) => { d.open = false; });
        });

        wrap.appendChild(details);
      });
    }

    // Żywy widok "Nowe": leady ze statusem Nowy z ostatnich 7 dni, czytane
    // na bieżąco z Supabase (nie z raz-dziennie generowanej Umowy), żeby nowy
    // lead był widoczny od razu, bez czekania na jutrzejszą Umowę. Renderowane
    // bez numeru LP (leadItem sam to obsługuje, gdy c.lp === undefined) —
    // wizualnie oddziela to, co jest w dzisiejszym oficjalnym planie, od tego,
    // co właśnie wpadło.
    function normalizePhone(v) {
      return String(v || '').replace(/\D/g, '');
    }

    async function fetchLiveNowe() {
      try {
        const res = await fetch(`${API_BASE}/api/leady/nowe`);
        if (!res.ok) return [];
        return await res.json();
      } catch {
        return [];
      }
    }

    function ensureNoweDetails() {
      const wrap = document.getElementById('kategorie-wrap');
      let details = wrap.querySelector('[data-key="nowe"]');
      if (!details) {
        details = document.createElement('details');
        details.className = 'kategoria';
        details.dataset.key = 'nowe';
        details.open = true;
        const summary = document.createElement('summary');
        const chevron = document.createElement('span');
        chevron.className = 'kategoria-chevron';
        chevron.textContent = '▸';
        summary.appendChild(chevron);
        details.appendChild(summary);
        const list = document.createElement('div');
        list.className = 'cases';
        details.appendChild(list);
        // Jak w kategoriach z Umowy: zwinięcie kategorii zwija wszystkie
        // case'y (i ich podsekcje) w środku.
        details.addEventListener('toggle', () => {
          if (!details.open) list.querySelectorAll('details[open]').forEach((d) => { d.open = false; });
        });
        wrap.insertBefore(details, wrap.firstChild);
      }
      return details;
    }

    function setKategoriaCount(details, label, count) {
      const summary = details.querySelector('summary');
      Array.from(summary.childNodes).forEach((node) => {
        if (!(node.nodeType === 1 && node.classList.contains('kategoria-chevron'))) {
          node.remove();
        }
      });
      summary.appendChild(document.createTextNode(`${label} (${count})`));
    }

    async function mergeLiveNowe(kategorieNowe, date) {
      // Tylko dla dzisiejszego dnia — dla dni historycznych "co właśnie
      // wpadło" nie ma znaczenia, Umowa z tamtego dnia jest zamknięta.
      if (!isSameDate(date, new Date())) return;
      const live = await fetchLiveNowe();
      if (!live.length) return;

      const known = new Set((kategorieNowe || []).map((c) => normalizePhone(c.telefon)));
      const fresh = live.filter((c) => !known.has(normalizePhone(c.telefon)));
      if (!fresh.length) return;

      document.getElementById('kategorie-section').style.display = 'block';
      const details = ensureNoweDetails();
      const list = details.querySelector('.cases');
      fresh.forEach((c, i) => list.insertBefore(leadItem(c, -1 - i, 'nowe'), list.firstChild));
      resortContainer(list);
      setKategoriaCount(details, KATEGORIA_LABELS.nowe, (kategorieNowe || []).length + fresh.length);
    }

    function resetSections() {
      leadInstancesByLp.clear();
      akcjaUpdatersByPhone.clear();
      spinnerUpdatersByPhone.clear();
      document.getElementById('meta').innerHTML = '';
      document.getElementById('zmiany-card').style.display = 'none';
      document.getElementById('zmiany-list').innerHTML = '';
      document.getElementById('kontekst-card').style.display = 'none';
      document.getElementById('komentarz-card').style.display = 'none';
      document.getElementById('plan-card').style.display = 'none';
      document.getElementById('priorytet-section').style.display = 'none';
      document.getElementById('kategorie-section').style.display = 'none';
      // Czyszczone jawnie (nie tylko ukrywane): mergeLiveNowe potrafi dopisać
      // żywe leady nawet gdy renderKategorie się nie wykona (brak wiersza/
      // draftu na dany dzień) — bez tego zostałaby tu treść z poprzedniego dnia.
      document.getElementById('kategorie-wrap').innerHTML = '';
    }

    function loadDay(date) {
      resetSections();
      // Fire-and-forget: świeży stan akcji nakłada się na pigułki po tym,
      // jak poniższy synchroniczny render je zarejestruje.
      refreshAkcje();
      loadRealizacjaDzis(daysOffsetFromToday(date));
      const formatted = formatPlDate(date);
      const row = allRows.find((r) => rowMatchesDate(r['Data'], date));
      currentRow = row || null;

      if (!row) {
        activeState = null;
        updateComposer();
        setStatus(`Brak danych dla ${formatted}`);
        if (activeDoc === 'umowa') mergeLiveNowe(null, date);
        return;
      }

      // Precedens: final → poprawka AI → draft. Final jest tylko do odczytu
      // (composer znika); poprawka/draft pokazują pole edycji.
      const fields = DOC_FIELDS[activeDoc];
      let latest = null;
      if (row[fields.final]) {
        latest = row[fields.final];
        activeState = 'final';
      } else if (row[fields.poprawka]) {
        latest = row[fields.poprawka];
        activeState = 'poprawka';
      } else if (row[fields.draft]) {
        latest = row[fields.draft];
        activeState = 'draft';
      } else {
        activeState = null;
      }
      updateComposer();

      if (!latest) {
        setStatus(`Brak dokumentu „${DOC_NAMES[activeDoc]}" dla ${formatted}`);
        if (activeDoc === 'umowa') mergeLiveNowe(null, date);
        return;
      }

      // Dopóki poprawka AI nie jest zatwierdzona, główna lista dalej pokazuje
      // to, co jest aktualnie "na żywo" (oryginalny draft) — proponowane
      // zmiany widać wyłącznie w karcie "Zmiany" (renderZmiany), nie w samej
      // liście. Dopiero zatwierdzenie przenosi je do listy.
      const draft = activeState === 'poprawka' ? (row[fields.draft] || latest) : latest;

      setStatus('');
      renderMeta(draft);

      if (activeState === 'poprawka') {
        renderZmiany(row[fields.draft], latest);
      }

      if (draft.kontekst) {
        document.getElementById('kontekst-card').style.display = 'block';
        document.getElementById('kontekst-text').textContent = draft.kontekst;
      }

      if (activeDoc === 'podsumowanie' && Array.isArray(draft.punkty) && draft.punkty.length) {
        document.getElementById('komentarz-card').style.display = 'block';
        document.getElementById('komentarz-title').textContent = 'Co się działo dziś';
        renderPunkty(draft.punkty);
      } else if (draft.komentarz_dzienny) {
        document.getElementById('komentarz-card').style.display = 'block';
        document.getElementById('komentarz-title').textContent = 'Komentarz dzienny';
        renderKomentarz(draft.komentarz_dzienny);
      }

      renderPlan(draft.plan);
      renderPriorytet(draft.priorytet_dzis);
      renderKategorie(draft.kategorie);
      if (activeDoc === 'umowa') mergeLiveNowe(draft.kategorie && draft.kategorie.nowe, date);

      if (activeDoc === 'umowa') {
        caseByPhone = buildCaseByPhone(draft);
        if (lastPolaczeniaRows) renderPolaczenia(lastPolaczeniaRows);
      }
    }

    function renderDayStrip() {
      const tabs = document.getElementById('day-tabs');
      tabs.innerHTML = '';
      const today = new Date();
      windowDays.forEach((date) => {
        const tab = document.createElement('div');
        tab.className = 'day-tab';
        if (isSameDate(date, today)) tab.classList.add('is-today');
        if (isSameDate(date, selectedDate)) tab.classList.add('is-selected');

        const weekday = document.createElement('div');
        weekday.className = 'weekday';
        weekday.textContent = PL_WEEKDAYS[date.getDay()];
        tab.appendChild(weekday);

        const dayNum = document.createElement('div');
        dayNum.className = 'day-num';
        dayNum.textContent = date.getDate();
        tab.appendChild(dayNum);

        tab.addEventListener('click', () => {
          selectedDate = date;
          renderDayStrip();
          loadDay(selectedDate);
        });

        tabs.appendChild(tab);
      });
    }

    function shiftWeek(delta) {
      const offset = windowDays.findIndex((d) => isSameDate(d, selectedDate));
      const newMonday = addPlainDays(windowDays[0], delta * 7);
      windowDays = buildWeekdayWindow(newMonday);
      selectedDate = windowDays[offset === -1 ? 0 : offset];
      renderDayStrip();
      loadDay(selectedDate);
    }

    function goToPrevWeek() {
      shiftWeek(-1);
    }

    function goToNextWeek() {
      shiftWeek(1);
    }

    async function init() {
      try {
        const res = await fetch(`${API_BASE}/api/tables/${encodeURIComponent(TABLE)}`);
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.error || `Błąd ${res.status}`);
        }
        allRows = await res.json();

        const today = new Date();
        today.setHours(0, 0, 0, 0);
        selectedDate = isWeekend(today)
          ? (today.getDay() === 6 ? addPlainDays(today, -1) : addPlainDays(today, 1))
          : today;
        windowDays = buildWeekdayWindow(getMonday(selectedDate));

        document.getElementById('day-prev').addEventListener('click', goToPrevWeek);
        document.getElementById('day-next').addEventListener('click', goToNextWeek);

        renderDayStrip();
        loadDay(selectedDate);
        // Wystartuj poll spinnerów "rozmowa w analizie" (adaptacyjny, patrz
        // pollRozmowyWToku) — od teraz case dostaje kręcące się kółko tuż po
        // odłożeniu słuchawki.
        pollRozmowyWToku();
      } catch (err) {
        setStatus(err.message);
      }
    }

    // ── Przełącznik dokumentu (Umowa / Podsumowanie dnia) ──────────────────
    const docToggle = document.getElementById('doc-toggle');
    docToggle.querySelectorAll('.doc-pill').forEach((btn) => {
      btn.addEventListener('click', () => {
        if (btn.dataset.doc === activeDoc) return;
        activeDoc = btn.dataset.doc;
        docToggle.querySelectorAll('.doc-pill').forEach((b) => {
          b.classList.toggle('is-active', b.dataset.doc === activeDoc);
        });
        if (selectedDate) loadDay(selectedDate);
      });
    });

    // ── Composer: polecenia dla AI + zatwierdzanie do wersji finalnej ──────
    const composer = document.getElementById('composer');
    const composerInput = document.getElementById('composer-input');
    const composerMsg = document.getElementById('composer-msg');
    const micBtn = document.getElementById('composer-mic');
    const sendBtn = document.getElementById('composer-send');
    const approveBtn = document.getElementById('composer-approve');

    let composerBusy = false;

    function updateComposer() {
      const show = activeState === 'draft' || activeState === 'poprawka';
      composer.classList.toggle('visible', show);
      document.body.classList.toggle('composer-open', show);
      if (!show) setComposerMsg('');
    }

    function setComposerMsg(text, isError) {
      composerMsg.textContent = text || '';
      composerMsg.classList.toggle('error', Boolean(isError));
    }

    function setComposerBusy(busy, sendLabel) {
      composerBusy = busy;
      [composerInput, micBtn, sendBtn, approveBtn].forEach((el) => { el.disabled = busy; });
      if (busy && sendLabel) {
        sendBtn.innerHTML = '';
        const spinner = document.createElement('span');
        spinner.className = 'btn-spinner';
        const label = document.createElement('span');
        label.textContent = sendLabel;
        sendBtn.appendChild(spinner);
        sendBtn.appendChild(label);
      } else {
        sendBtn.textContent = 'Wyślij';
      }
    }

    function autoGrowInput() {
      composerInput.style.height = 'auto';
      composerInput.style.height = `${Math.min(composerInput.scrollHeight, 128)}px`;
    }

    async function postJson(url, payload) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.error || `Błąd ${res.status}`);
      return body;
    }

    composerInput.addEventListener('input', autoGrowInput);
    composerInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });

    sendBtn.addEventListener('click', async () => {
      const instruction = composerInput.value.trim();
      if (!instruction || !currentRow || composerBusy) return;
      setComposerBusy(true, 'AI kminię');
      setComposerMsg('');
      try {
        const body = await postJson(`${API_BASE}/api/ai-edit`, {
          doc: activeDoc,
          dataValue: currentRow['Data'],
          instruction,
        });
        if (body.message) {
          // NIEJEDNOZNACZNE / BŁĄD — AI prosi o doprecyzowanie, nic nie zapisano.
          setComposerMsg(body.message, true);
        } else {
          currentRow[DOC_FIELDS[activeDoc].poprawka] = body.json;
          composerInput.value = '';
          autoGrowInput();
          loadDay(selectedDate);
          setComposerMsg('Zapisano poprawkę AI.');
        }
      } catch (err) {
        setComposerMsg(err.message, true);
      } finally {
        setComposerBusy(false);
      }
    });

    approveBtn.addEventListener('click', async () => {
      if (!currentRow || composerBusy) return;
      if (!confirm(`Zatwierdzić wersję finalną („${DOC_NAMES[activeDoc]}") dla ${formatPlDate(selectedDate)}?`)) return;
      setComposerBusy(true, 'Zapisuję…');
      try {
        const body = await postJson(`${API_BASE}/api/approve`, {
          doc: activeDoc,
          dataValue: currentRow['Data'],
        });
        currentRow[DOC_FIELDS[activeDoc].final] = body.json;
        loadDay(selectedDate);
      } catch (err) {
        setComposerMsg(err.message, true);
      } finally {
        setComposerBusy(false);
      }
    });

    // ── Dyktowanie: MediaRecorder → POST /api/transcribe (OpenAI) ──────────
    // Nagranie nie jest nigdzie przechowywane — leci do transkrypcji i przepada.
    let mediaRecorder = null;
    let audioChunks = [];

    micBtn.addEventListener('click', async () => {
      if (composerBusy) return;
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : '';
        mediaRecorder = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined);
        audioChunks = [];
        mediaRecorder.addEventListener('dataavailable', (e) => {
          if (e.data.size) audioChunks.push(e.data);
        });
        mediaRecorder.addEventListener('stop', async () => {
          stream.getTracks().forEach((t) => t.stop());
          micBtn.classList.remove('recording');
          const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
          if (!blob.size) return;
          setComposerMsg('Transkrybuję…');
          try {
            const res = await fetch(`${API_BASE}/api/transcribe`, {
              method: 'POST',
              headers: { 'Content-Type': blob.type || 'audio/webm' },
              body: blob,
            });
            const body = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(body.error || `Błąd ${res.status}`);
            if (body.text) {
              const existing = composerInput.value.replace(/\s+$/, '');
              composerInput.value = existing ? `${existing} ${body.text}` : body.text;
              autoGrowInput();
              composerInput.focus();
            }
            setComposerMsg('');
          } catch (err) {
            setComposerMsg(err.message, true);
          }
        });
        mediaRecorder.start();
        micBtn.classList.add('recording');
        setComposerMsg('Nagrywam — kliknij ikonę mikrofonu ponownie, żeby zakończyć.');
      } catch (err) {
        setComposerMsg(`Brak dostępu do mikrofonu: ${err.message}`, true);
      }
    });

    init();

    // ── Połączenia (dziennik aktywności handlowca) ─────────────────────────
    // Niezależne od Umowy/Standupu wyżej — własny fetch, własny stan, nie
    // wchodzi w DOC_FIELDS/composer, żeby błąd w jednym nie blokował drugiego.
    function formatPolaczenieCzas(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      return d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
    }

    function formatPolaczenieTelefon(v) {
      const digits = String(v || '').replace(/\D/g, '');
      return digits ? `+${digits}` : '—';
    }

    // Wpisy Log zmian, które NIE są telefonami (mirror NIE_TELEFON_ZRODLA z
    // backendu) — nie liczą się do "Zadzwoniono dziś" i nie są renderowane jako
    // rozmowa. facebook_lead_webhook to moment wpadnięcia nowego leada.
    const NIE_TELEFON_ZRODLA = new Set(['notatka_handlowca', 'manual_akcja', 'manual_crm', 'facebook_lead_webhook']);

    function polaczenieKierunekLabel(row) {
      if (row.zrodlo === 'notatka_handlowca') return 'notatka';
      if (row.zrodlo === 'manual_akcja') return 'akcja (ręcznie)';
      if (row.zrodlo === 'facebook_lead_webhook') return 'nowy lead';
      if (row.kierunek === 'przychodzące') return row.disposition === 'no_answer' ? 'nieodebrane' : 'przychodzące';
      if (row.kierunek === 'wychodzące') return 'wychodzące';
      return row.disposition === 'no_answer' ? 'nieodebrane' : '—';
    }

    function appendPolaczenieField(container, label, value) {
      if (!value) return;
      const p = document.createElement('p');
      const strong = document.createElement('span');
      strong.className = 'polaczenie-label';
      strong.textContent = `${label}: `;
      p.appendChild(strong);
      p.appendChild(document.createTextNode(value));
      container.appendChild(p);
    }

    function renderPolaczenia(rows) {
      lastPolaczeniaRows = rows;
      const list = document.getElementById('polaczenia-list');
      list.innerHTML = '';
      if (!rows.length) {
        const empty = document.createElement('p');
        empty.className = 'polaczenia-empty';
        empty.textContent = 'Brak połączeń.';
        list.appendChild(empty);
        return;
      }
      rows.forEach((row) => {
        const details = document.createElement('details');
        details.className = 'polaczenie-row';

        const summary = document.createElement('summary');
        const czas = document.createElement('span');
        czas.className = 'czas';
        czas.textContent = formatPolaczenieCzas(row.data_zmiany);
        const kierunek = document.createElement('span');
        kierunek.className = 'kierunek';
        kierunek.textContent = polaczenieKierunekLabel(row);
        // Telefon – imię i nazwisko – numer porządkowy, jedną prominentną
        // linią (nie wyszarzoną) — łatwiej odnaleźć case w backlogu.
        const matchedCase = caseByPhone.get(normalizePhone(row.telefon));
        const telefon = document.createElement('span');
        telefon.className = 'telefon';
        const telefonParts = [formatPolaczenieTelefon(row.telefon)];
        if (matchedCase && matchedCase.imie) telefonParts.push(matchedCase.imie);
        if (matchedCase && matchedCase.lp !== undefined) telefonParts.push(String(matchedCase.lp));
        telefon.textContent = telefonParts.join(' – ');
        const czasTrwania = document.createElement('span');
        czasTrwania.className = 'czas-trwania';
        // Notatka/ręczna zmiana akcji/nowy lead nie mają czasu trwania — "0s"
        // byłoby mylące (nowy lead wyglądałby jak 0-sekundowa rozmowa).
        czasTrwania.textContent = NIE_TELEFON_ZRODLA.has(row.zrodlo)
          ? ''
          : `${row.czas_trwania_s || 0}s`;
        summary.append(czas, kierunek, telefon, czasTrwania);
        // Nowy lead ma w Log zmian handlowca = owner (domyślnie Lorenzo), ale
        // to przypisanie, nie "Lorenzo dzwonił" — nie pokazujemy go jako autora
        // wpisu, żeby nie czytało się jak zrealizowane połączenie handlowca.
        if (row.handlowiec && row.zrodlo !== 'facebook_lead_webhook') {
          const handlowiec = document.createElement('span');
          handlowiec.className = 'status-zmiana';
          handlowiec.textContent = row.handlowiec;
          summary.appendChild(handlowiec);
        }
        if (row.status_przed || row.status_po) {
          const statusZmiana = document.createElement('span');
          statusZmiana.className = 'status-zmiana';
          statusZmiana.textContent = `${row.status_przed || '—'} → ${row.status_po || '—'}`;
          summary.appendChild(statusZmiana);
        }
        if (row.zamkniete_dzis) {
          const badge = document.createElement('span');
          badge.className = 'zamkniete-dzis-badge';
          badge.textContent = '✓ zaopiekowane dziś';
          badge.title = 'GPT ocenił po rozmowie, że z tym tematem nie trzeba dziś nic więcej robić';
          summary.appendChild(badge);
        }
        details.appendChild(summary);

        const body = document.createElement('div');
        body.className = 'polaczenie-body';
        appendPolaczenieField(body, 'Podsumowanie', row.opis);
        appendPolaczenieField(body, 'Notatki przed', row.opis_przed);
        appendPolaczenieField(body, 'Notatki po', row.opis_po);
        appendPolaczenieField(body, 'Data feedbacku przed', row.data_feedbacku_przed);
        appendPolaczenieField(body, 'Data feedbacku po', row.data_feedbacku_po);
        appendPolaczenieField(body, 'Transkrypcja', row.transkrypcja);
        if (!body.children.length) {
          const empty = document.createElement('p');
          empty.className = 'polaczenia-empty';
          empty.textContent = 'Brak dodatkowych danych.';
          body.appendChild(empty);
        }
        details.appendChild(body);

        list.appendChild(details);
      });
    }

    let polaczeniaOffset = 0;

    function polaczeniaDayLabel(offset) {
      if (offset === 0) return 'Dziś';
      if (offset === -1) return 'Wczoraj';
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return formatPlDate(d);
    }

    async function loadPolaczenia(offset) {
      polaczeniaOffset = offset;
      document.getElementById('polaczenia-day-label').textContent = polaczeniaDayLabel(offset);
      document.getElementById('polaczenia-next').disabled = offset >= 0;
      const list = document.getElementById('polaczenia-list');
      list.innerHTML = '<p class="polaczenia-empty">Wczytywanie…</p>';
      try {
        const res = await fetch(`${API_BASE}/api/log-polaczen?offset=${offset}`);
        if (!res.ok) throw new Error(`Błąd ${res.status}`);
        const body = await res.json();
        renderPolaczenia(body.data || []);
      } catch (err) {
        list.innerHTML = '';
        const errNode = document.createElement('p');
        errNode.className = 'polaczenia-empty';
        errNode.textContent = `Nie udało się wczytać połączeń: ${err.message}`;
        list.appendChild(errNode);
      }
    }

    document.getElementById('polaczenia-prev').addEventListener('click', () => loadPolaczenia(polaczeniaOffset - 1));
    document.getElementById('polaczenia-next').addEventListener('click', () => {
      if (polaczeniaOffset < 0) loadPolaczenia(polaczeniaOffset + 1);
    });
    loadPolaczenia(0);

    // ── Realizacja planu (statystyki na żywo z Log zmian, nie ze statycznej
    // raz-dziennie generowanej Umowy) ──────────────────────────────────────
    // Czwarty kafelek (przychodzące/wychodzące) tylko na desktopie — na mobile
    // trzy podstawowe liczby wystarczają, nie ma sensu zajmować więcej miejsca.
    // Wykres (segmentowany pasek) tylko w Podsumowaniu dnia — w Umowie ta
    // sama karta "Realizacja planu" wraca do zwykłych kafelków z liczbami
    // (na życzenie: wizualne wykresy mają zostać wyłącznie w podsumowaniu).
    function renderRealizacjaDzis(stats, offset) {
      document.getElementById('realizacja-card').style.display = 'block';
      const zadzwonionoLabel = offset === 0 ? 'Zadzwoniono dziś' : 'Zadzwoniono tego dnia';

      const grid = document.getElementById('realizacja-grid');
      grid.innerHTML = '';

      if (activeDoc === 'podsumowanie') {
        // Odebrało/nie odebrało to część-do-całości (sumują się na
        // zadzwoniono) — pasek zamiast dwóch suchych liczb pokazuje
        // proporcję od razu, bez liczenia w głowie.
        const barWrap = document.createElement('div');
        barWrap.className = 'seg-bar-heading-wrap';
        const heading = document.createElement('div');
        heading.className = 'seg-bar-heading';
        heading.textContent = `${zadzwonionoLabel}: ${stats.zadzwoniono}`;
        barWrap.appendChild(heading);
        const barContainer = document.createElement('div');
        barWrap.appendChild(barContainer);
        grid.appendChild(barWrap);
        renderSegBar(barContainer, [
          { value: stats.odebrano, label: 'odebrało', color: 'var(--good)' },
          { value: stats.nieodebrano, label: 'nie odebrało', color: 'var(--feedback-overdue)' },
        ]);

        // Przychodzące/wychodzące to inny wymiar (kierunek, nie wynik) —
        // zostaje zwykłym kafelkiem, nie każda liczba potrzebuje wykresu.
        const tile = document.createElement('div');
        tile.className = 'stat-tile desktop-only';
        const v = document.createElement('div');
        v.className = 'value';
        v.textContent = `${stats.przychodzace}/${stats.wychodzace}`;
        const l = document.createElement('div');
        l.className = 'label';
        l.textContent = 'Przych. / wych.';
        tile.appendChild(v);
        tile.appendChild(l);
        grid.appendChild(tile);
        return;
      }

      [
        { value: stats.zadzwoniono, label: zadzwonionoLabel },
        { value: stats.odebrano, label: 'Odebrało' },
        { value: stats.nieodebrano, label: 'Nie odebrało' },
        { value: `${stats.przychodzace}/${stats.wychodzace}`, label: 'Przych. / wych.', desktopOnly: true },
      ].forEach(({ value, label, desktopOnly }) => {
        const tile = document.createElement('div');
        tile.className = 'stat-tile' + (desktopOnly ? ' desktop-only' : '');
        const v = document.createElement('div');
        v.className = 'value';
        v.textContent = value;
        const l = document.createElement('div');
        l.className = 'label';
        l.textContent = label;
        tile.appendChild(v);
        tile.appendChild(l);
        grid.appendChild(tile);
      });
    }

    // offset w dniach względem PRAWDZIWEGO dziś (patrz daysOffsetFromToday) —
    // wywoływane z loadDay przy każdej zmianie oglądanego dnia, żeby
    // "Realizacja planu" zawsze pokazywała połączenia z TEGO dnia, a nie
    // zawsze dzisiejsze niezależnie od wybranej zakładki.
    async function loadRealizacjaDzis(offset) {
      try {
        const res = await fetch(`${API_BASE}/api/log-polaczen?offset=${offset}`);
        if (!res.ok) return;
        const body = await res.json();
        // Tylko realne połączenia liczą się do "Zadzwoniono dziś" — wpisy spoza
        // NIE_TELEFON_ZRODLA (notatki, ręczne akcje, wpadnięcie nowego leada) to
        // nie rozmowy. Bez tego świeży lead zawyżał licznik o jeden.
        const rows = (body.data || []).filter((r) => !NIE_TELEFON_ZRODLA.has(r.zrodlo));
        const odebrano = rows.filter((r) => r.disposition === 'answered').length;
        const nieodebrano = rows.filter((r) => r.disposition === 'no_answer').length;
        const przychodzace = rows.filter((r) => r.kierunek === 'przychodzące').length;
        const wychodzace = rows.filter((r) => r.kierunek === 'wychodzące').length;
        renderRealizacjaDzis({ zadzwoniono: rows.length, odebrano, nieodebrano, przychodzace, wychodzace }, offset);
      } catch {
        // Cicho — sekcja "Połączenia" niżej i tak pokaże błąd, jeśli endpoint nie działa.
      }
    }

    const siteHeader = document.getElementById('site-header');
    LumTopbar.mount({ active: 'backlog-b2c', into: siteHeader });
    window.addEventListener('scroll', () => {
      siteHeader.classList.toggle('scrolled', window.scrollY > 24);
    }, { passive: true });
  </script>
</body>
</html>
