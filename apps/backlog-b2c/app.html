<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="manifest" href="/assets/manifest.webmanifest">
  <meta name="theme-color" content="#000000">
  <title>Backlog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/lead-card.css">
  <link rel="stylesheet" href="shared/wycena-card.css">
  <link rel="stylesheet" href="shared/topbar.css">
  <style>
    /* Paleta i typografia dopasowane do stylu lumlum.co: monochromatyczna
       czerń/biel, font Inter, mocno zaokrąglone rogi, pigułkowe znaczniki. */
    :root {
      color-scheme: light dark;
      --surface-1: #ffffff;
      --page: #f5f5f4;
      --text-primary: #111111;
      --text-secondary: #52514e;
      --text-muted: #8a8984;
      --border: rgba(17, 17, 17, 0.12);
      --accent: #111111;
      --accent-contrast: #ffffff;
      --accent-soft: #ececea;
      --good: #0ca30c;
      --feedback-overdue: #b5433f;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-1: #161616;
        --page: #0a0a0a;
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --text-muted: #8a8984;
        --border: rgba(255, 255, 255, 0.14);
        --accent: #ffffff;
        --accent-contrast: #0a0a0a;
        --accent-soft: #262626;
        --good: #16c116;
        --feedback-overdue: #e08585;
      }
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--page);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .wrap {
      width: 80vw;
      max-width: 80vw;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      padding: 2rem 1rem 4rem;
    }

    /* Pełnej szerokości pasek, niezależny od 80vw .wrap — celowo poza nim w
       DOM. Zawartość (logo → hub, pigułki paneli, menu użytkownika) renderuje
       wspólny topbar (apps/shared/topbar.js) — tu tylko sticky + subtelne
       skalowanie logo przy scrollu (stary efekt Backlogu, zachowany). */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 90;
      width: 100%;
      background: #000000;
    }

    .site-header .site-logo {
      transform-origin: center;
      /* transform (nie height/padding) żeby zmiana rozmiaru przy scrollu nie zmieniała
         wysokości sticky elementu — inaczej zmiana layoutu przesuwa scrollY tuż przy
         progu i chevron/logo zaczyna migotać góra-dół w pętli. */
      transition: transform 0.2s ease, opacity 0.15s ease;
    }

    .site-header:hover .site-logo {
      opacity: 0.85;
    }

    .site-header.scrolled .site-logo {
      transform: scale(0.85);
    }

    .top-row {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    header.top {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    header.top h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    .meta {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* Desktop: tytuł, data i selektor dni w jednym, węższym rzędzie —
       na mobile zostaje układ kolumnowy (sprawdzony, ma zostać bez zmian). */
    @media (min-width: 641px) {
      .top-row {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 1.5rem;
      }

      header.top {
        flex-direction: row;
        align-items: baseline;
        gap: 0.9rem;
      }

      .day-strip {
        flex: 0 0 auto;
      }

      .day-tabs {
        flex: 0 0 auto;
      }

      .day-tab {
        flex: 0 0 auto;
        width: 2.5rem;
      }
    }

    .day-strip {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .day-strip .day-nav {
      flex: 0 0 auto;
      width: 1.7rem;
      height: 1.7rem;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .day-strip .day-nav:hover {
      background: var(--accent-soft);
      color: var(--text-primary);
    }

    .day-tabs {
      flex: 1 1 auto;
      display: flex;
      gap: 0.3rem;
    }

    .day-tab {
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.05rem;
      padding: 0.3rem 0.35rem;
      border-radius: 10px;
      background: transparent;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .day-tab:hover {
      background: var(--accent-soft);
    }

    .day-tab .weekday {
      font-size: 0.6rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .day-tab .day-num {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .day-tab.is-today .day-num {
      color: var(--accent);
    }

    .day-tab.is-selected {
      background: var(--accent);
    }

    .day-tab.is-selected .weekday {
      color: var(--accent-contrast);
      opacity: 0.75;
    }

    .day-tab.is-selected .day-num {
      color: var(--accent-contrast);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    #status {
      color: #d03b3b;
      min-height: 1.2em;
      font-size: 0.9rem;
    }

    .card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.25rem 1.4rem;
    }

    .card h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.6rem;
    }

    .card p {
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--text-primary);
      white-space: pre-line;
    }

    .card.comment {
      border-left: 3px solid var(--accent);
    }

    .komentarz-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .komentarz-bubble {
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--accent-soft);
      border-radius: 12px;
      padding: 0.75rem 0.95rem;
    }

    /* Podsumowanie dnia: jeden punkt = jeden bąbelek, kolor krawędzi + ikona
       sygnalizują typ (nigdy sam kolor — patrz ikona tekstowa w JS). */
    .komentarz-bubble--punkt {
      display: flex;
      align-items: flex-start;
      gap: 0.55rem;
      border-left: 3px solid var(--border);
    }

    .komentarz-bubble--dobre {
      border-left-color: var(--good);
    }

    .komentarz-bubble--problem {
      border-left-color: var(--feedback-overdue);
    }

    .punkt-icon {
      flex: 0 0 auto;
      font-weight: 700;
      line-height: 1.5;
    }

    .komentarz-bubble--dobre .punkt-icon {
      color: var(--good);
    }

    .komentarz-bubble--problem .punkt-icon {
      color: var(--feedback-overdue);
    }

    .komentarz-bubble--neutralne .punkt-icon {
      color: var(--text-muted);
    }

    /* Segmentowany pasek (Realizacja planu / Priorytety) — zamiast suchych
       liczb w kafelkach, część-do-całości widać na pierwszy rzut oka. */
    .seg-bar {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .seg-bar-track {
      display: flex;
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--accent-soft);
      gap: 2px;
    }

    .seg-bar-fill {
      height: 100%;
    }

    .seg-bar-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .seg-bar-legend .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 0.35rem;
      vertical-align: middle;
    }

    .seg-bar-legend strong {
      color: var(--text-primary);
    }

    .stat-tile.stat-tile--win .value {
      color: var(--good);
    }

    .seg-bar-heading-wrap {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .seg-bar-heading {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .card.zmiany {
      border-left: 3px solid var(--good);
    }

    .zmiany-list {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .zmiany-item {
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-primary);
      padding-left: 1.1rem;
      position: relative;
    }

    .zmiany-item::before {
      content: '•';
      position: absolute;
      left: 0.15rem;
      color: var(--text-secondary);
    }

    .zmiany-item.is-added::before {
      content: '+';
      color: var(--good);
      font-weight: 700;
    }

    .zmiany-item.is-removed::before {
      content: '–';
      color: var(--feedback-overdue);
      font-weight: 700;
    }

    .zmiany-item .zmiany-name {
      font-weight: 600;
    }

    .zmiany-item .zmiany-arrow {
      color: var(--text-secondary);
      margin: 0 0.3rem;
    }

    .zmiany-empty {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(9.5rem, 1fr));
      gap: 0.9rem;
    }

    .stat-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.2rem;
    }

    .stat-tile .value {
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--accent);
      font-variant-numeric: proportional-nums;
    }

    .stat-tile .label {
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .stat-tile.desktop-only {
      display: none;
    }

    @media (min-width: 641px) {
      .stat-tile.desktop-only {
        display: flex;
      }
    }

    .cases {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* Lead = <details> — mobile-first: wiersz skrótowy (summary) zwija się/rozwija,
       na wąskim ekranie łamie się do dwóch linii, na szerokim mieści się w jednej. */
    .lead {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.15s ease;
    }

    /* Gdy otwarty jest custom dropdown statusu (patrz .status-menu), musi móc
       wystawać ponad górną krawędź karty, więc na czas otwarcia wyłączamy
       przycinanie i podnosimy nad sąsiednie karty w liście. */
    .lead.status-menu-open {
      overflow: visible;
      z-index: 40;
    }

    .lead.zamkniete {
      opacity: 0.5;
    }

    .lead summary:hover {
      background: var(--accent-soft);
    }

    .lead summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem 0.7rem;
      padding: 0.75rem 0.9rem;
    }

    .lead summary::-webkit-details-marker {
      display: none;
    }

    /* Strzałka jako czysty kształt CSS (nie glif fontu) — glif "▸" ma
       niesymetryczne metryki i przy rotacji sprawiał wrażenie, że lata wokół
       przesuniętego punktu zamiast obracać się w miejscu. Trójkąt zbudowany
       z obramowania ma symetryczny bounding-box, więc obrót wokół jego
       środka (domyślny transform-origin) zawsze wygląda wycentrowany. */
    .lead summary .chevron {
      flex: 0 0 auto;
      width: 2.15rem;
      height: 2.15rem;
      border-radius: 999px;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
      margin-right: 0.3rem;
    }

    .lead summary:hover .chevron {
      background: var(--border);
    }

    .lead summary .chevron::before {
      content: '';
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0.36rem 0 0.36rem 0.5rem;
      border-color: transparent transparent transparent var(--text-secondary);
      transition: transform 0.15s ease;
    }

    .lead[open] summary .chevron::before {
      transform: rotate(90deg);
    }

    .lead summary .lp {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      flex: 0 0 auto;
    }

    .lead summary .close-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 1.05rem;
      height: 1.05rem;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      background: var(--accent-soft);
      flex: 0 0 auto;
      position: relative;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .lead summary .close-checkbox:hover {
      border-color: var(--text-muted);
    }

    .lead summary .close-checkbox:checked {
      background: var(--text-muted);
      border-color: var(--text-muted);
    }

    .lead summary .close-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 42%;
      width: 0.28rem;
      height: 0.52rem;
      border: solid var(--surface-1);
      border-width: 0 2px 2px 0;
      transform: translate(-50%, -50%) rotate(45deg);
    }

    /* Imię i nazwisko (desktop) nie rozciąga się (brak flex-grow), więc numer
       telefonu zaraz za nim ląduje dosłownie zaraz za tekstem — bez martwego
       odstępu. max-width to tylko zabezpieczenie na wypadek bardzo długiego/
       dwuczłonowego nazwiska (wtedy się przycina wielokropkiem). */
    .lead summary .name {
      flex: 0 0 auto;
      width: auto;
      max-width: 13rem;
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Domyślnie (desktop/szerokie ekrany) contact-row jest "przezroczysty"
       (display: contents) — telefon i data feedbacku stają się bezpośrednimi
       elementami flex w summary, więc telefon zostaje tuż za imieniem
       i nazwiskiem, tak jak wcześniej. Dopiero na mobile (media query niżej)
       zamieniamy go w realny box, żeby złapać telefon+datę w jeden wiersz. */
    .lead summary .contact-row {
      display: contents;
    }

    .lead summary .contact-row .phone-sep {
      color: var(--text-muted);
      flex: 0 0 auto;
    }

    .lead summary .contact-row .phone {
      font-size: 0.85rem;
      color: var(--text-secondary);
      white-space: nowrap;
      flex: 0 0 auto;
      text-decoration: none;
    }

    .lead summary .contact-row .phone:hover {
      text-decoration: underline;
    }

    .na-jutro-dot {
      flex: 0 0 auto;
      width: 6px;
      height: 6px;
      margin-left: 2px;
      border-radius: 50%;
      background: #e8b400;
    }

    .copy-btn {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.3rem;
      height: 1.3rem;
      padding: 0;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
    }

    .copy-btn:hover {
      background: var(--accent-soft);
      color: var(--text-primary);
    }

    .copy-btn.copied {
      color: var(--good);
    }

    /* Najbliższa akcja: krótka pigułka "co dalej z tym leadem" na zwiniętym
       case'ie, tuż za telefonem. Zasilana automatycznie (analiza rozmów
       Zadarmy / notatka handlowca), klik = ręczna edycja, × w edytorze =
       skasowanie. Czerwona, gdy termin akcji już minął. */
    .lead summary .akcja-pill {
      flex: 0 1 auto;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-soft);
      border: none;
      border-radius: 999px;
      padding: 0.12rem 0.6rem;
      max-width: 17rem;
      min-width: 0;
      cursor: pointer;
      text-align: left;
    }

    .lead summary .akcja-pill .akcja-tekst {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Kręcące się kółko "rozmowa w analizie" — pokazywane na case'ie od
       odłożenia słuchawki do końca analizy GPT (patrz pollRozmowyWToku).
       Klasyczny obracający się pierścień, nie klepsydra/tekst. */
    .lead summary .rozmowa-spinner {
      flex: 0 0 auto;
      display: inline-block;
      width: 0.85rem;
      height: 0.85rem;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: rozmowa-spin 0.7s linear infinite;
    }

    @keyframes rozmowa-spin {
      to { transform: rotate(360deg); }
    }

    .lead summary .akcja-pill .akcja-strzalka {
      flex: 0 0 auto;
      opacity: 0.6;
    }

    .lead summary .akcja-pill.is-overdue {
      color: var(--feedback-overdue);
    }

    /* Ptaszek "zrobione dziś" — widoczny dopiero po najechaniu na pigułkę,
       po prawej stronie tekstu akcji. */
    .lead summary .akcja-pill .akcja-done {
      display: none;
      flex: 0 0 auto;
      align-items: center;
      justify-content: center;
      width: 1.1rem;
      height: 1.1rem;
      margin-right: -0.25rem;
      border-radius: 50%;
      color: var(--text-muted);
      font-size: 0.8rem;
      line-height: 1;
    }

    .lead summary .akcja-pill:hover .akcja-done {
      display: inline-flex;
    }

    .lead summary .akcja-pill .akcja-done:hover {
      background: var(--surface-1);
      color: var(--good);
    }

    .lead summary .akcja-edit {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      flex: 1 1 auto;
      min-width: 0;
    }

    .lead summary .akcja-edit input {
      font: inherit;
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-1);
      color: var(--text-primary);
      padding: 0.15rem 0.45rem;
      flex: 1 1 9rem;
      min-width: 7rem;
    }

    .lead summary .akcja-edit .akcja-edit-btn {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.5rem;
      height: 1.5rem;
      padding: 0;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.95rem;
    }

    .lead summary .akcja-edit .akcja-edit-btn:hover {
      background: var(--accent-soft);
      color: var(--text-primary);
    }

    .field .value.with-copy {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* Status: custom dropdown zamiast natywnego <select>, żeby móc w pełni
       kontrolować pozycję rozwijanej listy (patrz .status-menu niżej). */
    .status-wrap {
      position: relative;
      flex: 0 0 auto;
    }

    .lead summary .status-tag {
      position: relative;
      appearance: none;
      -webkit-appearance: none;
      font: inherit;
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-soft);
      border: none;
      padding: 0.1rem 1.3rem 0.1rem 0.55rem;
      border-radius: 999px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: left;
      /* Stała szerokość dla wszystkich statusów — dopasowana do najdłuższej
         etykiety ("Po pierwszym telefonie"), żeby pigułka nigdy nie kurczyła
         się do szerokości sąsiadów i nie wyglądała nierówno w rzędzie. */
      width: 11.5rem;
      flex: 0 0 auto;
      cursor: pointer;
    }

    .lead summary .status-tag::after {
      content: '';
      position: absolute;
      right: 0.6rem;
      top: 50%;
      width: 0.35rem;
      height: 0.35rem;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: translateY(-75%) rotate(45deg);
      opacity: 0.7;
      pointer-events: none;
    }

    /* Rozwijana lista statusów — przyczepiona krawędzią dolną do górnej
       krawędzi całej wyceny (.lead), niezależnie od tego, gdzie w karcie
       (na dole, w wierszu 3) znajduje się sam przycisk statusu. */
    .status-menu {
      display: none;
      flex-direction: column;
      gap: 0.25rem;
      position: absolute;
      left: 0;
      right: 0;
      bottom: 100%;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.4rem;
      box-shadow: 0 -8px 20px rgba(0, 0, 0, 0.16);
      z-index: 41;
    }

    .status-menu.open {
      display: flex;
    }

    .status-option {
      font: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      text-align: left;
      white-space: nowrap;
      border: none;
      border-radius: 999px;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
    }

    .status-option.is-selected {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .lead summary .feedback-date {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex: 0 0 auto;
      /* Label + wartość (input lub zwykły tekst w widoku "Nowe") mają różne
         własne metryki linii — inline-flex + center trzyma je w jednej,
         wspólnej osi z sąsiednimi pigułkami (status, link), zamiast polegać
         na wyrównaniu bazowym tekstu. */
      display: inline-flex;
      align-items: center;
    }

    /* Kotwica prawej grupy (data feedbacku / status / link do formularza) —
       przydzielana w JS dokładnie jednemu, najwcześniejszemu z obecnych
       elementów (patrz leadItem()). Nie dawać margin-left:auto osobno na
       .feedback-date/.status-wrap/.form-link "na wszelki wypadek" — kilka
       auto-marginesów z rzędu w tym samym flexboksie dzieli między siebie
       wolną przestrzeń zamiast działać jak jedna kotwica, co rozjeżdża
       wiersz gdy jakiegoś pola brakuje. */
    .lead summary .right-anchor {
      margin-left: auto;
    }

    .lead summary .feedback-date .label {
      color: inherit;
    }

    .lead summary .feedback-date.is-overdue {
      color: var(--feedback-overdue);
    }

    .lead summary .feedback-date-input {
      border: none;
      background: transparent;
      color: inherit;
      font: inherit;
      font-size: inherit;
      padding: 0;
      cursor: pointer;
    }

    .lead summary .feedback-date-input::-webkit-calendar-picker-indicator {
      cursor: pointer;
      opacity: 0.65;
      margin-left: -0.35rem;
      padding: 1px;
    }

    .lead summary .form-link {
      flex: 0 0 auto;
      width: 1.9rem;
      height: 1.9rem;
      border-radius: 999px;
      background: var(--accent);
      color: var(--accent-contrast);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
    }

    .lead summary .form-link.form-link--empty {
      background: var(--accent-soft);
      color: var(--text-muted);
      cursor: default;
    }

    .lead-body {
      border-top: 1px solid var(--border);
      padding: 1.1rem 1.15rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Własny komentarz handlowca — przycisk nad Opisem. Zapis idzie do
       "Historii" (wiersz w Log zmian) + kolumny "Historia rozmów" w Leady
       B2C; GPT po drodze wyciąga z treści najbliższą akcję. */
    .notatka-sekcja {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .notatka-btn {
      align-self: flex-start;
      font: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--accent-soft);
      border: none;
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      cursor: pointer;
    }

    .notatka-btn:hover {
      color: var(--text-primary);
    }

    .notatka-editor {
      display: none;
      flex-direction: column;
      gap: 0.4rem;
    }

    .notatka-editor.open {
      display: flex;
    }

    .notatka-editor textarea {
      font: inherit;
      font-size: 0.88rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-1);
      color: var(--text-primary);
      padding: 0.5rem 0.6rem;
      min-height: 3.4rem;
      resize: vertical;
    }

    .notatka-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .notatka-actions .notatka-send {
      font: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--surface-1);
      background: var(--accent);
      border: none;
      border-radius: 999px;
      padding: 0.28rem 0.85rem;
      cursor: pointer;
    }

    .notatka-actions .notatka-cancel,
    .notatka-actions .notatka-mic {
      font: inherit;
      font-size: 0.8rem;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-radius: 999px;
      padding: 0.28rem 0.5rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
    }

    .notatka-actions .notatka-mic.recording {
      color: var(--feedback-overdue);
    }

    .notatka-actions button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .notatka-msg {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .notatka-msg.err {
      color: var(--feedback-overdue);
    }

    .opis-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .opis-wrap .opis-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .lead-body .opis-text {
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .historia-rozmow {
      margin-top: 0.5rem;
    }

    .historia-rozmow > summary {
      list-style: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .historia-rozmow > summary::-webkit-details-marker {
      display: none;
    }

    .historia-rozmow > summary::before {
      content: '▸';
      display: inline-block;
      font-size: 1.15rem;
      line-height: 0.6;
      transition: transform 0.15s ease;
    }

    .historia-rozmow[open] > summary::before {
      transform: rotate(90deg);
    }

    .historia-rozmow-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-top: 0.5rem;
      padding-left: 0.9rem;
      border-left: 1px solid var(--border);
    }

    .historia-rozmow-entry {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      font-size: 0.85rem;
    }

    .historia-rozmow-data {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .historia-rozmow-notatka {
      color: var(--text-primary);
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr));
      gap: 0.7rem 1.1rem;
      align-items: start;
    }

    .field-grid + .field-grid {
      margin-top: 0.35rem;
      padding-top: 0.9rem;
      border-top: 1px solid var(--border);
    }

    .field-grid .field.wide {
      grid-column: 1 / -1;
    }

    .produkty-details > summary {
      list-style: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: var(--text-primary);
      font-size: 0.86rem;
    }

    .produkty-details > summary::-webkit-details-marker {
      display: none;
    }

    .produkty-details > summary::before {
      content: '▸';
      display: inline-block;
      font-size: 1rem;
      line-height: 0.6;
      color: var(--text-muted);
      transition: transform 0.15s ease;
    }

    .produkty-details[open] > summary::before {
      transform: rotate(90deg);
    }

    .produkty-list {
      list-style: none;
      margin: 0.4rem 0 0;
      padding: 0 0 0 0.9rem;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .produkty-list li {
      font-size: 0.86rem;
      color: var(--text-primary);
    }

    .field {
      min-width: 0;
    }

    .field .label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .field .value {
      font-size: 0.86rem;
      color: var(--text-primary);
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .field .value.nowrap {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .field .value a {
      color: var(--accent);
    }

    details.kategoria > summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0 0.15rem 0.65rem;
    }

    details.kategoria > summary::-webkit-details-marker {
      display: none;
    }

    details.kategoria > summary .kategoria-chevron {
      display: inline-flex;
      font-size: 0.95rem;
      transition: transform 0.15s ease;
    }

    details.kategoria[open] > summary .kategoria-chevron {
      transform: rotate(90deg);
    }

    .kategorie-wrap {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.65rem;
      padding-left: 0.15rem;
    }

    @media (max-width: 640px) {
      .wrap {
        width: 100%;
        max-width: 100%;
      }

      .composer-inner {
        width: 100%;
        max-width: 100%;
      }

      .stat-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 1.2rem 0.5rem;
      }

      .stat-tile {
        align-items: center;
        text-align: center;
      }

      /* Wymuszony, stały układ 3 "pięter" w wierszu wyceny — niezależnie od
         długości imienia/telefonu, żeby się nie rozsypywał w różnych kombinacjach:
         1) lp + checkbox + imię (+ link do formularza), 2) telefon + data feedbacku, 3) status. */
      .lead summary {
        align-items: center;
      }

      .lead summary .chevron { order: 1; }
      .lead summary .lp { order: 2; }
      .lead summary .close-checkbox { order: 3; }
      .lead summary .name {
        order: 4;
        flex: 1 1 auto;
        width: auto;
        min-width: 6rem;
      }

      .lead summary .form-link {
        order: 5;
        margin-left: auto;
      }

      .lead summary .contact-row {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 0.3rem 0.7rem;
        order: 6;
        flex-basis: 100%;
        width: 100%;
        margin-top: 0.45rem;
      }

      /* Na mobile telefon stoi sam w swoim wierszu (bez imienia obok),
         więc myślnik-separator przed numerem jest tu zbędny. */
      .lead summary .contact-row .phone-sep {
        display: none;
      }

      /* Na mobile data ma stać tuż przy telefonie w tym samym wierszu, więc
         zerujemy odpychające auto-margin z wersji desktopowej. */
      .lead summary .contact-row .feedback-date {
        margin-left: 0;
      }

      /* Pigułka akcji może zająć cały wiersz contact-row na mobile. */
      .lead summary .akcja-pill {
        max-width: 100%;
      }

      .lead summary .status-wrap {
        order: 7;
        flex-basis: 100%;
        margin-top: 0.45rem;
      }

      .lead summary .status-tag {
        width: 100%;
      }
    }

    /* Przełącznik dokumentu: Umowa / Podsumowanie dnia */
    .doc-toggle {
      display: inline-flex;
      gap: 0.25rem;
      background: var(--accent-soft);
      padding: 0.25rem;
      border-radius: 999px;
      align-self: flex-start;
    }

    .doc-pill {
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.35rem 0.95rem;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .doc-pill:hover {
      color: var(--text-primary);
    }

    .doc-pill.is-active {
      background: var(--accent);
      color: var(--accent-contrast);
    }

    /* Badge stanu dokumentu (Draft / Draft — poprawka AI / Final) */
    .badge.state-final {
      background: var(--good);
      color: #ffffff;
    }

    /* Composer: pływające pole poleceń AI na dole ekranu.
       Widoczne tylko, gdy aktywny dokument jest w stanie draft/poprawka. */
    .composer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 60;
      display: none;
      justify-content: center;
      background: var(--accent-soft);
      border-top: 1px solid var(--border);
      padding: 0.7rem 0 calc(0.7rem + env(safe-area-inset-bottom));
    }

    .composer.visible {
      display: flex;
    }

    /* Gdy composer jest widoczny, treść strony dostaje zapas na dole,
       żeby ostatnia karta nie chowała się pod paskiem. */
    body.composer-open .wrap {
      padding-bottom: 10rem;
    }

    .composer-inner {
      width: 80vw;
      max-width: 80vw;
      padding: 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .composer-msg {
      font-size: 0.85rem;
      color: var(--text-secondary);
      min-height: 0;
    }

    .composer-msg:empty {
      display: none;
    }

    .composer-msg.error {
      color: #d03b3b;
    }

    .composer-controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    /* Jedna zaokrąglona "kapsuła" mieszcząca pole tekstowe + mikrofon + wyślij,
       zamiast osobnego pola na białym/szarym tle obok pigułkowych przycisków. */
    .composer-box {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 0.35rem 0.35rem 0.35rem 0.9rem;
    }

    .composer-box:focus-within {
      border-color: var(--text-muted);
    }

    .composer textarea {
      flex: 1 1 auto;
      resize: none;
      min-height: 1.5rem;
      max-height: 8rem;
      padding: 0.5rem 0;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font: inherit;
      font-size: 0.95rem;
      line-height: 1.4;
      /* Safari renderuje natywne tło pod textarea niezależnie od background
         powyżej, dopóki appearance nie jest wyłączone — inaczej pole wygląda
         na białe mimo ciemnego tła karty. */
      appearance: none;
      -webkit-appearance: none;
      scrollbar-width: thin;
      scrollbar-color: var(--text-muted) transparent;
    }

    .composer textarea:focus {
      outline: none;
    }

    .composer textarea::-webkit-scrollbar {
      width: 6px;
    }

    .composer textarea::-webkit-scrollbar-track {
      background: transparent;
    }

    .composer textarea::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 999px;
    }

    .composer-btn {
      flex: 0 0 auto;
      height: 2.2rem;
      min-width: 2.2rem;
      padding: 0 0.75rem;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font: inherit;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .composer-btn:hover:not(:disabled) {
      background: var(--accent-soft);
      color: var(--text-primary);
    }

    .composer-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .composer-btn.send {
      background: var(--accent);
      color: var(--accent-contrast);
      font-weight: 600;
    }

    .composer-btn.send:hover:not(:disabled) {
      background: var(--accent);
      opacity: 0.88;
    }

    .composer-btn.approve {
      flex: 0 0 auto;
      height: 2.6rem;
      min-width: 2.6rem;
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--good);
      font-weight: 700;
      font-size: 1.1rem;
    }

    .composer-btn.mic.recording {
      background: #d03b3b;
      border-color: #d03b3b;
      color: #ffffff;
      animation: mic-pulse 1.2s ease-in-out infinite;
    }

    @keyframes mic-pulse {
      50% { opacity: 0.65; }
    }

    .composer-btn.send {
      gap: 0.45rem;
    }

    .btn-spinner {
      width: 13px;
      height: 13px;
      flex: 0 0 auto;
      border-radius: 50%;
      border: 2px solid currentColor;
      border-top-color: transparent;
      opacity: 0.85;
      animation: btn-spin 0.7s linear infinite;
    }

    @keyframes btn-spin {
      to { transform: rotate(360deg); }
    }

    .polaczenia-summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.55rem;
    }

    .polaczenia-summary::-webkit-details-marker {
      display: none;
    }

    .polaczenia-summary h2 {
      margin: 0;
    }

    .polaczenia-chevron {
      display: inline-flex;
      font-size: 0.95rem;
      color: var(--text-secondary);
      transition: transform 0.15s ease;
    }

    #polaczenia-card[open] .polaczenia-chevron {
      transform: rotate(90deg);
    }

    #polaczenia-card .polaczenia-head {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 0.9rem;
      margin-bottom: 0.9rem;
    }

    /* Ten sam wzorzec co day-strip u góry (‹ dzień › ) — chronologicznie
       lewo→prawo, cofanie się bez limitu (nie tylko dziś/wczoraj). */
    .polaczenia-nav-btn {
      flex: 0 0 auto;
      width: 1.7rem;
      height: 1.7rem;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .polaczenia-nav-btn:hover:not(:disabled) {
      background: var(--accent-soft);
      color: var(--text-primary);
    }

    .polaczenia-nav-btn:disabled {
      visibility: hidden;
      cursor: default;
    }

    .polaczenia-day-label {
      min-width: 6rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .polaczenia-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .polaczenie-row {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .polaczenie-row summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem 0.8rem;
      padding: 0.6rem 0.85rem;
    }

    .polaczenie-row summary::-webkit-details-marker {
      display: none;
    }

    .polaczenie-row summary:hover {
      background: var(--accent-soft);
    }

    .polaczenie-row .czas {
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
      font-size: 0.82rem;
      flex: 0 0 auto;
    }

    .polaczenie-row .kierunek {
      font-size: 0.76rem;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--text-secondary);
      flex: 0 0 auto;
    }

    .polaczenie-row .telefon {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-primary);
    }

    .polaczenie-row .czas-trwania,
    .polaczenie-row .status-zmiana {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .polaczenie-row .zamkniete-dzis-badge {
      font-size: 0.76rem;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      background: var(--good);
      color: var(--accent-contrast);
      flex: 0 0 auto;
      font-weight: 600;
    }

    .polaczenie-body {
      padding: 0 0.85rem 0.85rem 0.85rem;
      font-size: 0.88rem;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .polaczenie-body .polaczenie-label {
      color: var(--text-secondary);
      font-weight: 600;
    }

    .polaczenia-empty {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <div class="wrap">
    <div class="top-row">
      <header class="top">
        <h1>Backlog</h1>

      <div class="day-strip" id="day-strip">

      </div>

    <div class="doc-toggle" id="doc-toggle">
      <button class="doc-pill is-active" data-doc="umowa" type="button">Umowa</button>
      <button class="doc-pill" data-doc="podsumowanie" type="button">Podsumowanie dnia</button>
    </div>

    <p id="status"></p>

    <section class="card zmiany" id="zmiany-card" style="display:none;">
      <h2>Wprowadzone zmiany — do zatwierdzenia</h2>

    <section class="card" id="plan-card" style="display:none;">
      <h2 id="plan-title">Plan dnia</h2>

    <section class="card" id="realizacja-card" style="display:none;">

  <!-- Composer: widoczny tylko gdy aktywny dokument jest draftem -->

              <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/>
              <path d="M19 11a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.92V20H9a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-2.08A7 7 0 0 0 19 11z"/>
            </svg>
          </button>
          <button class="composer-btn send" id="composer-send" type="button" title="Wyślij polecenie do AI">Wyślij</button>

  <script src="shared/topbar.js"></script>
  <script src="shared/wycena-card.js"></script>
  <script src="shared/wycena-editor.js"></script>
  <script src="shared/lead-card.js"></script>
  <script src="shared/kontakt-panel.js"></script>
  <script>
    // Ten sam origin co strona (lokalnie: http://localhost:3001, na Vercelu:
    // https://twoja-domena.vercel.app) — inaczej fetch leciałby zawsze w
    // localhost, nawet gdy strona jest wystawiona pod inną domeną.
    const API_BASE = window.API_BASE || '';
    const TABLE = 'Standup Log Lorenzo';

    // Dwa tryby dokumentu; kolumny w Supabase mają asymetryczne nazwy
    // (umowa: "draft poprawka AI", podsumowanie: samo "poprawka AI") — muszą
    // być dokładnie takie jak w bazie.
    const DOC_FIELDS = {
      umowa: {
        draft: 'Umowa - draft - JSON',
        poprawka: 'Umowa - draft poprawka AI - JSON',
        final: 'Umowa - final - JSON',
      },
      podsumowanie: {
        draft: 'Podsumowanie dnia - draft - JSON',
        poprawka: 'Podsumowanie dnia - poprawka AI - JSON',
        final: 'Podsumowanie dnia - final - JSON',
      },
    };

    const DOC_NAMES = { umowa: 'Umowa', podsumowanie: 'Podsumowanie dnia' };
    const STATE_BADGES = { draft: 'Draft', poprawka: 'Draft — poprawka AI', final: 'Final' };

    const PL_WEEKDAYS = ['Nd', 'Pon', 'Wt', 'Śr', 'Czw', 'Pt', 'Sob'];

    let allRows = [];
    let windowDays = [];
    let selectedDate = null;
    let activeDoc = 'umowa';
    let activeState = null; // 'draft' | 'poprawka' | 'final' | null
    let currentRow = null;  // wiersz Supabase wybranego dnia (surowe "Data" do zapisu)

    // Ten sam case (po lp) bywa renderowany w dwóch miejscach naraz —
    // w "Priorytet dziś" i w swojej kategorii. Rejestr pozwala zsynchronizować
    // zaznaczenie "zamknięte" (i przesunięcie na dół listy) w obu miejscach.
    let leadInstancesByLp = new Map();
    // Najbliższa akcja: updatery pigułek per telefon (ten sam case potrafi
    // wystąpić w kilku kategoriach naraz — wszystkie pigułki mają się zmieniać
    // razem) + żywy cache z GET /api/leady/akcje (patrz refreshAkcje).
    const akcjaUpdatersByPhone = new Map();
    let akcjeByPhone = null; // null = jeszcze nie pobrane (pigułka bierze wtedy migawkę z dokumentu)

    // Spinner "rozmowa w analizie": rejestr funkcji pokazujących/chowających
    // kółko per telefon (case może wystąpić w kilku kategoriach naraz) + zbiór
    // telefonów aktualnie w analizie (z GET /api/rozmowy/w-toku, patrz
    // pollRozmowyWToku). Nowo wyrenderowany case bierze stan startowy z tego
    // zbioru.
    const spinnerUpdatersByPhone = new Map();
    let rozmowyWTokuActive = new Set();

    function applySpinnerToPhone(phone, on) {
      (spinnerUpdatersByPhone.get(phone) || []).forEach((fn) => fn(on));
    }

    // Dopasowanie telefon → {imię, lp} z aktualnie wczytanej Umowy, żeby przy
    // wierszu połączenia (sekcja "Połączenia") było widać, do którego case'a
    // z backlogu ono należy. Budowane w loadDay, używane w renderPolaczenia —
    // jeśli Połączenia wczytają się pierwsze (możliwy wyścig przy starcie),
    // lastPolaczeniaRows pozwala je przerenderować, gdy mapa się uzupełni.
    let caseByPhone = new Map();
    let lastPolaczeniaRows = null;

    function buildCaseByPhone(draft) {
      const map = new Map();
      const addAll = (arr) => {
        if (!Array.isArray(arr)) return;
        arr.forEach((c) => {
          if (!c || !c.telefon) return;
          const digits = normalizePhone(c.telefon);
          if (digits && !map.has(digits)) map.set(digits, { imie: c.imie || '', lp: c.lp });
        });
      };
      addAll(draft.priorytet_dzis);
      if (draft.kategorie) Object.values(draft.kategorie).forEach(addAll);
      return map;
    }

    // Zmiany do zatwierdzenia: diff między oryginalnym draftem a aktualną
    // poprawką AI (skumulowany, nie tylko ostatnie polecenie) — pokazywane
    // nad Kontekstem/Komentarzem, żeby przed zatwierdzeniem było widać
    // dokładnie co się zmieniło, zamiast nowa wersja po prostu "podmieniała"
    // starą bez śladu.
    function zmianaCaseKey(c) {
      return c.lp !== undefined && c.lp !== null ? `lp:${c.lp}` : `tel:${normalizePhone(c.telefon)}`;
    }

    // Numer LP z przodu (np. "12 Wojciech Mądrala") — żeby dało się case'a
    // z karty Zmiany łatwo znowu wskazać głosowo/tekstowo w composerze.
    function caseLabel(c) {
      const name = (c && c.imie) || '(brak nazwiska)';
      return c && c.lp !== undefined && c.lp !== null ? `${c.lp} ${name}` : name;
    }

    function collectCasesByKey(doc) {
      const map = new Map();
      if (doc && doc.kategorie) {
        Object.entries(doc.kategorie).forEach(([kategoria, arr]) => {
          if (!Array.isArray(arr)) return;
          arr.forEach((c) => { if (c) map.set(zmianaCaseKey(c), { case: c, kategoria }); });
        });
      }
      return map;
    }

    const ZMIANA_FIELD_LABELS = { status: 'status', data_feedbacku: 'data feedbacku', opis: 'opis' };

    function diffCaseFields(oldC, newC) {
      const lines = [];
      Object.keys(ZMIANA_FIELD_LABELS).forEach((field) => {
        const ov = oldC[field] ?? (field === 'opis' ? oldC.komentarz : undefined) ?? '';
        const nv = newC[field] ?? (field === 'opis' ? newC.komentarz : undefined) ?? '';
        if (String(ov) !== String(nv)) {
          lines.push({ field, before: String(ov) || '—', after: String(nv) || '—' });
        }
      });
      return lines;
    }

    function diffDrafts(oldDoc, newDoc) {
      const changes = [];
      if (!oldDoc || !newDoc) return changes;

      if ((oldDoc.komentarz_dzienny || '') !== (newDoc.komentarz_dzienny || '')) {
        changes.push({ type: 'text', name: 'Komentarz dzienny', before: oldDoc.komentarz_dzienny || '—', after: newDoc.komentarz_dzienny || '—' });
      }
      if ((oldDoc.kontekst || '') !== (newDoc.kontekst || '')) {
        changes.push({ type: 'text', name: 'Kontekst', before: oldDoc.kontekst || '—', after: newDoc.kontekst || '—' });
      }

      const oldPlan = oldDoc.plan || {};
      const newPlan = newDoc.plan || {};
      new Set([...Object.keys(oldPlan), ...Object.keys(newPlan)]).forEach((key) => {
        const ov = oldPlan[key];
        const nv = newPlan[key];
        if (String(ov ?? '') !== String(nv ?? '')) {
          changes.push({ type: 'text', name: PLAN_TILE_LABELS[key] || humanizeKey(key), before: String(ov ?? '—'), after: String(nv ?? '—') });
        }
      });

      const oldPriorytet = new Set((oldDoc.priorytet_dzis || []).filter(Boolean).map(zmianaCaseKey));
      const newPriorytet = new Set((newDoc.priorytet_dzis || []).filter(Boolean).map(zmianaCaseKey));
      (newDoc.priorytet_dzis || []).forEach((c) => {
        if (c && !oldPriorytet.has(zmianaCaseKey(c))) {
          changes.push({ type: 'added', name: caseLabel(c), kategoria: 'Priorytet dziś' });
        }
      });
      (oldDoc.priorytet_dzis || []).forEach((c) => {
        if (c && !newPriorytet.has(zmianaCaseKey(c))) {
          changes.push({ type: 'removed', name: caseLabel(c), kategoria: 'Priorytet dziś' });
        }
      });

      const oldCases = collectCasesByKey(oldDoc);
      const newCases = collectCasesByKey(newDoc);

      newCases.forEach((entry, key) => {
        const name = caseLabel(entry.case);
        const oldEntry = oldCases.get(key);
        if (!oldEntry) {
          changes.push({ type: 'added', name, kategoria: KATEGORIA_LABELS[entry.kategoria] || entry.kategoria });
          return;
        }
        if (oldEntry.kategoria !== entry.kategoria) {
          changes.push({
            type: 'moved',
            name,
            before: KATEGORIA_LABELS[oldEntry.kategoria] || oldEntry.kategoria,
            after: KATEGORIA_LABELS[entry.kategoria] || entry.kategoria,
          });
        }
        diffCaseFields(oldEntry.case, entry.case).forEach((fc) => {
          changes.push({ type: 'field', name, field: ZMIANA_FIELD_LABELS[fc.field], before: fc.before, after: fc.after });
        });
      });

      oldCases.forEach((entry, key) => {
        if (!newCases.has(key)) {
          changes.push({ type: 'removed', name: caseLabel(entry.case), kategoria: KATEGORIA_LABELS[entry.kategoria] || entry.kategoria });
        }
      });

      return changes;
    }

    function zmianaItemNode(change) {
      const item = document.createElement('div');
      item.className = `zmiany-item is-${change.type === 'field' || change.type === 'moved' || change.type === 'text' ? 'changed' : change.type}`;

      const appendName = (text) => {
        const span = document.createElement('span');
        span.className = 'zmiany-name';
        span.textContent = text;
        item.appendChild(span);
      };
      const appendArrow = (before, after) => {
        item.appendChild(document.createTextNode(`„${before}”`));
        const arrow = document.createElement('span');
        arrow.className = 'zmiany-arrow';
        arrow.textContent = '→';
        item.appendChild(arrow);
        item.appendChild(document.createTextNode(`„${after}”`));
      };

      if (change.type === 'added') {
        appendName(change.name);
        item.appendChild(document.createTextNode(`: dodany do „${change.kategoria}”`));
      } else if (change.type === 'removed') {
        appendName(change.name);
        item.appendChild(document.createTextNode(`: usunięty z „${change.kategoria}”`));
      } else if (change.type === 'moved') {
        appendName(change.name);
        item.appendChild(document.createTextNode(': przeniesiony '));
        appendArrow(change.before, change.after);
      } else if (change.type === 'field') {
        appendName(change.name);
        item.appendChild(document.createTextNode(`: ${change.field} `));
        appendArrow(change.before, change.after);
      } else if (change.type === 'text') {
        appendName(change.name);
        item.appendChild(document.createTextNode(': '));
        appendArrow(change.before, change.after);
      }
      return item;
    }

    function renderZmiany(oldDoc, newDoc) {
      const card = document.getElementById('zmiany-card');
      const list = document.getElementById('zmiany-list');
      const changes = diffDrafts(oldDoc, newDoc);
      if (!changes.length) {
        card.style.display = 'none';
        list.innerHTML = '';
        return;
      }
      card.style.display = 'block';
      list.innerHTML = '';
      changes.forEach((change) => list.appendChild(zmianaItemNode(change)));
    }

    function formatPlDate(d) {
      const day = String(d.getDate()).padStart(2, '0');
      const month = String(d.getMonth() + 1).padStart(2, '0');
      return `${day}.${month}.${d.getFullYear()}`;
    }

    function isSameDate(a, b) {
      return a.toDateString() === b.toDateString();
    }

    // Ile dni dzieli podaną datę od PRAWDZIWEGO "dziś" (a nie od dnia, który
    // akurat oglądamy w zakładkach) — używane do "Realizacji planu", żeby
    // pytać /api/log-polaczen o właściwy dzień zamiast zawsze o dzisiejszy.
    function daysOffsetFromToday(date) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      return Math.round((d - today) / (24 * 60 * 60 * 1000));
    }

    // Kolumna "Data" w Supabase bywała zapisywana zarówno jako "DD.MM.YYYY",
    // jak i ISO "YYYY-MM-DD" (zaobserwowane obie formy w danych na żywo) —
    // dopasowanie musi rozpoznawać obie, zamiast polegać na jednym stringu.
    function rowMatchesDate(rowValue, date) {
      const str = String(rowValue || '').trim();
      let m = /^(\d{1,2})\.(\d{1,2})\.(\d{4})$/.exec(str);
      if (m) {
        return Number(m[1]) === date.getDate() && Number(m[2]) === date.getMonth() + 1 && Number(m[3]) === date.getFullYear();
      }
      m = /^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec(str);
      if (m) {
        return Number(m[3]) === date.getDate() && Number(m[2]) === date.getMonth() + 1 && Number(m[1]) === date.getFullYear();
      }
      return false;
    }

    function addPlainDays(date, n) {
      const d = new Date(date);
      d.setDate(d.getDate() + n);
      return d;
    }

    function isWeekend(date) {
      const day = date.getDay();
      return day === 0 || day === 6;
    }

    function getMonday(date) {
      const day = date.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      return addPlainDays(date, diff);
    }

    function buildWeekdayWindow(monday) {
      return [0, 1, 2, 3, 4].map((n) => addPlainDays(monday, n));
    }

    const KATEGORIA_LABELS = {
      alerty_watchdoga: '🚨 Alerty — temat ucieka',
      leady_do_odswiezenia: '🌡️ Leady do odświeżenia (cisza po rozmowie)',
      nowe: 'Nowe',
      nieodebrane: 'Nieodebrane',
      inne_z_feedbackiem: 'Inne z feedbackiem (ostatnie 3 dni)',
      wyceny_z_feedbackiem: 'Wyceny z feedbackiem (ostatnie 3 dni)',
      wyceny_historyczne: 'Wyceny historyczne',
      zalegle_feedbacki: 'Zaległe feedbacki',
      rozmowy_spoza_bazy: 'Rozmowy spoza bazy',
      dodane_recznie: 'Dodane ręcznie',
    };

    const KATEGORIA_ORDER = ['alerty_watchdoga', 'leady_do_odswiezenia', 'nowe', 'wyceny_z_feedbackiem', 'inne_z_feedbackiem', 'nieodebrane', 'wyceny_historyczne', 'zalegle_feedbacki', 'rozmowy_spoza_bazy', 'dodane_recznie'];

    // Kolory statusów odwzorowane z CRM-u (Google Sheets) — przybliżone,
    // nie muszą być piksel w piksel identyczne.
    const STATUS_COLORS = {
      'błędne dane': '#e4e3e0',
      'lekko zainteresowany': '#cfceca',
      'nie odebrał': '#1a56db',
      'nowy': '#a8c8f0',
      'po pierwszym tel': '#f5b995',
      'po pierwszym telefonie': '#f5b995',
      'przyszłościowy': '#f0b23d',
      'sprzedane': '#a9d9a0',
      'stracony': '#7a1220',
      'wycena wysłana': '#b13fc0',
      'zadzwonić jeszcze raz': '#f0993d',
    };

    function contrastTextColor(hex) {
      const c = hex.replace('#', '');
      const r = parseInt(c.substring(0, 2), 16);
      const g = parseInt(c.substring(2, 4), 16);
      const b = parseInt(c.substring(4, 6), 16);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.6 ? '#111111' : '#ffffff';
    }

    function applyStatusColor(el, status, colorMap = STATUS_COLORS) {
      const key = status.trim().toLowerCase();
      const matchKey = colorMap[key] ? key : Object.keys(colorMap).find((k) => key.startsWith(k));
      const bg = matchKey && colorMap[matchKey];
      if (!bg) return;
      el.style.background = bg;
      el.style.color = contrastTextColor(bg);
    }

    // Lista do ręcznej zmiany statusu (dropdown) — te same statusy co w CRM-ie.
    const STATUS_OPTIONS = [
      'Błędne dane',
      'Lekko zainteresowany',
      'Nie odebrał',
      'Nowy',
      'Po pierwszym telefonie',
      'Przyszłościowy',
      'Sprzedane',
      'Stracony',
      'Wycena wysłana',
      'Zadzwonić jeszcze raz',
    ];

    // Statusy TYLKO dla kategorii "Wyceny historyczne" — inny słownik niż
    // Leady B2C ("Deal stage"), bo tu interesuje nas wyłącznie czy klient
    // jest jeszcze zainteresowany, nie cały lejek sprzedażowy. Kolory wg
    // wzoru od Antoniego (dropdown ze arkusza Wyceny B2C).
    const WYCENA_STATUS_COLORS = {
      'open': '#b7dba3',
      'closed': '#f2a9a9',
      'powiedział że kupi': '#a7bfc9',
      'nie odbiera': '#cbb6e0',
      'kupił': '#1f6b3a',
    };

    const WYCENA_STATUS_OPTIONS = ['Open', 'Closed', 'Powiedział że kupi', 'Nie odbiera', 'Kupił'];

    // Ręczna edycja pojedynczego pola case'a (status / data feedbacku) —
    // niezależna od trybu draft/poprawka/final, zapisuje się natychmiast.
    async function saveLeadField(lp, field, value) {
      if (!currentRow || !activeState) throw new Error('Brak aktywnego dokumentu');
      const body = await postJson(`${API_BASE}/api/lead-field`, {
        doc: activeDoc,
        dataValue: currentRow['Data'],
        state: activeState,
        lp,
        field,
        value,
      });
      const column = DOC_FIELDS[activeDoc][activeState];
      if (column) currentRow[column] = body.json;
    }

    function setStatus(message) {
      document.getElementById('status').textContent = message || '';
    }

    function fmtKwota(v) {
      if (!v) return '';
      return new Intl.NumberFormat('pl-PL', { style: 'currency', currency: 'PLN', maximumFractionDigits: 0 }).format(v);
    }

    function renderMeta(draft) {
      const meta = document.getElementById('meta');
      meta.innerHTML = '';
      const parts = [draft.data];
      parts.filter(Boolean).forEach((text) => {
        const span = document.createElement('span');
        span.textContent = text;
        meta.appendChild(span);
      });
      // Nie renderujemy tu drugiego badge'a z draft.status — to pole w JSON-ie
      // jest zawsze literalnie "draft" (ustawiane raz przy generowaniu, nigdy
      // nie aktualizowane przy poprawce/zatwierdzeniu), więc pokazywanie go
      // obok właściwego badge'a stanu (poniżej, który poprawnie świeci na
      // zielono tylko dla "final") wyglądało jak dwa sprzeczne "draft" naraz.
      if (activeState) {
        const state = document.createElement('span');
        state.className = 'badge' + (activeState === 'final' ? ' state-final' : '');
        state.textContent = STATE_BADGES[activeState];
        meta.appendChild(state);
      }
    }

    // Etykiety kafelków: klucze umowy (plan dnia) + klucze podsumowania dnia.
    // Kafelki renderują się dynamicznie z tego, co faktycznie jest w JSON-ie —
    // nieznane klucze dostają etykietę z klucza (podkreślenia → spacje).
    const PLAN_TILE_LABELS = {
      nowe_count: 'Nowe',
      wyceny_feedback_count: 'Wyceny z feedbackiem',
      inne_feedback_count: 'Inne z feedbackiem',
      nieodebrane_count: 'Nieodebrane',
      wyceny_historyczne_count: 'Wyceny historyczne',
      zalegle_feedbacki_count: 'Zaległe feedbacki',
      zadzwoniono_dzis: 'Zadzwoniono dziś',
      wykonane_telefony: 'Wykonane telefony',
      zmienione_statusy: 'Zmienione statusy',
      zakupione_dzis: 'Zakupione dziś',
      wyslane_wyceny: 'Wysłane wyceny',
      nieodebrane: 'Nieodebrane',
      przelozone_na_jutro: 'Przełożone na jutro',
      priorytet_zamkniete: 'Priorytety zamknięte',
      priorytet_niezamkniete: 'Priorytety niezamknięte',
    };

    function humanizeKey(key) {
      const s = String(key).replace(/_/g, ' ');
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    // Kafelki, które podświetlamy na zielono, gdy > 0 — to "dobre wieści"
    // dnia (sprzedaż, wysłana wycena), mają rzucać się w oczy zamiast siedzieć
    // wizualnie tak samo jak reszta liczników.
    const WIN_PLAN_KEYS = ['zakupione_dzis', 'wyslane_wyceny'];

    function renderPlan(plan) {
      if (!plan) return;
      document.getElementById('plan-card').style.display = 'block';
      document.getElementById('plan-title').textContent =
        activeDoc === 'podsumowanie' ? 'Podsumowanie dnia' : 'Plan dnia';
      const grid = document.getElementById('plan-grid');
      grid.innerHTML = '';

      // Priorytety zamknięte/niezamknięte (tylko Podsumowanie dnia) idą do
      // segmentowanego paska zamiast dwóch suchych liczb — część-do-całości
      // widać na pierwszy rzut oka, bez czytania dwóch osobnych kafelków.
      const segbar = document.getElementById('plan-segbar');
      if (plan.priorytet_zamkniete !== undefined && plan.priorytet_niezamkniete !== undefined) {
        segbar.style.display = 'block';
        renderSegBar(segbar, [
          { value: plan.priorytet_zamkniete, label: 'zamknięte', color: 'var(--good)' },
          { value: plan.priorytet_niezamkniete, label: 'niezamknięte', color: 'var(--feedback-overdue)' },
        ]);
      } else {
        segbar.style.display = 'none';
      }

      // zadzwoniono_dzis idzie do sekcji "Realizacja planu" (żywe dane z Log
      // zmian), backlogi i priorytet_dzis_count to pomocnicze liczniki, nie
      // osobne kafelki — Plan dnia ma zostać przy dokładnie 6 kategoriach.
      const HIDDEN_PLAN_KEYS = [
        'zadzwoniono_dzis', 'wyceny_feedback_backlog', 'inne_feedback_backlog', 'priorytet_dzis_count',
        'priorytet_zamkniete', 'priorytet_niezamkniete',
      ];
      const known = Object.keys(PLAN_TILE_LABELS).filter((k) => !HIDDEN_PLAN_KEYS.includes(k) && plan[k] !== undefined);
      const extra = Object.keys(plan).filter(
        (k) => !HIDDEN_PLAN_KEYS.includes(k) && !(k in PLAN_TILE_LABELS) && (typeof plan[k] === 'number' || typeof plan[k] === 'string')
      );

      known.concat(extra).forEach((key) => {
        const tile = document.createElement('div');
        tile.className = 'stat-tile' + (WIN_PLAN_KEYS.includes(key) && plan[key] > 0 ? ' stat-tile--win' : '');
        const value = document.createElement('div');
        value.className = 'value';
        value.textContent = plan[key];
        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = PLAN_TILE_LABELS[key] || humanizeKey(key);
        tile.appendChild(value);
        tile.appendChild(label);
        grid.appendChild(tile);
      });
    }

    // Stały, powtarzalny zestaw pól dla każdego leada, w ustalonej kolejności.
    // Widoczne od razu w wierszu: imię/nazwisko, telefon, status, link do formularza.
    // Wszystko poniżej chowa się w rozwijanym szczególe (<details>).
    // Grupa 1: informacje kontaktowe.
    const CONTACT_FIELDS = [
      { key: 'ostatni_kontakt', label: 'Ostatni kontakt' },
      { key: 'ilosc_telefonow', label: 'Ilość telefonów' },
      { key: 'temperatura', label: 'Temperatura' },
      { key: 'zadzwonil_dzis', label: 'Skontaktowane dziś', bool: true },
      { key: 'email', label: 'Email', wide: true, nowrap: true, copy: true },
    ];

    // Grupa 2: informacje transakcyjne — ta sama stylistyka co grupa kontaktowa.
    // Etykiety data_wyceny/kwota/produkty zależą od tego, czy telefon dopasował
    // się do prawdziwej Wyceny B2C (c.ma_wycene) — bez tego dopasowania to, co
    // tu jest, to tylko notatka handlowca z rozmowy, nie oficjalna wycena.
    // id_wyceny/data_wyceny/kwota/produkty znikają całkiem, gdy nie ma wartości
    // (zamiast pokazywać pusty placeholder "—").
    const DEAL_FIELDS = [
      { key: 'data_wyceny', label: (c) => (c.ma_wycene ? 'Data wyceny' : 'Data przedstawienia oferty'), hideWhenEmpty: true },
      // id_lida = wewnętrzny numer leada (kolumna "ID Leada" w Leady B2C) —
      // zawsze widoczny, gdy jest. id_wyceny = numer prawdziwej wyceny
      // (format "#XXXX"), tylko gdy telefon faktycznie dopasował się do
      // wiersza w Wyceny B2C — to dwa różne numery, nie mylić.
      { key: 'id_lida', label: 'ID Leada', hideWhenEmpty: true },
      { key: 'id_wyceny', label: 'ID wyceny', hideWhenEmpty: true },
      { key: 'kwota', label: (c) => (c.ma_wycene ? 'Kwota' : 'Proponowana kwota'), currency: true, hideWhenEmpty: true },
      { key: 'produkty', label: (c) => (c.ma_wycene ? 'Produkty z wyceny' : 'Produkty złapane z rozmowy'), wide: true, hideWhenEmpty: true, render: produktyValueNode },
    ];

    function parsePlDate(str) {
      const m = /^(\d{1,2})\.(\d{1,2})\.(\d{4})$/.exec(String(str || '').trim());
      if (!m) return null;
      return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
    }

    function isOverdueDate(str) {
      const d = parsePlDate(str);
      if (!d) return false;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return d.getTime() < today.getTime();
    }

    // Termin najbliższej akcji: "DD.MM.YYYY" lub "DD.MM.YYYY HH:mm". Sam
    // dzień bez godziny liczy się jako przeterminowany dopiero po końcu dnia
    // ("zadzwonić 12.07" nie jest zaległe o 12.07 rano).
    function parseTerminAkcji(str) {
      const m = /^(\d{1,2})\.(\d{1,2})\.(\d{4})(?:\s+(\d{1,2}):(\d{2}))?$/.exec(String(str || '').trim());
      if (!m) return null;
      return new Date(
        Number(m[3]), Number(m[2]) - 1, Number(m[1]),
        m[4] !== undefined ? Number(m[4]) : 23,
        m[5] !== undefined ? Number(m[5]) : 59
      );
    }

    function isOverdueTermin(str) {
      const d = parseTerminAkcji(str);
      return d ? d.getTime() < Date.now() : false;
    }

    function applyAkcjaToPhone(phone, akcja) {
      const val = akcja && akcja.akcja ? akcja : null;
      if (!akcjeByPhone) akcjeByPhone = new Map();
      if (val) akcjeByPhone.set(phone, val); else akcjeByPhone.delete(phone);
      (akcjaUpdatersByPhone.get(phone) || []).forEach((fn) => fn(val));
    }

    // Pigułki akcji są żywe: dokument Umowy to migawka z rana, a akcja
    // zmienia się w ciągu dnia po każdej rozmowie/notatce — nakładamy
    // aktualny stan z Leady B2C na wyrenderowane case'y po telefonie.
    async function refreshAkcje() {
      try {
        const res = await fetch(`${API_BASE}/api/leady/akcje`);
        if (!res.ok) return;
        const rows = await res.json();
        akcjeByPhone = new Map(rows.map((r) => [normalizePhone(r.telefon), r]));
        akcjaUpdatersByPhone.forEach((fns, phone) => {
          const val = akcjeByPhone.get(phone) || null;
          fns.forEach((fn) => fn(val));
        });
      } catch { /* pigułki zostają na migawce z dokumentu */ }
    }

    // Spinner "rozmowa w analizie" — adaptacyjny poll GET /api/rozmowy/w-toku:
    // szybki gdy coś się analizuje (handlowiec właśnie skończył rozmawiać i
    // patrzy w panel), wolny gdy cisza, wcale gdy karta schowana. Żadnego
    // sztywnego "co 30 s w kółko". Gdy analiza numeru zniknie z listy →
    // refreshAkcje() dociąga świeży status/akcję/link na case bez przeładowania.
    let rozmowyPollTimer = null;
    let rozmowyPollBusy = false;

    function scheduleRozmowyPoll() {
      clearTimeout(rozmowyPollTimer);
      const hidden = document.visibilityState !== 'visible';
      const delay = hidden ? 60000 : (rozmowyWTokuActive.size ? 4000 : 25000);
      rozmowyPollTimer = setTimeout(pollRozmowyWToku, delay);
    }

    async function pollRozmowyWToku() {
      clearTimeout(rozmowyPollTimer);
      if (rozmowyPollBusy) return;
      if (document.visibilityState !== 'visible') { scheduleRozmowyPoll(); return; }
      rozmowyPollBusy = true;
      try {
        const res = await fetch(`${API_BASE}/api/rozmowy/w-toku`);
        if (res.ok) {
          const body = await res.json().catch(() => ({}));
          const now = new Set((body.telefony || []).map(normalizePhone).filter(Boolean));
          let anyCleared = false;
          rozmowyWTokuActive.forEach((p) => { if (!now.has(p)) anyCleared = true; });
          const union = new Set([...rozmowyWTokuActive, ...now]);
          rozmowyWTokuActive = now;
          union.forEach((p) => applySpinnerToPhone(p, now.has(p)));
          if (anyCleared) refreshAkcje();
        }
      } catch { /* spinner zostaje na dotychczasowym stanie */ }
      finally {
        rozmowyPollBusy = false;
        scheduleRozmowyPoll();
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') pollRozmowyWToku();
    });

    function toIsoDate(str) {
      const d = parsePlDate(str);
      if (!d) return '';
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${d.getFullYear()}-${mm}-${dd}`;
    }

    function fromIsoDate(iso) {
      const [y, m, d] = iso.split('-');
      return `${d}.${m}.${y}`;
    }

    function cleanFormularzLink(url) {
      if (!url) return url;
      // Część linków z JSON-a ma "id=#1673" zamiast "id=1673" — zdejmij ten hashtag,
      // jeśli go nie ma, link zostaje bez zmian.
      return url.replace(/([?&]id=)#/, '$1');
    }

    // Model bywa niekonsekwentny: czasem pisze "Case LP9 — ...", czasem samo
    // "LP9 — ..." bez słowa "Case" (zaobserwowane 2026-07-09) — dzielimy po
    // obu wariantach, żeby każdy case i tak trafił do własnego bąbelka.
    function splitKomentarzCases(text) {
      const parts = String(text || '')
        .split(/(?=(?:Case\s+)?LP\d+\s*—)/g)
        .map((s) => s.trim())
        .filter(Boolean);
      return parts.map((part) => part.replace(/^(?:Case\s+)?LP(\d+)\s*—/, 'Case $1 —'));
    }

    function renderKomentarz(text) {
      const list = document.getElementById('komentarz-list');
      list.innerHTML = '';
      const cases = splitKomentarzCases(text);
      const items = cases.length ? cases : [text];
      items.forEach((entry) => {
        const bubble = document.createElement('div');
        bubble.className = 'komentarz-bubble';
        bubble.textContent = entry;
        list.appendChild(bubble);
      });
    }

    // Podsumowanie dnia: jeden punkt (AI już zwraca gotową listę, bez
    // potrzeby dzielenia tekstu jak w renderKomentarz) = jeden bąbelek,
    // kolor krawędzi + ikona tekstowa według `typ` — nigdy sam kolor.
    const PUNKT_ICONS = { dobre: '✓', problem: '!', neutralne: '–' };

    function renderPunkty(punkty) {
      const list = document.getElementById('komentarz-list');
      list.innerHTML = '';
      punkty.forEach((p) => {
        const typ = PUNKT_ICONS[p.typ] ? p.typ : 'neutralne';
        const bubble = document.createElement('div');
        bubble.className = `komentarz-bubble komentarz-bubble--punkt komentarz-bubble--${typ}`;
        const icon = document.createElement('span');
        icon.className = 'punkt-icon';
        icon.textContent = PUNKT_ICONS[typ];
        const text = document.createElement('span');
        text.textContent = p.tekst;
        bubble.appendChild(icon);
        bubble.appendChild(text);
        list.appendChild(bubble);
      });
    }

    // Prosty segmentowany pasek część-do-całości (Realizacja planu /
    // Priorytety w Podsumowaniu dnia) — szerokość segmentu proporcjonalna do
    // wartości, zero segmentów o wartości 0 (żeby nie zostawiać martwych
    // pasków szerokości 0 z obwódką).
    function renderSegBar(container, segments, totalLabel) {
      container.innerHTML = '';
      const total = segments.reduce((sum, s) => sum + s.value, 0);
      const wrap = document.createElement('div');
      wrap.className = 'seg-bar';

      const track = document.createElement('div');
      track.className = 'seg-bar-track';
      segments.filter((s) => s.value > 0).forEach((s) => {
        const fill = document.createElement('div');
        fill.className = 'seg-bar-fill';
        fill.style.width = `${total ? (s.value / total) * 100 : 0}%`;
        fill.style.background = s.color;
        track.appendChild(fill);
      });
      wrap.appendChild(track);

      const legend = document.createElement('div');
      legend.className = 'seg-bar-legend';
      segments.forEach((s) => {
        const item = document.createElement('span');
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.style.background = s.color;
        item.appendChild(dot);
        const strong = document.createElement('strong');
        strong.textContent = s.value;
        item.appendChild(strong);
        item.appendChild(document.createTextNode(` ${s.label}`));
        legend.appendChild(item);
      });
      if (totalLabel) {
        const item = document.createElement('span');
        item.textContent = totalLabel;
        legend.appendChild(item);
      }
      wrap.appendChild(legend);

      container.appendChild(wrap);
    }

    function makeCopyButton(value) {
      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.type = 'button';
      copyBtn.title = 'Kopiuj';
      copyBtn.innerHTML = '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>';
      copyBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        e.preventDefault();
        navigator.clipboard.writeText(value).then(() => {
          copyBtn.classList.add('copied');
          setTimeout(() => copyBtn.classList.remove('copied'), 1200);
        });
      });
      return copyBtn;
    }

    // Zamiast jednej zbitej linijki tekstu ("? m - Cyfrowa taśma COB IP20 ? szt -
    // ...") — lista produktów rozwijana na kliknięcie, każdy produkt w
    // osobnej linii; domyślnie zwinięta, żeby nie rozdymać case'a. Rozdziela
    // po "\n" (tak teraz wygląda oczyszczone "Produkty z wyceny" w Supabase)
    // albo "; " (tak łączy formatProdukty dla dopasowanej Wyceny B2C).
    function produktyValueNode(raw) {
      if (!raw) return document.createTextNode('—');
      const items = String(raw).split(/\n|;\s*/).map((s) => s.trim()).filter(Boolean);
      if (items.length <= 1) return document.createTextNode(items[0] || String(raw));
      const details = document.createElement('details');
      details.className = 'produkty-details';
      const summary = document.createElement('summary');
      summary.textContent = `${items.length} pozycji`;
      details.appendChild(summary);
      const list = document.createElement('ul');
      list.className = 'produkty-list';
      items.forEach((item) => {
        const li = document.createElement('li');
        li.textContent = item;
        list.appendChild(li);
      });
      details.appendChild(list);
      return details;
    }

    function fieldIsEmpty(spec, raw) {
      if (spec.bool) return false;
      if (spec.currency) return !raw;
      return raw === undefined || raw === null || raw === '';
    }

    function fieldValueNode(spec, raw) {
      if (spec.link) {
        if (!raw) return document.createTextNode('—');
        const a = document.createElement('a');
        a.href = raw;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = 'Otwórz ↗';
        return a;
      }
      if (spec.bool) return document.createTextNode(raw ? 'Tak' : 'Nie');
      if (spec.currency) return document.createTextNode(raw || raw === 0 ? fmtKwota(raw) || '0 zł' : '—');
      if (raw === undefined || raw === null || raw === '') return document.createTextNode('—');
      if (spec.copy) {
        const wrap = document.createDocumentFragment();
        wrap.appendChild(document.createTextNode(String(raw)));
        wrap.appendChild(makeCopyButton(String(raw)));
        return wrap;
      }
      return document.createTextNode(String(raw));
    }

    function closeAllStatusMenus() {
      document.querySelectorAll('.status-menu.open').forEach((el) => el.classList.remove('open'));
      document.querySelectorAll('.lead.status-menu-open').forEach((el) => el.classList.remove('status-menu-open'));
    }
    document.addEventListener('click', closeAllStatusMenus);

    // Zamknięte case'y spadają na sam dół swojej listy (Priorytet dziś albo
    // dana kategoria) — zawsze wg oryginalnej kolejności w obrębie każdej
    // z tych dwóch grup (otwarte, potem zamknięte).
    function resortContainer(container) {
      const items = Array.from(container.children);
      items.sort((a, b) => {
        const aClosed = a.classList.contains('zamkniete') ? 1 : 0;
        const bClosed = b.classList.contains('zamkniete') ? 1 : 0;
        if (aClosed !== bClosed) return aClosed - bClosed;
        return Number(a.dataset.order) - Number(b.dataset.order);
      });
      items.forEach((el) => container.appendChild(el));
    }

    // Ten sam case zamyka się we wszystkich miejscach, w których jest
    // wyrenderowany naraz (Priorytet dziś + jego kategoria) — i w każdym
    // z nich spada na dół swojej listy.
    function setLeadClosed(lp, closed) {
      const instances = leadInstancesByLp.get(lp);
      if (!instances) return;
      const containers = new Set();
      instances.forEach(({ lead, checkbox }) => {
        checkbox.checked = closed;
        lead.classList.toggle('zamkniete', closed);
        if (lead.parentNode) containers.add(lead.parentNode);
      });
      containers.forEach((container) => resortContainer(container));
    }

    // Starsze wiersze z etapu walidacji migracji (zrodlo: zadarma_poll, patrz
    // server/scripts/zadarma-poll.js) mają "opis" w formie technicznego
    // "answered, 48s (from 48459... to 48607...)" — nie licz tego jako
    // treściwą notatkę, numer/czas są już w wyszarzonej linii nad tym.
    function isSurowyOpisPoll(opis) {
      return /^\S+,\s*\d+s\s*\(from\s+\S+\s+to\s+\S+\)$/i.test(String(opis || '').trim());
    }

    function leadItem(c, orderIndex, categoryKey) {
      const isWycenaHistoryczna = categoryKey === 'wyceny_historyczne';
      const statusColors = isWycenaHistoryczna ? WYCENA_STATUS_COLORS : STATUS_COLORS;
      const statusOptionsList = isWycenaHistoryczna ? WYCENA_STATUS_OPTIONS : STATUS_OPTIONS;
      const lead = document.createElement('details');
