<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="manifest" href="doradca.webmanifest">
<title>Doradca — LumLum</title>
<link rel="stylesheet" href="shared/topbar.css">
<style>
  :root{
    --bg:#0a0a0a; --panel:#141414; --panel-2:#1c1c1c; --line:#2a2a2a;
    --ink:#f2f0ea; --ink-soft:#b6b2a8; --ink-faint:#807c72;
    --accent:#f2b455; --accent-deep:#d8912f;
    --user:#243244; --user-ink:#dbe8f5;
    --good:#5cae86; --bad:#df6a4f;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
  #site-header{flex:none}
  .wrap{flex:1;display:flex;min-height:0;max-width:1100px;width:100%;margin:0 auto}
  .col-chat{flex:1;display:flex;flex-direction:column;min-width:0}
  .col-mem{width:300px;flex:none;border-left:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:14px}
  @media(max-width:820px){ .col-mem{position:fixed;inset:0 0 0 auto;z-index:30;width:min(320px,86vw);transform:translateX(100%);transition:transform .22s;box-shadow:-20px 0 50px rgba(0,0,0,.5)} .col-mem.open{transform:none} }

  .stream{flex:1;overflow-y:auto;padding:18px clamp(12px,4vw,28px) 8px}
  .msgs{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
  .empty{color:var(--ink-faint);text-align:center;margin-top:14vh;font-size:15px;line-height:1.7}
  .empty b{color:var(--accent)}
  .chips-suggest{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
  .sugg{background:var(--panel);border:1px solid var(--line);color:var(--ink-soft);border-radius:999px;padding:8px 13px;font-size:13px;cursor:pointer}
  .sugg:hover{border-color:var(--accent);color:var(--accent)}

  .bubble{padding:12px 15px;border-radius:14px;max-width:88%;white-space:pre-wrap;word-wrap:break-word}
  .b-user{align-self:flex-end;background:var(--user);color:var(--user-ink);border-bottom-right-radius:5px}
  .b-ai{align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:5px}
  .b-ai .cursor{display:inline-block;width:7px;height:15px;background:var(--accent);vertical-align:-2px;animation:blink 1s steps(2) infinite;margin-left:1px}
  @keyframes blink{50%{opacity:0}}
  .tools{align-self:flex-start;display:flex;flex-wrap:wrap;gap:6px;margin:-4px 0 0 2px}
  .tool{font-family:var(--mono);font-size:11px;color:var(--ink-faint);background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:3px 9px}
  .tool.on{color:var(--accent)}
  .learned{align-self:flex-start;font-size:12.5px;color:var(--good);background:rgba(92,174,134,.09);border:1px solid rgba(92,174,134,.25);border-radius:10px;padding:8px 11px;max-width:88%}
  .learned b{color:var(--good)}
  .err{align-self:flex-start;color:var(--bad);font-size:13px}

  .composer{flex:none;border-top:1px solid var(--line);background:var(--bg);padding:10px clamp(12px,4vw,28px) calc(10px + env(safe-area-inset-bottom))}
  .composer-in{max-width:760px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
  textarea{flex:1;resize:none;background:var(--panel);border:1px solid var(--line);border-radius:14px;color:var(--ink);font:inherit;padding:11px 13px;max-height:180px;min-height:46px}
  textarea:focus{outline:none;border-color:var(--accent)}
  .btn{flex:none;width:46px;height:46px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--ink-soft);cursor:pointer;display:grid;place-items:center;font-size:18px}
  .btn:hover{color:var(--ink)}
  .btn.send{background:var(--accent);color:#1a1408;border-color:transparent}
  .btn.send:disabled{opacity:.4;cursor:default}
  .btn.mic.rec{background:var(--bad);color:#fff;border-color:transparent;animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(223,106,79,.5)}50%{box-shadow:0 0 0 7px rgba(223,106,79,0)}}
  .row2{max-width:760px;margin:8px auto 0;display:flex;align-items:center;gap:14px;font-size:12.5px;color:var(--ink-faint)}
  .toggle{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--accent)}
  .mem-btn{margin-left:auto;background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:12.5px}
  .mem-btn:hover{color:var(--accent)}

  .mem-h{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin:2px 0 10px}
  .mem-group{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint);margin:14px 0 5px}
  .mem-item{display:flex;gap:8px;align-items:flex-start;font-size:13px;color:var(--ink-soft);padding:6px 0;border-top:1px solid var(--line)}
  .mem-item .x{flex:none;color:var(--ink-faint);cursor:pointer;font-size:14px;line-height:1.2}
  .mem-item .x:hover{color:var(--good)}
  .mem-due{color:var(--accent-deep);font-size:11px}
  .mem-empty{color:var(--ink-faint);font-size:13px}
  .mem-close{display:none}
  @media(max-width:820px){ .mem-close{display:block;float:right;background:none;border:none;color:var(--ink-faint);font-size:20px;cursor:pointer} }
</style>
</head>
<body>
<div id="site-header"></div>
<div class="wrap">
  <div class="col-chat">
    <div class="stream" id="stream">
      <div class="msgs" id="msgs">
        <div class="empty" id="empty">
          Cześć Antoni. Jestem <b>Fable</b> — widzę Twoją firmę na żywo i pamiętam, co ustalamy.<br>
          Napisz albo <b>powiedz</b>, o co chodzi. Bez ściemy — powiem Ci, co naprawdę zrobić.
          <div class="chips-suggest" id="suggest">
            <button class="sugg">Nie wiem, co mam dziś robić</button>
            <button class="sugg">Jak stoi pipeline?</button>
            <button class="sugg">Co pomijam?</button>
            <button class="sugg">Która reklama robi kasę, nie leady?</button>
          </div>
        </div>
      </div>
    </div>
    <div class="composer">
      <div class="composer-in">
        <button class="btn mic" id="mic" title="Dyktuj" aria-label="Dyktuj">🎙</button>
        <textarea id="input" rows="1" placeholder="Napisz albo podyktuj…"></textarea>
        <button class="btn send" id="send" title="Wyślij" aria-label="Wyślij">➤</button>
      </div>
      <div class="row2">
        <label class="toggle"><input type="checkbox" id="deep"> Głęboka analiza (wolniej, mocniej)</label>
        <button class="mem-btn" id="memToggle">🧠 Pamięć</button>
      </div>
    </div>
  </div>
  <aside class="col-mem" id="mem">
    <button class="mem-close" id="memClose" aria-label="Zamknij">×</button>
    <div class="mem-h">Pamięć doradcy</div>
    <div id="memBody"><div class="mem-empty">Ładuję…</div></div>
  </aside>
</div>

<script src="shared/topbar.js"></script>
<script>
(function(){
  'use strict';
  var API = window.API_BASE || '';
  if (window.LumTopbar) LumTopbar.mount({ active: 'doradca', into: document.getElementById('site-header') });

  var $ = function(id){ return document.getElementById(id); };
  var msgsEl = $('msgs'), streamEl = $('stream'), inputEl = $('input'), sendBtn = $('send'), micBtn = $('mic');
  var STORE = 'doradca_watek_v1';
  var history = [];            // [{role, content}] pełna rozmowa (do API)
  var busy = false;

  try { history = JSON.parse(localStorage.getItem(STORE) || '[]') || []; } catch(_) { history = []; }
  function persist(){ try { localStorage.setItem(STORE, JSON.stringify(history.slice(-40))); } catch(_){} }

  function esc(s){ var d=document.createElement('div'); d.textContent=String(s==null?'':s); return d.innerHTML; }
  function scroll(){ streamEl.scrollTop = streamEl.scrollHeight; }
  function hideEmpty(){ var e=$('empty'); if(e) e.remove(); }

  function addBubble(role, text){
    hideEmpty();
    var b=document.createElement('div');
    b.className='bubble '+(role==='user'?'b-user':'b-ai');
    b.textContent = text||'';
    msgsEl.appendChild(b); scroll(); return b;
  }
  // Render zapisanej historii
  history.forEach(function(m){ addBubble(m.role, m.content); });

  function autogrow(){ inputEl.style.height='auto'; inputEl.style.height=Math.min(inputEl.scrollHeight,180)+'px'; }
  inputEl.addEventListener('input', autogrow);

  // ── Wysyłka + streaming SSE (fetch reader) ──────────────────────────────────
  async function send(){
    var text = inputEl.value.trim();
    if (!text || busy) return;
    busy = true; sendBtn.disabled = true;
    inputEl.value=''; autogrow();
    addBubble('user', text);
    history.push({ role:'user', content:text }); persist();

    var aiBubble = addBubble('ai', '');
    var cursor = document.createElement('span'); cursor.className='cursor';
    aiBubble.appendChild(cursor);
    var toolsEl=null, answer='';

    function setTools(group){
      if(!toolsEl){ toolsEl=document.createElement('div'); toolsEl.className='tools'; msgsEl.insertBefore(toolsEl, aiBubble); }
      var chip=document.createElement('span'); chip.className='tool on'; chip.dataset.g=group;
      chip.textContent='patrzę w: '+group; toolsEl.appendChild(chip);
    }
    function markToolDone(group){ if(!toolsEl)return; var c=toolsEl.querySelector('.tool[data-g="'+group+'"].on'); if(c){ c.classList.remove('on'); c.textContent='✓ '+group; } }

    function handle(ev, data){
      if(ev==='text'){ answer += data.text||''; aiBubble.textContent=answer; aiBubble.appendChild(cursor); scroll(); }
      else if(ev==='tool'){ setTools(data.group); scroll(); }
      else if(ev==='tool_result'){ markToolDone(data.group); }
      else if(ev==='done'){ if(cursor.parentNode) cursor.remove(); }
      else if(ev==='nauczono'){
        var items=(data.inserted||[]);
        if(items.length){
          var n=document.createElement('div'); n.className='learned';
          n.innerHTML='<b>🧠 Zapamiętałem:</b> '+items.map(function(i){return esc(i.tekst);}).join(' · ');
          msgsEl.appendChild(n); scroll();
        }
        loadPamiec();
      }
      else if(ev==='error'){ if(cursor.parentNode)cursor.remove(); var e=document.createElement('div'); e.className='err'; e.textContent='Błąd: '+(data.message||'nieznany'); msgsEl.appendChild(e); }
    }

    try{
      var res = await fetch(API+'/api/doradca/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ messages: history, deep: $('deep').checked })
      });
      if(!res.ok || !res.body){ throw new Error('HTTP '+res.status); }
      var reader=res.body.getReader(), dec=new TextDecoder(), buf='';
      for(;;){
        var r=await reader.read(); if(r.done) break;
        buf += dec.decode(r.value,{stream:true});
        var idx;
        while((idx=buf.indexOf('\n\n'))>=0){
          var block=buf.slice(0,idx); buf=buf.slice(idx+2);
          var ev=null, dataStr='';
          block.split('\n').forEach(function(line){
            if(line.indexOf('event:')===0) ev=line.slice(6).trim();
            else if(line.indexOf('data:')===0) dataStr += line.slice(5).trim();
          });
          if(ev){ var d={}; try{ d=JSON.parse(dataStr||'{}'); }catch(_){}; handle(ev,d); }
        }
      }
    }catch(err){
      if(cursor.parentNode)cursor.remove();
      var e=document.createElement('div'); e.className='err'; e.textContent='Nie udało się: '+err.message; msgsEl.appendChild(e);
    }finally{
      if(cursor.parentNode)cursor.remove();
      if(answer){ history.push({ role:'assistant', content:answer }); persist(); }
      busy=false; sendBtn.disabled=false; inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', function(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
  document.addEventListener('click', function(e){ if(e.target && e.target.classList.contains('sugg')){ inputEl.value=e.target.textContent; send(); } });

  // ── Dyktowanie (Web Speech API, pl-PL) — edytowalne przed wysłaniem ─────────
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ micBtn.style.display='none'; }
  else {
    var rec=new SR(); rec.lang='pl-PL'; rec.interimResults=true; rec.continuous=true;
    var recing=false, baseText='';
    rec.onresult=function(e){
      var t='';
      for(var i=e.resultIndex;i<e.results.length;i++){ t+=e.results[i][0].transcript; }
      inputEl.value=(baseText?baseText+' ':'')+t; autogrow();
    };
    rec.onend=function(){ recing=false; micBtn.classList.remove('rec'); };
    rec.onerror=function(){ recing=false; micBtn.classList.remove('rec'); };
    micBtn.addEventListener('click', function(){
      if(recing){ rec.stop(); return; }
      baseText=inputEl.value.trim(); recing=true; micBtn.classList.add('rec');
      try{ rec.start(); }catch(_){ recing=false; micBtn.classList.remove('rec'); }
    });
  }

  // ── Pamięć: sidebar ─────────────────────────────────────────────────────────
  var memEl=$('mem'), memBody=$('memBody');
  $('memToggle').addEventListener('click', function(){ memEl.classList.toggle('open'); });
  $('memClose').addEventListener('click', function(){ memEl.classList.remove('open'); });

  async function loadPamiec(){
    try{
      var res=await fetch(API+'/api/doradca/pamiec'); if(!res.ok) throw 0;
      var body=await res.json(); var items=body.items||[], tyt=body.tytuly||{};
      if(!items.length){ memBody.innerHTML='<div class="mem-empty">Jeszcze nic — pogadaj, a zapamiętam ustalenia, obietnice i to, czego się o Tobie nauczę.</div>'; return; }
      var order=['obietnica','ustalenie','odkladane','wiedza'], html='';
      order.forEach(function(kind){
        var arr=items.filter(function(i){return i.kind===kind;});
        if(!arr.length) return;
        html+='<div class="mem-group">'+esc(tyt[kind]||kind)+'</div>';
        arr.forEach(function(i){
          var due='';
          if(kind==='obietnica' && i.due_at){ var d=new Date(i.due_at); due=' <span class="mem-due">'+(d.getTime()<Date.now()?'⏰ ':'')+d.toLocaleDateString('pl-PL')+'</span>'; }
          html+='<div class="mem-item"><span class="x" data-id="'+i.id+'" title="Domknij / usuń">✓</span><span>'+esc(i.tekst)+due+'</span></div>';
        });
      });
      memBody.innerHTML=html;
    }catch(_){ memBody.innerHTML='<div class="mem-empty">Nie udało się wczytać pamięci.</div>'; }
  }
  memBody.addEventListener('click', async function(e){
    var x=e.target.closest('.x'); if(!x) return;
    var id=x.dataset.id; x.textContent='…';
    try{ await fetch(API+'/api/doradca/pamiec/'+id+'/rozwiaz',{method:'POST',headers:{'Content-Type':'application/json'},body:'{"status":"done"}'}); }catch(_){}
    loadPamiec();
  });
  loadPamiec();
})();
</script>
</body>
</html>
