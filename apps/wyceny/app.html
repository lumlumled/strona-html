<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <title>Wyceny</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/wycena-card.css">
  <link rel="stylesheet" href="shared/topbar.css">
  <style>
    :root {
      color-scheme: light dark;
      --surface-1: #ffffff;
      --page: #f5f5f4;
      --text-primary: #111111;
      --text-secondary: #52514e;
      --text-muted: #8a8984;
      --border: rgba(17, 17, 17, 0.12);
      --accent: #111111;
      --accent-contrast: #ffffff;
      --accent-soft: #ececea;
      --good: #0ca30c;
      --bad: #b5433f;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-1: #161616;
        --page: #0a0a0a;
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --text-muted: #8a8984;
        --border: rgba(255, 255, 255, 0.14);
        --accent: #ffffff;
        --accent-contrast: #0a0a0a;
        --accent-soft: #262626;
        --good: #16c116;
        --bad: #e08585;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--page);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .content {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      min-width: 0;
      padding: 1.6rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .content-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 0.9rem;
    }

    /* ── Toolbar (renderuje assets/wyceny-tab.js) ── */
    .toolbar { display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap; }

    .toolbar input[type="text"],
    .toolbar select {
      font: inherit;
      padding: 0.5rem 0.75rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--text-primary);
    }

    .toolbar input[type="text"] { min-width: 220px; }

    .toolbar button {
      font: inherit;
      font-weight: 600;
      padding: 0.5rem 0.9rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--text-primary);
      cursor: pointer;
    }

    .toolbar button:hover { background: var(--accent-soft); }
    .count-badge { font-size: 0.85rem; color: var(--text-secondary); margin-left: auto; }

    /* ── Przełącznik Aktywne / Stracone (segmentowany) ── */
    .widok-toggle { display: inline-flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .toolbar .widok-toggle .widok-btn {
      border: none;
      border-radius: 0;
      font-weight: 600;
      padding: 0.5rem 0.9rem;
      background: var(--surface-1);
      color: var(--text-secondary);
    }
    .toolbar .widok-toggle .widok-btn + .widok-btn { border-left: 1px solid var(--border); }
    .toolbar .widok-toggle .widok-btn:hover { background: var(--accent-soft); }
    /* Aktywny segment: delikatnie jaśniejsze szare tło + jasny (biały w dark)
       font — subtelne wyróżnienie zamiast mocnego accentu (który w dark mode
       dawał biały font na białym tle). */
    .toolbar .widok-toggle .widok-btn.active {
      background: var(--accent-soft);
      color: var(--text-primary);
    }

    /* ── Filtr właściciela = kółeczka A/L (styl jak owner leada) ── */
    .owner-filter { display: inline-flex; align-items: center; gap: 0.35rem; }
    .owner-filter:empty { display: none; }
    .owner-circle {
      width: 1.7rem;
      height: 1.7rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--text-primary);
      font: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.12s ease, background 0.12s ease;
    }
    .owner-circle:hover { border-color: var(--accent); opacity: 1; }
    .owner-circle.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-contrast);
      opacity: 1;
    }

    /* Kółeczko właściciela na wierszu (inicjał, kolor per osoba) */
    .owner-badge {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.4rem;
      height: 1.4rem;
      border-radius: 50%;
      font-size: 0.7rem;
      font-weight: 700;
      background: hsl(var(--owner-hue, 210) 55% 88%);
      color: hsl(var(--owner-hue, 210) 60% 26%);
      border: 1px solid hsl(var(--owner-hue, 210) 45% 70%);
    }
    @media (prefers-color-scheme: dark) {
      .owner-badge {
        background: hsl(var(--owner-hue, 210) 40% 26%);
        color: hsl(var(--owner-hue, 210) 70% 85%);
        border-color: hsl(var(--owner-hue, 210) 40% 40%);
      }
    }

    /* ── Lista wycen (zwinięty wiersz → rozwinięta karta) ── */
    #wyceny-list { display: flex; flex-direction: column; gap: 0.4rem; }

    .lead {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.15s ease;
    }

    .lead[open] { border-color: var(--text-muted); }
    .lead.status-menu-open { overflow: visible; z-index: 30; }

    .lead summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.5rem 0.9rem;
      min-height: 2.4rem;
    }

    .lead summary::-webkit-details-marker { display: none; }
    .lead summary:hover { background: var(--accent-soft); }

    .chevron {
      flex: 0 0 auto;
      width: 1.1rem;
      height: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chevron::before {
      content: '▸';
      display: inline-block;
      transition: transform 0.15s ease;
      color: var(--text-secondary);
    }

    .lead[open] summary .chevron::before { transform: rotate(90deg); }

    .lp {
      flex: 0 0 auto;
      font-size: 0.78rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      min-width: 1.4rem;
      text-align: right;
    }

    /* Lewa kolumna (imię + telefon). Desktop: zwykły rząd. Mobile: kolumna. */
    .summary-main { display: flex; align-items: center; gap: 0.55rem; min-width: 0; }
    .summary-phone-row { display: flex; align-items: center; gap: 0.55rem; flex: 0 0 auto; }
    .summary-phone:empty, .summary-feedback:empty { display: none; }

    .summary-name {
      flex: 0 0 auto;
      max-width: 13rem;
      font-weight: 600;
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .summary-dash { color: var(--text-muted); flex: 0 0 auto; }

    .summary-phone {
      font-size: 0.82rem;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .right-anchor { margin-left: auto; display: flex; align-items: center; gap: 0.6rem; }

    .summary-feedback {
      font-size: 0.76rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .wyceny-dates {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 0 0 auto;
      font-size: 0.74rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .status-wrap { position: relative; flex: 0 0 auto; }

    .status-tag {
      position: relative;
      display: inline-block;
      padding: 0.2rem 1.25rem 0.2rem 0.65rem;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 600;
      background: var(--accent-soft);
      color: var(--text-primary);
      white-space: nowrap;
    }

    .status-tag::after {
      content: '';
      position: absolute;
      right: 0.6rem;
      top: 50%;
      width: 0.35rem;
      height: 0.35rem;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: translateY(-75%) rotate(45deg);
      opacity: 0.7;
      pointer-events: none;
    }

    .status-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 0.35rem;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      padding: 0.35rem;
      z-index: 40;
      min-width: 180px;
    }

    .status-menu.open { display: block; }

    .status-option {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.4rem 0.6rem;
      border-radius: 8px;
      border: none;
      background: transparent;
      font: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text-primary);
    }

    .status-option:hover { background: var(--accent-soft); }

    .empty-note { color: var(--text-muted); font-style: italic; font-size: 0.85rem; }

    @media (max-width: 720px) {
      .content { padding: 1.25rem 1rem 3rem; }

      /* Na wąskim ekranie zostają kluczowe: #, imię, telefon, kwota, status,
         właściciel (kółeczko) i "Błąd pipeline" (na czerwono). Reszta — myślnik,
         daty, chip "Wycena", źródło oraz pozostałe etapy (w tym "Link wysłany") —
         schowana. */
      .summary-dash, .wyceny-dates, .typ-wycena,
      .zrodlo-chip, .row-stage:not(.stage-error) { display: none; }

      /* Wiersz w dwóch liniach: LEWA = imię nad telefonem, PRAWA = status+kółeczko
         nad kwotą (+ ewentualny czerwony "Błąd"). */
      .lead summary {
        align-items: flex-start;
        gap: 0.5rem;
        padding: 0.55rem 0.7rem;
      }
      .chevron { width: 0.9rem; padding-top: 0.05rem; }
      .lp { min-width: 1.1rem; padding-top: 0.1rem; }

      .summary-main {
        flex: 1 1 auto;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.15rem;
      }
      .summary-name { max-width: 100%; }
      .summary-phone-row { gap: 0.35rem; }
      .summary-feedback { font-size: 0.8rem; }

      /* Prawa kolumna jako siatka 2×2:
           [status]  [właściciel]
           [kwota]   [błąd]
         Właściciel = małe kółeczko w prawym-górnym rogu; "Błąd" (gdy jest) na
         czerwono pod nim. */
      .right-anchor {
        margin-left: auto;
        display: grid;
        grid-template-columns: auto auto;
        grid-template-areas:
          "status owner"
          "money  stg";
        column-gap: 0.4rem;
        row-gap: 0.15rem;
        align-items: center;
        justify-items: end;
      }
      .right-anchor .status-wrap { grid-area: status; }
      .right-anchor .owner-badge { grid-area: owner; }
      .right-anchor .summary-feedback { grid-area: money; }
      .right-anchor .row-stage { grid-area: stg; }
    }
  </style>
</head>
<body>
  <header id="site-header"></header>
  <main class="content">
    <header class="content-header">
      <h2>Wyceny B2C</h2>
      <div class="toolbar" id="wyceny-toolbar"></div>
    </header>
    <div id="wyceny-list"></div>
  </main>

  <script src="shared/topbar.js"></script>
  <script src="shared/wycena-card.js"></script>
  <script src="shared/wycena-editor.js"></script>
  <script src="assets/wyceny-tab.js"></script>
  <script>
    const API_BASE = window.API_BASE || '';
    LumTopbar.mount({ active: 'wyceny', into: document.getElementById('site-header') });

    // Dostęp do panelu = pełna praca z wyceną (dodanie, edycja, link).
    // Filtr per owner robi serwer; podgląd-only nie jest tu potrzebny.
    WycenyTab.init({
      apiBase: API_BASE,
      toolbarEl: document.getElementById('wyceny-toolbar'),
      listEl: document.getElementById('wyceny-list'),
      readOnly: false,
    });
    WycenyTab.ensureLoaded();
  </script>
</body>
</html>
