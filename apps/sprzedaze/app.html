<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <title>Sprzedaże</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/wycena-card.css">
  <link rel="stylesheet" href="shared/topbar.css">
  <style>
    :root {
      color-scheme: light dark;
      --surface-1: #ffffff;
      --page: #f5f5f4;
      --text-primary: #111111;
      --text-secondary: #52514e;
      --text-muted: #8a8984;
      --border: rgba(17, 17, 17, 0.12);
      --accent: #111111;
      --accent-contrast: #ffffff;
      --accent-soft: #ececea;
      --good: #0ca30c;
      --bad: #b5433f;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-1: #161616;
        --page: #0a0a0a;
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --text-muted: #8a8984;
        --border: rgba(255, 255, 255, 0.14);
        --accent: #ffffff;
        --accent-contrast: #0a0a0a;
        --accent-soft: #262626;
        --good: #16c116;
        --bad: #e08585;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--page);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .content {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      min-width: 0;
      padding: 1.6rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .content-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 0.9rem;
    }

    /* ── Statystyki (domyślnie zwinięte) ── */
    .stats-panel { margin-bottom: 0.4rem; }

    .stats-panel > summary {
      list-style: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      padding: 0.3rem 0.1rem;
      user-select: none;
    }
    .stats-panel > summary::-webkit-details-marker { display: none; }
    .stats-panel > summary::before {
      content: '▸';
      display: inline-block;
      transition: transform 0.15s ease;
      color: var(--text-muted);
    }
    .stats-panel[open] > summary::before { transform: rotate(90deg); }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.7rem;
      margin: 0.6rem 0 1rem;
    }

    .stat {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.9rem 1rem;
    }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .stat-value {
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-top: 0.25rem;
      font-variant-numeric: tabular-nums;
    }

    .stat-sub { font-size: 0.78rem; color: var(--text-secondary); margin-top: 0.15rem; }

    .stat-delta { font-size: 0.75rem; font-weight: 600; margin-top: 0.3rem; display: inline-block; }
    .stat-delta.up { color: var(--good); }
    .stat-delta.down { color: var(--bad); }

    .toolbar { display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap; }

    .toolbar input[type="text"] {
      font: inherit;
      padding: 0.5rem 0.75rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--text-primary);
      min-width: 240px;
    }

    .toolbar button {
      font: inherit;
      font-weight: 600;
      padding: 0.5rem 0.9rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--text-primary);
      cursor: pointer;
    }

    .toolbar button:hover { background: var(--accent-soft); }
    .count-badge { font-size: 0.85rem; color: var(--text-secondary); margin-left: auto; }

    /* ── Filtr właściciela = kółeczka A/L (styl jak owner leada) ── */
    .owner-filter { display: inline-flex; align-items: center; gap: 0.35rem; }
    .owner-filter:empty { display: none; }
    .owner-circle {
      width: 1.7rem;
      height: 1.7rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--text-primary);
      font: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.12s ease, background 0.12s ease;
    }
    .owner-circle:hover { border-color: var(--accent); opacity: 1; }
    .owner-circle.active { background: var(--accent); border-color: var(--accent); color: var(--accent-contrast); opacity: 1; }

    .owner-badge {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.4rem;
      height: 1.4rem;
      border-radius: 50%;
      font-size: 0.7rem;
      font-weight: 700;
      background: hsl(var(--owner-hue, 210) 55% 88%);
      color: hsl(var(--owner-hue, 210) 60% 26%);
      border: 1px solid hsl(var(--owner-hue, 210) 45% 70%);
    }
    @media (prefers-color-scheme: dark) {
      .owner-badge {
        background: hsl(var(--owner-hue, 210) 40% 26%);
        color: hsl(var(--owner-hue, 210) 70% 85%);
        border-color: hsl(var(--owner-hue, 210) 40% 40%);
      }
    }

    #list { display: flex; flex-direction: column; gap: 1.5rem; }

    .sale-segment { display: flex; flex-direction: column; gap: 0.4rem; }

    .segment-head {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0 0.15rem 0.15rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.25rem;
    }

    .segment-title {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    .segment-count {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      background: var(--accent-soft);
      border-radius: 999px;
      padding: 0.05rem 0.5rem;
      font-variant-numeric: tabular-nums;
    }

    /* Dostarczone i Zamknięte na zielono (domknięte pozytywnie); Czeka na
       płatność bursztynowo (akcja: pilnuj wpłaty); Stracone stonowana czerwień. */
    .sale-segment[data-seg="dostarczone"] .segment-title,
    .sale-segment[data-seg="zamkniete"] .segment-title,
    .sale-segment[data-seg="dostarczone"] .segment-count,
    .sale-segment[data-seg="zamkniete"] .segment-count { color: var(--good); }
    .sale-segment[data-seg="czeka"] .segment-title,
    .sale-segment[data-seg="czeka"] .segment-count { color: #d98416; }
    .sale-segment[data-seg="stracone"] .segment-title { color: #9a3b3b; }

    .sale {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.15s ease;
    }

    .sale[open] { border-color: var(--text-muted); }

    .sale summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.55rem 0.9rem;
      min-height: 2.5rem;
    }

    .sale summary::-webkit-details-marker { display: none; }
    .sale summary:hover { background: var(--accent-soft); }

    .chevron { flex: 0 0 auto; width: 1.1rem; display: flex; justify-content: center; }
    .chevron::before {
      content: '▸';
      transition: transform 0.15s ease;
      color: var(--text-secondary);
    }
    .sale[open] summary .chevron::before { transform: rotate(90deg); }

    .lp {
      flex: 0 0 auto;
      font-size: 0.78rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .summary-name {
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 15rem;
    }

    .summary-place {
      font-size: 0.8rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1;
    }

    .right-anchor { margin-left: auto; display: flex; align-items: center; gap: 0.6rem; flex: 0 0 auto; }

    .summary-date { font-size: 0.76rem; color: var(--text-muted); white-space: nowrap; }
    .summary-kwota { font-weight: 700; font-size: 0.92rem; font-variant-numeric: tabular-nums; white-space: nowrap; }

    .empty-note { color: var(--text-muted); font-style: italic; font-size: 0.85rem; }

    @media (max-width: 720px) {
      .content { padding: 1.25rem 1rem 3rem; }
      .summary-place, .summary-date { display: none; }
      .summary-name { max-width: 10rem; }
    }
  </style>
</head>
<body>
  <header id="site-header"></header>
  <main class="content">
    <header class="content-header">
      <h2>Sprzedaże</h2>
      <details class="stats-panel" id="stats-panel">
        <summary>Statystyki</summary>
        <div class="stats" id="stats"></div>
      </details>
      <div class="toolbar">
        <input type="text" id="search" placeholder="Szukaj: imię, telefon, e-mail, numer, miasto…">
        <div class="owner-filter" id="owner-filter"></div>
        <button id="refresh">Odśwież</button>
        <span class="count-badge" id="count"></span>
      </div>
    </header>
    <div id="list"></div>
  </main>

  <script src="shared/topbar.js"></script>
  <script src="shared/wycena-card.js"></script>
  <script>
    const API_BASE = window.API_BASE || '';
    LumTopbar.mount({ active: 'sprzedaze', into: document.getElementById('site-header') });

    const { moneyPLN, stageChip, formatDT } = WycenaKarta.utils;
    let all = [];
    let ownerFilter = ''; // '' = wszyscy; inaczej dokładna nazwa ownera

    function h(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }

    // ── Właściciel sprzedaży (owner) ────────────────────────────────────────
    function ownerHue(name) {
      let hash = 0;
      for (const ch of String(name || 'x')) hash = (hash * 31 + ch.charCodeAt(0)) % 360;
      return hash;
    }
    function ownerInitial(name) {
      const n = String(name || '').trim();
      return n ? n.charAt(0).toUpperCase() : '?';
    }
    function ownerBadge(owner) {
      const name = String(owner || '').trim();
      const b = h('span', 'owner-badge', ownerInitial(name));
      b.title = name ? `Właściciel: ${name}` : 'Brak właściciela';
      b.style.setProperty('--owner-hue', String(ownerHue(name)));
      return b;
    }

    // Filtr właściciela — Lorenzo i tak dostaje z serwera tylko swoje sprzedaże
    // (prywatne per owner); dla admina (Antoni) filtr rozdziela A / L.
    function renderOwnerFilter() {
      const wrap = document.getElementById('owner-filter');
      if (!wrap) return;
      const owners = [...new Set(all.map((w) => String(w.owner || '').trim()).filter(Boolean))].sort();
      if (ownerFilter && !owners.includes(ownerFilter)) ownerFilter = '';
      wrap.innerHTML = '';
      if (owners.length < 2) return;
      // Kółeczka A/L (styl jak owner leada). Bez „Wszyscy": klik = zawęź,
      // klik na aktywne = odznacz (wspólne). Lista i STATYSTYKI podążają za wyborem.
      owners.forEach((o) => {
        const active = ownerFilter === o;
        const btn = h('button', 'owner-circle' + (active ? ' active' : ''), ownerInitial(o));
        btn.type = 'button';
        btn.title = active ? `Tylko: ${o} (kliknij, by pokazać wszystkich)` : `Pokaż tylko: ${o}`;
        btn.addEventListener('click', () => {
          ownerFilter = active ? '' : o; // toggle
          renderOwnerFilter();
          renderList();
          loadStats();
        });
        wrap.appendChild(btn);
      });
    }

    // Statystyki podążają za przełącznikiem właściciela: admin (Antoni) może
    // podejrzeć statystyki Lorenzo (?owner=), Lorenzo i tak dostaje z serwera
    // tylko swoje. Nagłówek pokazuje, czyje statystyki są na ekranie.
    async function loadStats() {
      try {
        const qs = ownerFilter ? `?owner=${encodeURIComponent(ownerFilter)}` : '';
        const res = await fetch(`${API_BASE}/api/sprzedaze/stats${qs}`);
        const body = await res.json().catch(() => null);
        if (res.ok && body) renderStats(body);
        const sum = document.querySelector('#stats-panel > summary');
        if (sum) sum.textContent = ownerFilter ? `Statystyki — ${ownerFilter}` : 'Statystyki';
      } catch (e) { /* statystyki są opcjonalne — brak nie blokuje listy */ }
    }

    // ── Statystyki: liczba i suma sprzedaży, ten vs poprzedni miesiąc ────────
    function renderStats(stats) {
      const wrap = document.getElementById('stats');
      wrap.innerHTML = '';

      const mk = (label, count, suma, extra) => {
        const card = h('div', 'stat');
        card.appendChild(h('div', 'stat-label', label));
        card.appendChild(h('div', 'stat-value', suma));
        card.appendChild(h('div', 'stat-sub', count));
        if (extra) card.appendChild(extra);
        return card;
      };

      const fmt = (n) => `${Number(n || 0).toLocaleString('pl-PL', { maximumFractionDigits: 0 })} zł`;

      // Porównanie do TEMPA zeszłego miesiąca do dziś (nie do całej kwoty) —
      // średni obrót/dzień × dni, które minęły w tym miesiącu.
      const pace = stats.tempo && stats.tempo.poprzedniDoTempa;
      const tenExtra = document.createDocumentFragment();
      if (pace > 0) {
        tenExtra.appendChild(h('div', 'stat-sub', `tempo zeszłego mies. do dziś ≈ ${fmt(pace)}`));
        const pct = Math.round(((stats.tenMiesiac.suma - pace) / pace) * 100);
        const delta = h('span', `stat-delta ${pct >= 0 ? 'up' : 'down'}`, `${pct >= 0 ? '▲' : '▼'} ${Math.abs(pct)}% vs tempo`);
        delta.title = `Względem średniego tempa zeszłego miesiąca do ${stats.tempo.daysElapsed}. dnia (≈ ${fmt(pace)}). Cała kwota zeszłego miesiąca: ${fmt(stats.poprzedniMiesiac.suma)}.`;
        tenExtra.appendChild(delta);
      }

      wrap.append(
        mk('Ten miesiąc', `${stats.tenMiesiac.count} zamówień`, fmt(stats.tenMiesiac.suma), tenExtra),
        mk('Poprzedni miesiąc', `${stats.poprzedniMiesiac.count} zamówień`, fmt(stats.poprzedniMiesiac.suma)),
        mk('Łącznie', `${stats.total.count} zamówień`, fmt(stats.total.suma)),
      );
    }

    // Zamówienia z Shopify mają WŁASNĄ numerację S1, S2… (wg daty), osobną od
    // numeracji #ID naszego systemu. Numer S liczymy deterministycznie z daty
    // (najstarsze = S1), więc jest stabilny i nie miesza się z #ID. Nowe
    // zamówienia sklepu zawsze są najnowsze, więc dostają kolejny najwyższy S.
    function assignShopifySeq(list) {
      list.forEach((w) => { delete w._sNo; });
      list.filter((w) => w.source === 'shopify' && w.created_at)
        .sort((a, b) => new Date(a.created_at) - new Date(b.created_at))
        .forEach((w, i) => { w._sNo = i + 1; });
    }

    function displayNo(w) {
      return (w.source === 'shopify' && w._sNo) ? `S${w._sNo}` : `#${w.id}`;
    }

    // ── Wiersz sprzedaży ─────────────────────────────────────────────────────
    function placeOf(w) {
      if (w.punkt_odbioru && String(w.punkt_odbioru).replace(/[,\s]/g, '')) {
        return `Paczkomat ${String(w.punkt_odbioru).replace(/,\s*$/, '')}`;
      }
      const parts = [w.ship_city, w.ship_country && w.ship_country !== 'PL' ? w.ship_country : ''].filter(Boolean);
      return parts.join(', ');
    }

    function saleRow(w) {
      const details = h('details', 'sale');
      details.dataset.wycenaId = String(w.id);

      const summary = document.createElement('summary');
      const name = w.imie_nazwisko || [w.first_name, w.last_name].filter(Boolean).join(' ') || w.email || '(bez danych)';

      const rightAnchor = h('div', 'right-anchor');
      rightAnchor.append(
        ownerBadge(w.owner),
        h('span', 'summary-date', w.created_at ? formatDT(w.created_at).slice(0, 10) : ''),
        h('span', 'summary-kwota', moneyPLN(w.kwota_sprzedazy_brutto ?? w.kwota_proponowana_brutto)),
        saleStatusChip(w),
      );

      summary.append(
        h('span', 'chevron'),
        h('span', 'lp', displayNo(w)),
        h('span', 'summary-name', name),
        h('span', 'summary-place', placeOf(w)),
        rightAnchor,
      );

      let built = false;
      details.addEventListener('toggle', () => {
        if (!details.open || built) return;
        built = true;
        const { el } = WycenaKarta.buildBody(w, {
          apiBase: API_BASE,
          readOnly: false,
          mode: 'sprzedaze',
          onChanged: () => load(),
        });
        details.appendChild(el);
      });

      details.appendChild(summary);
      return details;
    }

    function matches(w) {
      if (ownerFilter && String(w.owner || '').trim() !== ownerFilter) return false;
      const q = document.getElementById('search').value.trim().toLowerCase();
      if (!q) return true;
      const hay = `${displayNo(w)} ${w.id} ${w.shopify_order_name || ''} ${w.imie_nazwisko || ''} ${w.first_name || ''} ${w.last_name || ''} ${w.telefon_e164 || ''} ${w.email || ''} ${w.ship_city || ''} ${w.punkt_odbioru || ''}`.toLowerCase();
      return hay.includes(q);
    }

    // Segmenty sprzedaży (2026-07-14): Do wysłania → Czeka na płatność → Wysłane
    // → Dostarczone (≤7 dni od doręczenia) → Zamknięte (starsze / Closed) →
    // Stracone. Etykiety po polsku, ale w bazie deal-status zostaje po angielsku
    // (Open/Waiting for payment/Fulfilled/Closed/Stracone) — bucket jest liczony,
    // nie zapisywany.
    // "Wysłane" = przesyłka FIZYCZNIE nadana (tracking sent, nadana_at albo
    // ręcznie w Fulfillment) — NIE samo utworzenie etykiety, więc pobranie z
    // etykietą, ale niespakowane, zostaje w "Do wysłania". "Dostarczone" trzyma
    // paczkę tydzień po doręczeniu (deal jest już Closed w bazie), potem spada do
    // "Zamknięte". "Do wysłania" = gotowe do przygotowania + spakowane (przed
    // nadaniem); rozdział ready/spakowane żyje w panelu Fulfillment.
    const DOSTARCZONE_MS = 7 * 24 * 60 * 60 * 1000; // „Dostarczone" żyje 7 dni od nadania, potem → Zamknięte
    function bucketOf(w) {
      const status = String(w.status || '').toLowerCase();
      if (status === 'stracone') return 'stracone';
      const ships = w._shipments || [];
      // Doręczone: NASZA przesyłka delivered LUB pipeline oznaczył DELIVERED.
      // Zamówienia sklepu/importu nie mają naszej przesyłki — jedynym sygnałem
      // doręczenia jest process_stage (dlatego wcześniej lądowały w „Do wysłania").
      const delivered = ships.some((s) => String(s.status) === 'delivered' || s.delivered_at)
        || String(w.process_stage) === 'DELIVERED';
      if (delivered) {
        // „Dostarczone" tylko 7 dni od NADANIA (data nadania jest stabilna;
        // delivered_at bywa momentem wykrycia przez workera). Brak nadania →
        // licz od daty sprzedaży (created_at). Starsze → Zamknięte.
        const nadanaTs = Math.max(0, ...ships.map((s) => (s.nadana_at ? new Date(s.nadana_at).getTime() : 0)));
        const anchor = nadanaTs || (w.created_at ? new Date(w.created_at).getTime() : 0);
        return anchor && Date.now() - anchor < DOSTARCZONE_MS ? 'dostarczone' : 'zamkniete';
      }
      if (status === 'closed') return 'zamkniete';
      if (status === 'waiting for payment' && !w.paid) return 'czeka';
      const nadane = ships.some((s) => ['sent', 'delivered'].includes(String(s.status)) || s.nadana_at);
      if (nadane) return 'wyslane';
      // Sklep/import bez NASZEJ przesyłki nie są do pakowania przez nas (Shopify
      // realizuje sam, import to historia) — do „Zamknięte", nie „Do wysłania".
      if ((w.source === 'shopify' || w.source === 'import') && ships.length === 0) return 'zamkniete';
      return 'dowyslania';
    }

    // Status w wierszu = PRAWDZIWY stan (z kubełka), NIE surowy process_stage —
    // SHIPPED bywa ustawiany już przy „gotowe", więc mylnie pokazywał „Wysłana"
    // na paczkach, których jeszcze nie nadano.
    function saleStatusChip(w) {
      const MAP = {
        czeka: ['Czeka na płatność', 'warn'],
        dowyslania: ['Gotowe do nadania', ''],
        wyslane: ['Nadane', 'info'],
        dostarczone: ['Dostarczona', 'good'],
        zamkniete: ['Zamknięta', 'good'],
        stracone: ['Stracone', 'bad'],
      };
      const [label, tone] = MAP[bucketOf(w)] || ['—', ''];
      const el = h('span', 'wk-chip' + (tone && tone !== 'warn' ? ' ' + tone : ''), label);
      if (tone === 'warn') { el.style.background = 'rgba(217, 132, 22, 0.14)'; el.style.color = '#c07a10'; }
      return el;
    }

    const SEGMENTS = [
      ['czeka', 'Czeka na płatność'],
      ['dowyslania', 'Do wysłania'],
      ['wyslane', 'Wysłane'],
      ['dostarczone', 'Dostarczone'],
      ['zamkniete', 'Zamknięte'],
      ['stracone', 'Stracone'],
    ];

    function renderList() {
      const openIds = new Set([...document.querySelectorAll('#list details[open]')].map((d) => d.dataset.wycenaId));
      const list = document.getElementById('list');
      const filtered = all.filter(matches);
      list.innerHTML = '';

      const groups = Object.fromEntries(SEGMENTS.map(([k]) => [k, []]));
      filtered.forEach((w) => { groups[bucketOf(w)].push(w); });

      SEGMENTS.forEach(([key, label]) => {
        const rows = groups[key];
        // Kubełki historyczne chowamy, gdy puste; akcyjne (Do wysłania, Czeka na
        // płatność) pokazujemy zawsze, żeby było widać „nic nie czeka".
        if (!rows.length && key !== 'dowyslania' && key !== 'czeka') return;
        const section = h('section', 'sale-segment');
        section.dataset.seg = key;
        const head = h('div', 'segment-head');
        head.append(h('span', 'segment-title', label), h('span', 'segment-count', String(rows.length)));
        section.appendChild(head);
        if (!rows.length) {
          section.appendChild(h('p', 'empty-note', 'Nic tutaj.'));
        } else {
          rows.forEach((w) => {
            const row = saleRow(w);
            if (openIds.has(String(w.id))) row.open = true;
            section.appendChild(row);
          });
        }
        list.appendChild(section);
      });

      document.getElementById('count').textContent = `${filtered.length} / ${all.length} sprzedaży`;
    }

    async function load() {
      try {
        const listRes = await fetch(`${API_BASE}/api/wyceny?typ=${encodeURIComponent('ZAMÓWIENIE')}`);
        if (listRes.status === 401) { window.location.href = `${API_BASE}/login`; return; }
        const listBody = await listRes.json();
        if (!listRes.ok) throw new Error(listBody.error || 'Błąd wczytywania');
        all = listBody.data || [];
        // Numeracja S dla Shopify + sort chronologiczny (najnowsze u góry) —
        // zamiast po #ID, bo zamówienia sklepu dostawały ID poza kolejnością dat.
        assignShopifySeq(all);
        all.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
        renderOwnerFilter();
        renderList();
        loadStats();
      } catch (err) {
        document.getElementById('list').innerHTML = `<p class="empty-note">Błąd wczytywania: ${err.message}</p>`;
      }
    }

    document.getElementById('search').addEventListener('input', renderList);
    document.getElementById('refresh').addEventListener('click', load);
    document.getElementById('list').innerHTML = '<p class="empty-note">Wczytywanie…</p>';
    load();
  </script>
</body>
</html>
