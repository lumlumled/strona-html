<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="manifest" href="/assets/manifest.webmanifest">
  <meta name="theme-color" content="#000000">
  <title>Logowanie — {{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --surface-1: #ffffff;
      --page: #f5f5f4;
      --text-primary: #111111;
      --text-secondary: #52514e;
      --text-muted: #8a8984;
      --border: rgba(17, 17, 17, 0.12);
      --accent: #111111;
      --accent-contrast: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-1: #161616;
        --page: #0a0a0a;
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --text-muted: #8a8984;
        --border: rgba(255, 255, 255, 0.14);
        --accent: #ffffff;
        --accent-contrast: #0a0a0a;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      padding: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      border-radius: 999px;
      padding: 0.7rem 1.6rem;
    }

    .brand img { height: 22px; width: auto; display: block; }

    form {
      width: 100%;
      max-width: 340px;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2rem 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.3px;
      margin-bottom: 0.2rem;
    }

    .sub {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: -0.6rem;
      margin-bottom: 0.4rem;
    }

    label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: -0.55rem;
    }

    input {
      font: inherit;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--page);
      color: var(--text-primary);
    }

    input:focus { outline: none; border-color: var(--accent); }

    button {
      font: inherit;
      font-weight: 600;
      padding: 0.65rem;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: var(--accent-contrast);
      cursor: pointer;
      margin-top: 0.3rem;
    }

    button:hover { opacity: 0.9; }

    .error {
      color: #d03b3b;
      font-size: 0.85rem;
      text-align: center;
      display: {{ERROR}};
    }
  </style>
</head>
<body>
  <div class="brand">
    <img src="assets/lumlum-logo-white.svg" alt="LumLum" onerror="this.parentElement.style.display='none'">
  </div>
  <form method="POST" action="login">
    <h1>{{TITLE}}</h1>
    <p class="sub">Narzędzia wewnętrzne LumLum</p>
    <label for="login">Login</label>
    <input type="text" id="login" name="login" placeholder="np. Antoni" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false" autofocus required>
    <label for="password">Hasło</label>
    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    <p class="error">Błędny login lub hasło</p>
    <button type="submit">Zaloguj się</button>
  </form>
</body>
</html>
