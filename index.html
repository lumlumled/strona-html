<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LumLum Standup Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Paleta i typografia dopasowane do stylu lumlum.co: monochromatyczna
       czerń/biel, font Inter, mocno zaokrąglone rogi, pigułkowe znaczniki. */
    :root {
      --surface-1: #ffffff;
      --page: #f5f5f4;
      --text-primary: #111111;
      --text-secondary: #52514e;
      --text-muted: #8a8984;
      --border: rgba(17, 17, 17, 0.12);
      --accent: #111111;
      --accent-contrast: #ffffff;
      --accent-soft: #ececea;
      --good: #0ca30c;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-1: #161616;
        --page: #0a0a0a;
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --text-muted: #8a8984;
        --border: rgba(255, 255, 255, 0.14);
        --accent: #ffffff;
        --accent-contrast: #0a0a0a;
        --accent-soft: #262626;
        --good: #16c116;
      }
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--page);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .wrap {
      width: 80vw;
      max-width: 80vw;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    header.top {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    header.top h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .meta {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    #status {
      color: #d03b3b;
      min-height: 1.2em;
      font-size: 0.9rem;
    }

    .card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.25rem 1.4rem;
    }

    .card h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.6rem;
    }

    .card p {
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--text-primary);
      white-space: pre-line;
    }

    .card.comment {
      border-left: 3px solid var(--accent);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(9.5rem, 1fr));
      gap: 0.9rem;
    }

    .stat-tile {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .stat-tile .value {
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--accent);
      font-variant-numeric: proportional-nums;
    }

    .stat-tile .value .backlog {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .stat-tile .label {
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .cases {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* Lead = <details> — mobile-first: wiersz skrótowy (summary) zwija się/rozwija,
       na wąskim ekranie łamie się do dwóch linii, na szerokim mieści się w jednej. */
    .lead {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .lead.zamkniete {
      opacity: 0.5;
    }

    .lead summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem 0.7rem;
      padding: 0.75rem 0.9rem;
    }

    .lead summary::-webkit-details-marker {
      display: none;
    }

    .lead summary .chevron {
      flex: 0 0 auto;
      width: 1.9rem;
      height: 1.9rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: transform 0.15s ease;
      margin-right: 0.3rem;
    }

    .lead[open] summary .chevron {
      transform: rotate(180deg);
    }

    .lead summary .lp {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      flex: 0 0 auto;
    }

    .lead summary .close-checkbox {
      width: 1.05rem;
      height: 1.05rem;
      border-radius: 4px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .lead summary .name {
      font-weight: 600;
      font-size: 0.95rem;
      flex: 1 1 auto;
      min-width: 8rem;
    }

    .lead summary .status-tag {
      font-size: 0.76rem;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 0.1rem 0.55rem;
      border-radius: 999px;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .lead summary .phone {
      font-size: 0.85rem;
      color: var(--text-secondary);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .lead summary .feedback-date {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .lead summary .feedback-date .label {
      color: var(--text-muted);
    }

    .lead summary .form-link {
      flex: 0 0 auto;
      width: 1.9rem;
      height: 1.9rem;
      border-radius: 999px;
      background: var(--accent);
      color: var(--accent-contrast);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      margin-left: auto;
    }

    .lead-body {
      border-top: 1px solid var(--border);
      padding: 0.8rem 0.9rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .lead-body .opis-text {
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr));
      gap: 0.6rem 1.1rem;
    }

    .field-grid + .field-grid {
      margin-top: 0.2rem;
      padding-top: 0.6rem;
      border-top: 1px solid var(--border);
    }

    .field-grid .field.wide {
      grid-column: 1 / -1;
    }

    .field {
      min-width: 0;
    }

    .field .label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .field .value {
      font-size: 0.86rem;
      color: var(--text-primary);
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .field .value a {
      color: var(--accent);
    }

    details.kategoria {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.6rem 1rem;
    }

    details.kategoria summary {
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-secondary);
      padding: 0.3rem 0;
    }

    details.kategoria .cases {
      margin-top: 0.6rem;
    }

    .kategorie-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <h1>LumLum Standup Log</h1>
      <div class="meta" id="meta"></div>
    </header>

    <p id="status"></p>

    <section class="card" id="kontekst-card" style="display:none;">
      <h2>Kontekst</h2>
      <p id="kontekst-text"></p>
    </section>

    <section class="card comment" id="komentarz-card" style="display:none;">
      <h2>Komentarz dzienny</h2>
      <p id="komentarz-text"></p>
    </section>

    <section class="card" id="plan-card" style="display:none;">
      <h2>Plan dnia</h2>
      <div class="stat-grid" id="plan-grid"></div>
    </section>

    <section class="card" id="priorytet-card" style="display:none;">
      <h2>Priorytet dziś</h2>
      <div class="cases" id="priorytet-list"></div>
    </section>

    <section class="card" id="kategorie-card" style="display:none;">
      <h2>Pozostałe kategorie</h2>
      <div class="kategorie-wrap" id="kategorie-wrap"></div>
    </section>
  </div>

  <script>
    const API_BASE = window.API_BASE || 'http://localhost:3001';
    const TABLE = 'LumLum Standup Log';
    const TARGET_DATE = '07.07.2026';
    const DRAFT_FIELD = 'Umowa - draft - JSON';

    const KATEGORIA_LABELS = {
      nowe: 'Nowe',
      nieodebrane: 'Nieodebrane',
      inne_z_feedbackiem: 'Inne z feedbackiem',
      wyceny_z_feedbackiem: 'Wyceny z feedbackiem',
      wyceny_historyczne: 'Wyceny historyczne',
    };

    function setStatus(message) {
      document.getElementById('status').textContent = message || '';
    }

    function fmtKwota(v) {
      if (!v) return '';
      return new Intl.NumberFormat('pl-PL', { style: 'currency', currency: 'PLN', maximumFractionDigits: 0 }).format(v);
    }

    function renderMeta(draft) {
      const meta = document.getElementById('meta');
      meta.innerHTML = '';
      const parts = [draft.data, draft.wygenerowano ? `wygenerowano ${draft.wygenerowano}` : null];
      parts.filter(Boolean).forEach((text) => {
        const span = document.createElement('span');
        span.textContent = text;
        meta.appendChild(span);
      });
      if (draft.status) {
        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = draft.status;
        meta.appendChild(badge);
      }
    }

    function renderPlan(plan) {
      if (!plan) return;
      document.getElementById('plan-card').style.display = 'block';
      const grid = document.getElementById('plan-grid');
      grid.innerHTML = '';

      const tiles = [
        { label: 'Priorytet dziś', value: plan.priorytet_dzis_count },
        { label: 'Nowe', value: plan.nowe_count },
        { label: 'Wyceny z feedbackiem', value: plan.wyceny_feedback_count, backlog: plan.wyceny_feedback_backlog },
        { label: 'Inne z feedbackiem', value: plan.inne_feedback_count, backlog: plan.inne_feedback_backlog },
        { label: 'Nieodebrane', value: plan.nieodebrane_count },
        { label: 'Wyceny historyczne', value: plan.wyceny_historyczne_count },
        { label: 'Zadzwoniono dziś', value: plan.zadzwoniono_dzis },
      ];

      tiles.forEach((t) => {
        if (t.value === undefined) return;
        const tile = document.createElement('div');
        tile.className = 'stat-tile';
        const value = document.createElement('div');
        value.className = 'value';
        value.textContent = t.value;
        if (t.backlog) {
          const backlog = document.createElement('span');
          backlog.className = 'backlog';
          backlog.textContent = ` / ${t.backlog} w tle`;
          value.appendChild(backlog);
        }
        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = t.label;
        tile.appendChild(value);
        tile.appendChild(label);
        grid.appendChild(tile);
      });
    }

    // Stały, powtarzalny zestaw pól dla każdego leada, w ustalonej kolejności.
    // Widoczne od razu w wierszu: imię/nazwisko, telefon, status, link do formularza.
    // Wszystko poniżej chowa się w rozwijanym szczególe (<details>).
    // Grupa 1: informacje kontaktowe.
    const CONTACT_FIELDS = [
      { key: 'email', label: 'Email' },
      { key: 'ostatni_kontakt', label: 'Ostatni kontakt' },
      { key: 'ilosc_telefonow', label: 'Ilość telefonów' },
      { key: 'temperatura', label: 'Temperatura' },
      { key: 'ocena_ai', label: 'Ocena AI', wide: true },
    ];

    // Grupa 2: informacje transakcyjne — ta sama stylistyka co grupa kontaktowa.
    const DEAL_FIELDS = [
      { key: 'data_wyceny', label: 'Data wyceny' },
      { key: 'kwota', label: 'Kwota', currency: true },
      { key: 'produkty', label: 'Produkty' },
      { key: 'zadzwonil_dzis', label: 'Zadzwonił dziś', bool: true },
    ];

    function fieldValueNode(spec, raw) {
      if (spec.link) {
        if (!raw) return document.createTextNode('—');
        const a = document.createElement('a');
        a.href = raw;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = 'Otwórz ↗';
        return a;
      }
      if (spec.bool) return document.createTextNode(raw ? 'Tak' : 'Nie');
      if (spec.currency) return document.createTextNode(raw || raw === 0 ? fmtKwota(raw) || '0 zł' : '—');
      if (raw === undefined || raw === null || raw === '') return document.createTextNode('—');
      return document.createTextNode(String(raw));
    }

    function leadItem(c) {
      const lead = document.createElement('details');
      lead.className = 'lead' + (c.zamkniete ? ' zamkniete' : '');

      const summary = document.createElement('summary');

      const chevron = document.createElement('span');
      chevron.className = 'chevron';
      chevron.textContent = '▾';
      summary.appendChild(chevron);

      if (c.lp !== undefined) {
        const lp = document.createElement('span');
        lp.className = 'lp';
        lp.textContent = c.lp;
        summary.appendChild(lp);
      }

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'close-checkbox';
      checkbox.checked = Boolean(c.zamkniete);
      checkbox.title = 'Zamknięte (tylko lokalnie, nie zapisuje się do Supabase)';
      checkbox.addEventListener('click', (e) => e.stopPropagation());
      checkbox.addEventListener('change', () => {
        lead.classList.toggle('zamkniete', checkbox.checked);
      });
      summary.appendChild(checkbox);

      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = c.imie || '(brak nazwiska)';
      summary.appendChild(name);

      if (c.status) {
        const tag = document.createElement('span');
        tag.className = 'status-tag';
        tag.textContent = c.status;
        summary.appendChild(tag);
      }

      const phone = document.createElement('span');
      phone.className = 'phone';
      phone.textContent = c.telefon || '—';
      summary.appendChild(phone);

      if (c.data_feedbacku) {
        const feedbackDate = document.createElement('span');
        feedbackDate.className = 'feedback-date';
        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = 'Data feedbacku: ';
        feedbackDate.appendChild(label);
        feedbackDate.appendChild(document.createTextNode(c.data_feedbacku));
        summary.appendChild(feedbackDate);
      }

      if (c.link_formularz) {
        const a = document.createElement('a');
        a.className = 'form-link';
        a.href = c.link_formularz;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = '↗';
        a.title = 'Otwórz formularz';
        // Nie chcemy, żeby kliknięcie w link jednocześnie zwijało/rozwijało wiersz.
        a.addEventListener('click', (e) => e.stopPropagation());
        summary.appendChild(a);
      }

      lead.appendChild(summary);

      const body = document.createElement('div');
      body.className = 'lead-body';

      if (c.opis || c.komentarz) {
        const opis = document.createElement('div');
        opis.className = 'opis-text';
        opis.textContent = c.opis || c.komentarz;
        body.appendChild(opis);
      }

      function fieldGrid(fields) {
        const grid = document.createElement('div');
        grid.className = 'field-grid';
        fields.forEach((spec) => {
          const field = document.createElement('div');
          field.className = 'field' + (spec.wide ? ' wide' : '');
          const label = document.createElement('div');
          label.className = 'label';
          label.textContent = spec.label;
          const value = document.createElement('div');
          value.className = 'value';
          value.appendChild(fieldValueNode(spec, c[spec.key]));
          field.appendChild(label);
          field.appendChild(value);
          grid.appendChild(field);
        });
        return grid;
      }

      body.appendChild(fieldGrid(CONTACT_FIELDS));
      body.appendChild(fieldGrid(DEAL_FIELDS));

      lead.appendChild(body);

      return lead;
    }

    function renderPriorytet(list) {
      if (!list || !list.length) return;
      document.getElementById('priorytet-card').style.display = 'block';
      const container = document.getElementById('priorytet-list');
      container.innerHTML = '';
      list.forEach((c) => container.appendChild(leadItem(c)));
    }

    function renderKategorie(kategorie) {
      if (!kategorie) return;
      const entries = Object.entries(kategorie).filter(([, arr]) => Array.isArray(arr) && arr.length);
      if (!entries.length) return;
      document.getElementById('kategorie-card').style.display = 'block';
      const wrap = document.getElementById('kategorie-wrap');
      wrap.innerHTML = '';
      entries.forEach(([key, arr]) => {
        const details = document.createElement('details');
        details.className = 'kategoria';
        const summary = document.createElement('summary');
        summary.textContent = `${KATEGORIA_LABELS[key] || key} (${arr.length})`;
        details.appendChild(summary);
        const list = document.createElement('div');
        list.className = 'cases';
        arr.forEach((c) => list.appendChild(leadItem(c)));
        details.appendChild(list);
        wrap.appendChild(details);
      });
    }

    async function init() {
      try {
        const res = await fetch(`${API_BASE}/api/tables/${encodeURIComponent(TABLE)}`);
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.error || `Błąd ${res.status}`);
        }
        const rows = await res.json();
        const row = rows.find((r) => r['Data'] === TARGET_DATE) || rows[0];
        if (!row) throw new Error('Brak danych w tabeli');

        const draft = row[DRAFT_FIELD];
        if (!draft) throw new Error(`Brak pola "${DRAFT_FIELD}" w wierszu`);

        renderMeta(draft);

        if (draft.kontekst) {
          document.getElementById('kontekst-card').style.display = 'block';
          document.getElementById('kontekst-text').textContent = draft.kontekst;
        }

        if (draft.komentarz_dzienny) {
          document.getElementById('komentarz-card').style.display = 'block';
          document.getElementById('komentarz-text').textContent = draft.komentarz_dzienny;
        }

        renderPlan(draft.plan);
        renderPriorytet(draft.priorytet_dzis);
        renderKategorie(draft.kategorie);
      } catch (err) {
        setStatus(err.message);
      }
    }

    init();
  </script>
</body>
</html>
