<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backlog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Paleta i typografia dopasowane do stylu lumlum.co: monochromatyczna
       czerń/biel, font Inter, mocno zaokrąglone rogi, pigułkowe znaczniki. */
    :root {
      --surface-1: #ffffff;
      --page: #f5f5f4;
      --text-primary: #111111;
      --text-secondary: #52514e;
      --text-muted: #8a8984;
      --border: rgba(17, 17, 17, 0.12);
      --accent: #111111;
      --accent-contrast: #ffffff;
      --accent-soft: #ececea;
      --good: #0ca30c;
      --feedback-future: #b5433f;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-1: #161616;
        --page: #0a0a0a;
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --text-muted: #8a8984;
        --border: rgba(255, 255, 255, 0.14);
        --accent: #ffffff;
        --accent-contrast: #0a0a0a;
        --accent-soft: #262626;
        --good: #16c116;
        --feedback-future: #e08585;
      }
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--page);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .wrap {
      width: 80vw;
      max-width: 80vw;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      padding: 2rem 1rem 4rem;
    }

    /* Pełnej szerokości pasek, niezależny od 80vw .wrap — celowo poza nim w DOM. */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      width: 100%;
      background: #000000;
      display: flex;
      justify-content: center;
      padding: 1.1rem 0;
    }

    .site-header .site-logo {
      height: 36px;
      width: auto;
      display: block;
      transform-origin: center;
      /* transform (nie height/padding) żeby zmiana rozmiaru przy scrollu nie zmieniała
         wysokości sticky elementu — inaczej zmiana layoutu przesuwa scrollY tuż przy
         progu i chevron/logo zaczyna migotać góra-dół w pętli. */
      transition: transform 0.2s ease, opacity 0.15s ease;
    }

    .site-header:hover .site-logo {
      opacity: 0.85;
    }

    .site-header.scrolled .site-logo {
      transform: scale(0.7);
    }

    .top-row {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    header.top {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    header.top h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    .meta {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* Desktop: tytuł, data i selektor dni w jednym, węższym rzędzie —
       na mobile zostaje układ kolumnowy (sprawdzony, ma zostać bez zmian). */
    @media (min-width: 641px) {
      .top-row {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 1.5rem;
      }

      header.top {
        flex-direction: row;
        align-items: baseline;
        gap: 0.9rem;
      }

      .day-strip {
        flex: 0 0 auto;
      }

      .day-tabs {
        flex: 0 0 auto;
      }

      .day-tab {
        flex: 0 0 auto;
        width: 2.5rem;
      }
    }

    .day-strip {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .day-strip .day-nav {
      flex: 0 0 auto;
      width: 1.7rem;
      height: 1.7rem;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .day-strip .day-nav:hover {
      background: var(--accent-soft);
      color: var(--text-primary);
    }

    .day-tabs {
      flex: 1 1 auto;
      display: flex;
      gap: 0.3rem;
    }

    .day-tab {
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.05rem;
      padding: 0.3rem 0.35rem;
      border-radius: 10px;
      background: transparent;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .day-tab:hover {
      background: var(--accent-soft);
    }

    .day-tab .weekday {
      font-size: 0.6rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .day-tab .day-num {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .day-tab.is-today .day-num {
      color: var(--accent);
    }

    .day-tab.is-selected {
      background: var(--accent);
    }

    .day-tab.is-selected .weekday {
      color: var(--accent-contrast);
      opacity: 0.75;
    }

    .day-tab.is-selected .day-num {
      color: var(--accent-contrast);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    #status {
      color: #d03b3b;
      min-height: 1.2em;
      font-size: 0.9rem;
    }

    .card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.25rem 1.4rem;
    }

    .card h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.6rem;
    }

    .card p {
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--text-primary);
      white-space: pre-line;
    }

    .card.comment {
      border-left: 3px solid var(--accent);
    }

    .komentarz-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .komentarz-bubble {
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--accent-soft);
      border-radius: 12px;
      padding: 0.75rem 0.95rem;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(9.5rem, 1fr));
      gap: 0.9rem;
    }

    .stat-tile {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .stat-tile .value {
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--accent);
      font-variant-numeric: proportional-nums;
    }

    .stat-tile .label {
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .cases {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* Lead = <details> — mobile-first: wiersz skrótowy (summary) zwija się/rozwija,
       na wąskim ekranie łamie się do dwóch linii, na szerokim mieści się w jednej. */
    .lead {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.15s ease;
    }

    .lead.zamkniete {
      opacity: 0.5;
    }

    .lead summary:hover {
      background: var(--accent-soft);
    }

    .lead summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem 0.7rem;
      padding: 0.75rem 0.9rem;
    }

    .lead summary::-webkit-details-marker {
      display: none;
    }

    .lead summary .chevron {
      flex: 0 0 auto;
      width: 1.8rem;
      height: 1.8rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      transition: transform 0.15s ease, background 0.15s ease;
      margin-right: 0.3rem;
    }

    .lead summary:hover .chevron {
      background: var(--border);
    }

    .lead[open] summary .chevron {
      transform: rotate(90deg);
    }

    .lead summary .lp {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      flex: 0 0 auto;
    }

    .lead summary .close-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 1.05rem;
      height: 1.05rem;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      background: var(--accent-soft);
      flex: 0 0 auto;
      position: relative;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .lead summary .close-checkbox:hover {
      border-color: var(--text-muted);
    }

    .lead summary .close-checkbox:checked {
      background: var(--text-muted);
      border-color: var(--text-muted);
    }

    .lead summary .close-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 42%;
      width: 0.28rem;
      height: 0.52rem;
      border: solid var(--surface-1);
      border-width: 0 2px 2px 0;
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .lead summary .name-phone {
      flex: 1 1 auto;
      min-width: 8rem;
      display: flex;
      align-items: baseline;
      gap: 0.35rem;
      overflow: hidden;
    }

    .lead summary .name-phone .name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lead summary .name-phone .phone-sep {
      color: var(--text-muted);
      flex: 0 0 auto;
    }

    .lead summary .name-phone .phone {
      font-size: 0.85rem;
      color: var(--text-secondary);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .lead summary .tags {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 0 0 auto;
    }

    .lead summary .status-tag {
      font-size: 0.76rem;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 0.1rem 0.55rem;
      border-radius: 999px;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .lead summary .feedback-date {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .lead summary .feedback-date .label {
      color: inherit;
    }

    .lead summary .feedback-date.is-future {
      color: var(--feedback-future);
    }

    .lead summary .form-link {
      flex: 0 0 auto;
      width: 1.9rem;
      height: 1.9rem;
      border-radius: 999px;
      background: var(--accent);
      color: var(--accent-contrast);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      margin-left: auto;
    }

    .lead summary .form-link.form-link--empty {
      background: var(--accent-soft);
      color: var(--text-muted);
      cursor: default;
    }

    .lead-body {
      border-top: 1px solid var(--border);
      padding: 1.1rem 1.15rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .opis-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .opis-wrap .opis-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .lead-body .opis-text {
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr));
      gap: 0.7rem 1.1rem;
      align-items: start;
    }

    .field-grid + .field-grid {
      margin-top: 0.35rem;
      padding-top: 0.9rem;
      border-top: 1px solid var(--border);
    }

    .field-grid .field.wide {
      grid-column: 1 / -1;
    }

    .field {
      min-width: 0;
    }

    .field .label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .field .value {
      font-size: 0.86rem;
      color: var(--text-primary);
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .field .value.nowrap {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .field .value a {
      color: var(--accent);
    }

    details.kategoria > summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0 0.15rem 0.65rem;
    }

    details.kategoria > summary::-webkit-details-marker {
      display: none;
    }

    details.kategoria > summary .kategoria-chevron {
      display: inline-flex;
      font-size: 0.95rem;
      transition: transform 0.15s ease;
    }

    details.kategoria[open] > summary .kategoria-chevron {
      transform: rotate(90deg);
    }

    .kategorie-wrap {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.65rem;
      padding-left: 0.15rem;
    }

    @media (max-width: 640px) {
      .stat-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 1.2rem 0.5rem;
      }

      .stat-tile {
        align-items: center;
        text-align: center;
      }

      .lead summary .tags {
        order: 10;
        flex-basis: 100%;
        margin-top: 0.45rem;
      }
    }

    /* Przełącznik dokumentu: Umowa / Podsumowanie dnia */
    .doc-toggle {
      display: inline-flex;
      gap: 0.25rem;
      background: var(--accent-soft);
      padding: 0.25rem;
      border-radius: 999px;
      align-self: flex-start;
    }

    .doc-pill {
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.35rem 0.95rem;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .doc-pill:hover {
      color: var(--text-primary);
    }

    .doc-pill.is-active {
      background: var(--accent);
      color: var(--accent-contrast);
    }

    /* Badge stanu dokumentu (Draft / Draft — poprawka AI / Final) */
    .badge.state-final {
      background: var(--good);
      color: #ffffff;
    }

    /* Composer: pływające pole poleceń AI na dole ekranu.
       Widoczne tylko, gdy aktywny dokument jest w stanie draft/poprawka. */
    .composer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 60;
      display: none;
      justify-content: center;
      background: var(--surface-1);
      border-top: 1px solid var(--border);
      padding: 0.7rem 0 calc(0.7rem + env(safe-area-inset-bottom));
    }

    .composer.visible {
      display: flex;
    }

    /* Gdy composer jest widoczny, treść strony dostaje zapas na dole,
       żeby ostatnia karta nie chowała się pod paskiem. */
    body.composer-open .wrap {
      padding-bottom: 10rem;
    }

    .composer-inner {
      width: 80vw;
      max-width: 80vw;
      padding: 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .composer-msg {
      font-size: 0.85rem;
      color: var(--text-secondary);
      min-height: 0;
    }

    .composer-msg:empty {
      display: none;
    }

    .composer-msg.error {
      color: #d03b3b;
    }

    .composer-controls {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }

    .composer textarea {
      flex: 1 1 auto;
      resize: none;
      min-height: 2.6rem;
      max-height: 8rem;
      padding: 0.65rem 0.9rem;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--page);
      color: var(--text-primary);
      font: inherit;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .composer textarea:focus {
      outline: none;
      border-color: var(--text-muted);
    }

    .composer-btn {
      flex: 0 0 auto;
      height: 2.6rem;
      min-width: 2.6rem;
      padding: 0 0.85rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--text-primary);
      font: inherit;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .composer-btn:hover:not(:disabled) {
      background: var(--accent-soft);
    }

    .composer-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .composer-btn.send {
      background: var(--accent);
      color: var(--accent-contrast);
      border-color: var(--accent);
      font-weight: 600;
    }

    .composer-btn.approve {
      color: var(--good);
      border-color: var(--good);
      font-weight: 700;
      font-size: 1.1rem;
    }

    .composer-btn.mic.recording {
      background: #d03b3b;
      border-color: #d03b3b;
      color: #ffffff;
      animation: mic-pulse 1.2s ease-in-out infinite;
    }

    @keyframes mic-pulse {
      50% { opacity: 0.65; }
    }
  </style>
</head>
<body>
  <header class="site-header" id="site-header">
    <img src="assets/lumlum-logo-white.svg" alt="LumLum" class="site-logo">
  </header>

  <div class="wrap">
    <div class="top-row">
      <header class="top">
        <h1>Backlog</h1>
        <div class="meta" id="meta"></div>
      </header>

      <div class="day-strip" id="day-strip">
        <button class="day-nav" id="day-prev" type="button" aria-label="Poprzedni tydzień">‹</button>
        <div class="day-tabs" id="day-tabs"></div>
        <button class="day-nav" id="day-next" type="button" aria-label="Następny tydzień">›</button>
      </div>
    </div>

    <div class="doc-toggle" id="doc-toggle">
      <button class="doc-pill is-active" data-doc="umowa" type="button">Umowa</button>
      <button class="doc-pill" data-doc="podsumowanie" type="button">Podsumowanie dnia</button>
    </div>

    <p id="status"></p>

    <section class="card" id="kontekst-card" style="display:none;">
      <h2>Kontekst</h2>
      <p id="kontekst-text"></p>
    </section>

    <section class="card comment" id="komentarz-card" style="display:none;">
      <h2>Komentarz dzienny</h2>
      <div class="komentarz-list" id="komentarz-list"></div>
    </section>

    <section class="card" id="plan-card" style="display:none;">
      <h2 id="plan-title">Plan dnia</h2>
      <div class="stat-grid" id="plan-grid"></div>
    </section>

    <section id="priorytet-section" style="display:none;">
      <h2 class="section-title">Priorytet dziś</h2>
      <div class="cases" id="priorytet-list"></div>
    </section>

    <section id="kategorie-section" style="display:none;">
      <div class="kategorie-wrap" id="kategorie-wrap"></div>
    </section>
  </div>

  <!-- Composer: widoczny tylko gdy aktywny dokument jest draftem -->
  <div class="composer" id="composer">
    <div class="composer-inner">
      <div class="composer-msg" id="composer-msg"></div>
      <div class="composer-controls">
        <textarea id="composer-input" rows="1" placeholder="Napisz lub podyktuj polecenie, np. „case 3, zmień status na Sprzedane”…"></textarea>
        <button class="composer-btn mic" id="composer-mic" type="button" title="Dyktuj (kliknij, mów, kliknij ponownie)">🎤</button>
        <button class="composer-btn send" id="composer-send" type="button" title="Wyślij polecenie do AI">Wyślij</button>
        <button class="composer-btn approve" id="composer-approve" type="button" title="Zatwierdź wersję finalną">✓</button>
      </div>
    </div>
  </div>

  <script>
    // Ten sam origin co strona (lokalnie: http://localhost:3001, na Vercelu:
    // https://twoja-domena.vercel.app) — inaczej fetch leciałby zawsze w
    // localhost, nawet gdy strona jest wystawiona pod inną domeną.
    const API_BASE = window.API_BASE || '';
    const TABLE = 'Standup Log Lorenzo';

    // Dwa tryby dokumentu; kolumny w Supabase mają asymetryczne nazwy
    // (umowa: "draft poprawka AI", podsumowanie: samo "poprawka AI") — muszą
    // być dokładnie takie jak w bazie.
    const DOC_FIELDS = {
      umowa: {
        draft: 'Umowa - draft - JSON',
        poprawka: 'Umowa - draft poprawka AI - JSON',
        final: 'Umowa - final - JSON',
      },
      podsumowanie: {
        draft: 'Podsumowanie dnia - draft - JSON',
        poprawka: 'Podsumowanie dnia - poprawka AI - JSON',
        final: 'Podsumowanie dnia - final - JSON',
      },
    };

    const DOC_NAMES = { umowa: 'Umowa', podsumowanie: 'Podsumowanie dnia' };
    const STATE_BADGES = { draft: 'Draft', poprawka: 'Draft — poprawka AI', final: 'Final' };

    const PL_WEEKDAYS = ['Nd', 'Pon', 'Wt', 'Śr', 'Czw', 'Pt', 'Sob'];

    let allRows = [];
    let windowDays = [];
    let selectedDate = null;
    let activeDoc = 'umowa';
    let activeState = null; // 'draft' | 'poprawka' | 'final' | null
    let currentRow = null;  // wiersz Supabase wybranego dnia (surowe "Data" do zapisu)

    function formatPlDate(d) {
      const day = String(d.getDate()).padStart(2, '0');
      const month = String(d.getMonth() + 1).padStart(2, '0');
      return `${day}.${month}.${d.getFullYear()}`;
    }

    function isSameDate(a, b) {
      return a.toDateString() === b.toDateString();
    }

    // Kolumna "Data" w Supabase bywała zapisywana zarówno jako "DD.MM.YYYY",
    // jak i ISO "YYYY-MM-DD" (zaobserwowane obie formy w danych na żywo) —
    // dopasowanie musi rozpoznawać obie, zamiast polegać na jednym stringu.
    function rowMatchesDate(rowValue, date) {
      const str = String(rowValue || '').trim();
      let m = /^(\d{1,2})\.(\d{1,2})\.(\d{4})$/.exec(str);
      if (m) {
        return Number(m[1]) === date.getDate() && Number(m[2]) === date.getMonth() + 1 && Number(m[3]) === date.getFullYear();
      }
      m = /^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec(str);
      if (m) {
        return Number(m[3]) === date.getDate() && Number(m[2]) === date.getMonth() + 1 && Number(m[1]) === date.getFullYear();
      }
      return false;
    }

    function addPlainDays(date, n) {
      const d = new Date(date);
      d.setDate(d.getDate() + n);
      return d;
    }

    function isWeekend(date) {
      const day = date.getDay();
      return day === 0 || day === 6;
    }

    function getMonday(date) {
      const day = date.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      return addPlainDays(date, diff);
    }

    function buildWeekdayWindow(monday) {
      return [0, 1, 2, 3, 4].map((n) => addPlainDays(monday, n));
    }

    const KATEGORIA_LABELS = {
      nowe: 'Nowe',
      nieodebrane: 'Nieodebrane',
      inne_z_feedbackiem: 'Inne z feedbackiem',
      wyceny_z_feedbackiem: 'Wyceny z feedbackiem',
      wyceny_historyczne: 'Wyceny historyczne',
      dodane_recznie: 'Dodane ręcznie',
    };

    const KATEGORIA_ORDER = ['nowe', 'wyceny_z_feedbackiem', 'inne_z_feedbackiem', 'nieodebrane', 'wyceny_historyczne', 'dodane_recznie'];

    function setStatus(message) {
      document.getElementById('status').textContent = message || '';
    }

    function fmtKwota(v) {
      if (!v) return '';
      return new Intl.NumberFormat('pl-PL', { style: 'currency', currency: 'PLN', maximumFractionDigits: 0 }).format(v);
    }

    function renderMeta(draft) {
      const meta = document.getElementById('meta');
      meta.innerHTML = '';
      const parts = [draft.data];
      parts.filter(Boolean).forEach((text) => {
        const span = document.createElement('span');
        span.textContent = text;
        meta.appendChild(span);
      });
      if (draft.status) {
        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = draft.status;
        meta.appendChild(badge);
      }
      if (activeState) {
        const state = document.createElement('span');
        state.className = 'badge' + (activeState === 'final' ? ' state-final' : '');
        state.textContent = STATE_BADGES[activeState];
        meta.appendChild(state);
      }
    }

    // Etykiety kafelków: klucze umowy (plan dnia) + klucze podsumowania dnia.
    // Kafelki renderują się dynamicznie z tego, co faktycznie jest w JSON-ie —
    // nieznane klucze dostają etykietę z klucza (podkreślenia → spacje).
    const PLAN_TILE_LABELS = {
      nowe_count: 'Nowe',
      wyceny_feedback_count: 'Wyceny z feedbackiem',
      inne_feedback_count: 'Inne z feedbackiem',
      nieodebrane_count: 'Nieodebrane',
      wyceny_historyczne_count: 'Wyceny historyczne',
      zadzwoniono_dzis: 'Zadzwoniono dziś',
      wykonane_telefony: 'Wykonane telefony',
      zmienione_statusy: 'Zmienione statusy',
      zakupione_dzis: 'Zakupione dziś',
      wyslane_wyceny: 'Wysłane wyceny',
      nieodebrane: 'Nieodebrane',
      przelozone_na_jutro: 'Przełożone na jutro',
    };

    function humanizeKey(key) {
      const s = String(key).replace(/_/g, ' ');
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function renderPlan(plan) {
      if (!plan) return;
      document.getElementById('plan-card').style.display = 'block';
      document.getElementById('plan-title').textContent =
        activeDoc === 'podsumowanie' ? 'Podsumowanie dnia' : 'Plan dnia';
      const grid = document.getElementById('plan-grid');
      grid.innerHTML = '';

      const known = Object.keys(PLAN_TILE_LABELS).filter((k) => plan[k] !== undefined);
      const extra = Object.keys(plan).filter(
        (k) => !(k in PLAN_TILE_LABELS) && (typeof plan[k] === 'number' || typeof plan[k] === 'string')
      );

      known.concat(extra).forEach((key) => {
        const tile = document.createElement('div');
        tile.className = 'stat-tile';
        const value = document.createElement('div');
        value.className = 'value';
        value.textContent = plan[key];
        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = PLAN_TILE_LABELS[key] || humanizeKey(key);
        tile.appendChild(value);
        tile.appendChild(label);
        grid.appendChild(tile);
      });
    }

    // Stały, powtarzalny zestaw pól dla każdego leada, w ustalonej kolejności.
    // Widoczne od razu w wierszu: imię/nazwisko, telefon, status, link do formularza.
    // Wszystko poniżej chowa się w rozwijanym szczególe (<details>).
    // Grupa 1: informacje kontaktowe.
    const CONTACT_FIELDS = [
      { key: 'ostatni_kontakt', label: 'Ostatni kontakt' },
      { key: 'ilosc_telefonow', label: 'Ilość telefonów' },
      { key: 'temperatura', label: 'Temperatura' },
      { key: 'email', label: 'Email', wide: true, nowrap: true },
      { key: 'ocena_ai', label: 'Ocena AI', wide: true },
    ];

    // Grupa 2: informacje transakcyjne — ta sama stylistyka co grupa kontaktowa.
    const DEAL_FIELDS = [
      { key: 'data_wyceny', label: 'Data wyceny' },
      { key: 'id_wyceny', label: 'ID wyceny' },
      { key: 'kwota', label: 'Kwota', currency: true },
      { key: 'produkty', label: 'Produkty' },
      { key: 'zadzwonil_dzis', label: 'Zadzwonił dziś', bool: true },
    ];

    function parsePlDate(str) {
      const m = /^(\d{1,2})\.(\d{1,2})\.(\d{4})$/.exec(String(str || '').trim());
      if (!m) return null;
      return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
    }

    function isFutureDate(str) {
      const d = parsePlDate(str);
      if (!d) return false;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return d.getTime() > today.getTime();
    }

    function cleanFormularzLink(url) {
      if (!url) return url;
      // Część linków z JSON-a ma "id=#1673" zamiast "id=1673" — zdejmij ten hashtag,
      // jeśli go nie ma, link zostaje bez zmian.
      return url.replace(/([?&]id=)#/, '$1');
    }

    function splitKomentarzCases(text) {
      const parts = String(text || '')
        .split(/(?=Case LP\d+\s*—)/g)
        .map((s) => s.trim())
        .filter(Boolean);
      return parts.map((part) => part.replace(/^Case LP(\d+)\s*—/, 'Case $1 —'));
    }

    function renderKomentarz(text) {
      const list = document.getElementById('komentarz-list');
      list.innerHTML = '';
      const cases = splitKomentarzCases(text);
      const items = cases.length ? cases : [text];
      items.forEach((entry) => {
        const bubble = document.createElement('div');
        bubble.className = 'komentarz-bubble';
        bubble.textContent = entry;
        list.appendChild(bubble);
      });
    }

    function fieldValueNode(spec, raw) {
      if (spec.link) {
        if (!raw) return document.createTextNode('—');
        const a = document.createElement('a');
        a.href = raw;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = 'Otwórz ↗';
        return a;
      }
      if (spec.bool) return document.createTextNode(raw ? 'Tak' : 'Nie');
      if (spec.currency) return document.createTextNode(raw || raw === 0 ? fmtKwota(raw) || '0 zł' : '—');
      if (raw === undefined || raw === null || raw === '') return document.createTextNode('—');
      return document.createTextNode(String(raw));
    }

    function leadItem(c) {
      const lead = document.createElement('details');
      lead.className = 'lead' + (c.zamkniete ? ' zamkniete' : '');

      const summary = document.createElement('summary');

      const chevron = document.createElement('span');
      chevron.className = 'chevron';
      chevron.textContent = '▸';
      summary.appendChild(chevron);

      if (c.lp !== undefined) {
        const lp = document.createElement('span');
        lp.className = 'lp';
        lp.textContent = c.lp;
        summary.appendChild(lp);
      }

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'close-checkbox';
      checkbox.checked = Boolean(c.zamkniete);
      checkbox.title = 'Zamknięte (tylko lokalnie, nie zapisuje się do Supabase)';
      checkbox.addEventListener('click', (e) => e.stopPropagation());
      checkbox.addEventListener('change', () => {
        lead.classList.toggle('zamkniete', checkbox.checked);
      });
      summary.appendChild(checkbox);

      const namePhone = document.createElement('span');
      namePhone.className = 'name-phone';

      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = c.imie || '(brak nazwiska)';
      namePhone.appendChild(name);

      if (c.telefon) {
        const sep = document.createElement('span');
        sep.className = 'phone-sep';
        sep.textContent = '–';
        namePhone.appendChild(sep);

        const phone = document.createElement('span');
        phone.className = 'phone';
        phone.textContent = c.telefon;
        namePhone.appendChild(phone);
      }

      summary.appendChild(namePhone);

      const tags = document.createElement('span');
      tags.className = 'tags';

      if (c.data_feedbacku) {
        const feedbackDate = document.createElement('span');
        feedbackDate.className = 'feedback-date' + (isFutureDate(c.data_feedbacku) ? ' is-future' : '');
        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = 'Data feedbacku: ';
        feedbackDate.appendChild(label);
        feedbackDate.appendChild(document.createTextNode(c.data_feedbacku));
        tags.appendChild(feedbackDate);
      }

      if (c.status) {
        const tag = document.createElement('span');
        tag.className = 'status-tag';
        tag.textContent = c.status;
        tags.appendChild(tag);
      }

      if (tags.children.length) summary.appendChild(tags);

      const formLink = document.createElement(c.link_formularz ? 'a' : 'span');
      formLink.className = 'form-link' + (c.link_formularz ? '' : ' form-link--empty');
      if (c.link_formularz) {
        formLink.href = cleanFormularzLink(c.link_formularz);
        formLink.target = '_blank';
        formLink.rel = 'noopener';
        formLink.textContent = '↗';
        formLink.title = 'Otwórz formularz';
        // Nie chcemy, żeby kliknięcie w link jednocześnie zwijało/rozwijało wiersz.
        formLink.addEventListener('click', (e) => e.stopPropagation());
      } else {
        formLink.textContent = '×';
        formLink.title = 'Brak formularza';
      }
      summary.appendChild(formLink);

      lead.appendChild(summary);

      const body = document.createElement('div');
      body.className = 'lead-body';

      if (c.opis || c.komentarz) {
        const opisWrap = document.createElement('div');
        opisWrap.className = 'opis-wrap';
        const opisLabel = document.createElement('div');
        opisLabel.className = 'opis-label';
        opisLabel.textContent = 'Opis';
        opisWrap.appendChild(opisLabel);
        const opis = document.createElement('div');
        opis.className = 'opis-text';
        opis.textContent = c.opis || c.komentarz;
        opisWrap.appendChild(opis);
        body.appendChild(opisWrap);
      }

      function fieldGrid(fields) {
        const grid = document.createElement('div');
        grid.className = 'field-grid';
        fields.forEach((spec) => {
          const field = document.createElement('div');
          field.className = 'field' + (spec.wide ? ' wide' : '');
          const label = document.createElement('div');
          label.className = 'label';
          label.textContent = spec.label;
          const value = document.createElement('div');
          value.className = 'value' + (spec.nowrap ? ' nowrap' : '');
          value.appendChild(fieldValueNode(spec, c[spec.key]));
          field.appendChild(label);
          field.appendChild(value);
          grid.appendChild(field);
        });
        return grid;
      }

      body.appendChild(fieldGrid(CONTACT_FIELDS));
      body.appendChild(fieldGrid(DEAL_FIELDS));

      lead.appendChild(body);

      return lead;
    }

    function renderPriorytet(list) {
      if (!list || !list.length) return;
      document.getElementById('priorytet-section').style.display = 'block';
      const container = document.getElementById('priorytet-list');
      container.innerHTML = '';
      list.forEach((c) => container.appendChild(leadItem(c)));
    }

    function renderKategorie(kategorie) {
      if (!kategorie) return;
      // Najpierw znana kolejność, potem wszystko, czego w niej nie ma (np.
      // kategorie utworzone przez AI) — nic nie znika z widoku.
      const orderedKeys = KATEGORIA_ORDER.concat(
        Object.keys(kategorie).filter((key) => !KATEGORIA_ORDER.includes(key))
      );
      const entries = orderedKeys
        .filter((key) => Array.isArray(kategorie[key]) && kategorie[key].length)
        .map((key) => [key, kategorie[key]]);
      if (!entries.length) return;
      document.getElementById('kategorie-section').style.display = 'block';
      const wrap = document.getElementById('kategorie-wrap');
      wrap.innerHTML = '';
      entries.forEach(([key, arr]) => {
        const details = document.createElement('details');
        details.className = 'kategoria';
        const summary = document.createElement('summary');
        const chevron = document.createElement('span');
        chevron.className = 'kategoria-chevron';
        chevron.textContent = '▸';
        summary.appendChild(chevron);
        summary.appendChild(document.createTextNode(`${KATEGORIA_LABELS[key] || key} (${arr.length})`));
        details.appendChild(summary);
        const list = document.createElement('div');
        list.className = 'cases';
        arr.forEach((c) => list.appendChild(leadItem(c)));
        details.appendChild(list);
        wrap.appendChild(details);
      });
    }

    function resetSections() {
      document.getElementById('meta').innerHTML = '';
      document.getElementById('kontekst-card').style.display = 'none';
      document.getElementById('komentarz-card').style.display = 'none';
      document.getElementById('plan-card').style.display = 'none';
      document.getElementById('priorytet-section').style.display = 'none';
      document.getElementById('kategorie-section').style.display = 'none';
    }

    function loadDay(date) {
      resetSections();
      const formatted = formatPlDate(date);
      const row = allRows.find((r) => rowMatchesDate(r['Data'], date));
      currentRow = row || null;

      if (!row) {
        activeState = null;
        updateComposer();
        setStatus(`Brak danych dla ${formatted}`);
        return;
      }

      // Precedens: final → poprawka AI → draft. Final jest tylko do odczytu
      // (composer znika); poprawka/draft pokazują pole edycji.
      const fields = DOC_FIELDS[activeDoc];
      let draft = null;
      if (row[fields.final]) {
        draft = row[fields.final];
        activeState = 'final';
      } else if (row[fields.poprawka]) {
        draft = row[fields.poprawka];
        activeState = 'poprawka';
      } else if (row[fields.draft]) {
        draft = row[fields.draft];
        activeState = 'draft';
      } else {
        activeState = null;
      }
      updateComposer();

      if (!draft) {
        setStatus(`Brak dokumentu „${DOC_NAMES[activeDoc]}" dla ${formatted}`);
        return;
      }

      setStatus('');
      renderMeta(draft);

      if (draft.kontekst) {
        document.getElementById('kontekst-card').style.display = 'block';
        document.getElementById('kontekst-text').textContent = draft.kontekst;
      }

      if (draft.komentarz_dzienny) {
        document.getElementById('komentarz-card').style.display = 'block';
        renderKomentarz(draft.komentarz_dzienny);
      }

      renderPlan(draft.plan);
      renderPriorytet(draft.priorytet_dzis);
      renderKategorie(draft.kategorie);
    }

    function renderDayStrip() {
      const tabs = document.getElementById('day-tabs');
      tabs.innerHTML = '';
      const today = new Date();
      windowDays.forEach((date) => {
        const tab = document.createElement('div');
        tab.className = 'day-tab';
        if (isSameDate(date, today)) tab.classList.add('is-today');
        if (isSameDate(date, selectedDate)) tab.classList.add('is-selected');

        const weekday = document.createElement('div');
        weekday.className = 'weekday';
        weekday.textContent = PL_WEEKDAYS[date.getDay()];
        tab.appendChild(weekday);

        const dayNum = document.createElement('div');
        dayNum.className = 'day-num';
        dayNum.textContent = date.getDate();
        tab.appendChild(dayNum);

        tab.addEventListener('click', () => {
          selectedDate = date;
          renderDayStrip();
          loadDay(selectedDate);
        });

        tabs.appendChild(tab);
      });
    }

    function shiftWeek(delta) {
      const offset = windowDays.findIndex((d) => isSameDate(d, selectedDate));
      const newMonday = addPlainDays(windowDays[0], delta * 7);
      windowDays = buildWeekdayWindow(newMonday);
      selectedDate = windowDays[offset === -1 ? 0 : offset];
      renderDayStrip();
      loadDay(selectedDate);
    }

    function goToPrevWeek() {
      shiftWeek(-1);
    }

    function goToNextWeek() {
      shiftWeek(1);
    }

    async function init() {
      try {
        const res = await fetch(`${API_BASE}/api/tables/${encodeURIComponent(TABLE)}`);
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.error || `Błąd ${res.status}`);
        }
        allRows = await res.json();

        const today = new Date();
        today.setHours(0, 0, 0, 0);
        selectedDate = isWeekend(today)
          ? (today.getDay() === 6 ? addPlainDays(today, -1) : addPlainDays(today, 1))
          : today;
        windowDays = buildWeekdayWindow(getMonday(selectedDate));

        document.getElementById('day-prev').addEventListener('click', goToPrevWeek);
        document.getElementById('day-next').addEventListener('click', goToNextWeek);

        renderDayStrip();
        loadDay(selectedDate);
      } catch (err) {
        setStatus(err.message);
      }
    }

    // ── Przełącznik dokumentu (Umowa / Podsumowanie dnia) ──────────────────
    const docToggle = document.getElementById('doc-toggle');
    docToggle.querySelectorAll('.doc-pill').forEach((btn) => {
      btn.addEventListener('click', () => {
        if (btn.dataset.doc === activeDoc) return;
        activeDoc = btn.dataset.doc;
        docToggle.querySelectorAll('.doc-pill').forEach((b) => {
          b.classList.toggle('is-active', b.dataset.doc === activeDoc);
        });
        if (selectedDate) loadDay(selectedDate);
      });
    });

    // ── Composer: polecenia dla AI + zatwierdzanie do wersji finalnej ──────
    const composer = document.getElementById('composer');
    const composerInput = document.getElementById('composer-input');
    const composerMsg = document.getElementById('composer-msg');
    const micBtn = document.getElementById('composer-mic');
    const sendBtn = document.getElementById('composer-send');
    const approveBtn = document.getElementById('composer-approve');

    let composerBusy = false;

    function updateComposer() {
      const show = activeState === 'draft' || activeState === 'poprawka';
      composer.classList.toggle('visible', show);
      document.body.classList.toggle('composer-open', show);
      if (!show) setComposerMsg('');
    }

    function setComposerMsg(text, isError) {
      composerMsg.textContent = text || '';
      composerMsg.classList.toggle('error', Boolean(isError));
    }

    function setComposerBusy(busy, sendLabel) {
      composerBusy = busy;
      [composerInput, micBtn, sendBtn, approveBtn].forEach((el) => { el.disabled = busy; });
      sendBtn.textContent = busy && sendLabel ? sendLabel : 'Wyślij';
    }

    function autoGrowInput() {
      composerInput.style.height = 'auto';
      composerInput.style.height = `${Math.min(composerInput.scrollHeight, 128)}px`;
    }

    async function postJson(url, payload) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.error || `Błąd ${res.status}`);
      return body;
    }

    composerInput.addEventListener('input', autoGrowInput);
    composerInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });

    sendBtn.addEventListener('click', async () => {
      const instruction = composerInput.value.trim();
      if (!instruction || !currentRow || composerBusy) return;
      setComposerBusy(true, 'AI pracuje…');
      setComposerMsg('');
      try {
        const body = await postJson(`${API_BASE}/api/ai-edit`, {
          doc: activeDoc,
          dataValue: currentRow['Data'],
          instruction,
        });
        if (body.message) {
          // NIEJEDNOZNACZNE / BŁĄD — AI prosi o doprecyzowanie, nic nie zapisano.
          setComposerMsg(body.message, true);
        } else {
          currentRow[DOC_FIELDS[activeDoc].poprawka] = body.json;
          composerInput.value = '';
          autoGrowInput();
          loadDay(selectedDate);
          setComposerMsg('Zapisano poprawkę AI.');
        }
      } catch (err) {
        setComposerMsg(err.message, true);
      } finally {
        setComposerBusy(false);
      }
    });

    approveBtn.addEventListener('click', async () => {
      if (!currentRow || composerBusy) return;
      if (!confirm(`Zatwierdzić wersję finalną („${DOC_NAMES[activeDoc]}") dla ${formatPlDate(selectedDate)}?`)) return;
      setComposerBusy(true, 'Zapisuję…');
      try {
        const body = await postJson(`${API_BASE}/api/approve`, {
          doc: activeDoc,
          dataValue: currentRow['Data'],
        });
        currentRow[DOC_FIELDS[activeDoc].final] = body.json;
        loadDay(selectedDate);
      } catch (err) {
        setComposerMsg(err.message, true);
      } finally {
        setComposerBusy(false);
      }
    });

    // ── Dyktowanie: MediaRecorder → POST /api/transcribe (OpenAI) ──────────
    // Nagranie nie jest nigdzie przechowywane — leci do transkrypcji i przepada.
    let mediaRecorder = null;
    let audioChunks = [];

    micBtn.addEventListener('click', async () => {
      if (composerBusy) return;
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : '';
        mediaRecorder = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined);
        audioChunks = [];
        mediaRecorder.addEventListener('dataavailable', (e) => {
          if (e.data.size) audioChunks.push(e.data);
        });
        mediaRecorder.addEventListener('stop', async () => {
          stream.getTracks().forEach((t) => t.stop());
          micBtn.classList.remove('recording');
          const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
          if (!blob.size) return;
          setComposerMsg('Transkrybuję…');
          try {
            const res = await fetch(`${API_BASE}/api/transcribe`, {
              method: 'POST',
              headers: { 'Content-Type': blob.type || 'audio/webm' },
              body: blob,
            });
            const body = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(body.error || `Błąd ${res.status}`);
            if (body.text) {
              const existing = composerInput.value.replace(/\s+$/, '');
              composerInput.value = existing ? `${existing} ${body.text}` : body.text;
              autoGrowInput();
              composerInput.focus();
            }
            setComposerMsg('');
          } catch (err) {
            setComposerMsg(err.message, true);
          }
        });
        mediaRecorder.start();
        micBtn.classList.add('recording');
        setComposerMsg('Nagrywam — kliknij 🎤 ponownie, żeby zakończyć.');
      } catch (err) {
        setComposerMsg(`Brak dostępu do mikrofonu: ${err.message}`, true);
      }
    });

    init();

    const siteHeader = document.getElementById('site-header');
    window.addEventListener('scroll', () => {
      siteHeader.classList.toggle('scrolled', window.scrollY > 24);
    }, { passive: true });
  </script>
</body>
